# Render Blueprint. Push this repo to GitHub, then in Render:
#   New > Blueprint > connect this repo. It provisions all three resources.
# After the first deploy you must fill in two cross-referencing URLs
# (CORS_ORIGINS and VITE_API_URL) — see README "Deploy to Render", step 5.

databases:
  - name: nexa-db
    plan: free          # free Postgres expires after ~30 days; bump for production
    region: oregon      # India team? See README about the singapore region

services:
  # ---- Backend API (FastAPI) ----
  - type: web
    name: nexa-api
    runtime: python
    region: oregon
    plan: free          # free web services cold-start after inactivity
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexa-db
          property: connectionString
      - key: GCP_PROJECT
        sync: false                # prompted at deploy
      - key: BQ_LOCATION
        value: US
      - key: BQ_DEFAULT_DATASET
        sync: false                # optional: warehouse dataset to focus on
      - key: VERTEX_LOCATION
        value: us-central1
      - key: GCP_SA_KEY_JSON
        sync: false                # paste the whole service-account JSON
      # --- Models (Gemini via Vertex uses the service account — no extra key) ---
      - key: FETCH_PROVIDER
        value: gemini
      - key: FETCH_MODEL
        value: gemini-2.5-flash
      - key: VIZ_PROVIDER
        value: gemini
      - key: VIZ_MODEL
        value: gemini-2.5-pro
      # Optional alternative providers (only if you switch FETCH/VIZ_PROVIDER)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # --- Auth (first admin is bootstrapped from these on startup) ---
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong random secret
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: ADMIN_EMAIL
        sync: false                # your admin login email
      - key: ADMIN_PASSWORD
        sync: false                # your admin login password
      - key: DEFAULT_USER_CREDITS
        value: "100"
      - key: CREDITS_PER_GB
        value: "1"
      - key: CORS_ORIGINS
        fromService:
          name: nexa
          type: web
          property: url
      - key: HEX_STYLE_PIPELINE
        value: "true"
      - key: SQL_VERIFY_WITH_LLM
        value: "false"
      - key: EMBEDDING_RETRIEVAL_ENABLED
        value: "false"
      - key: SYNC_WORKSPACE_FROM_DATASET
        value: "0"
      - key: SYNC_WORKSPACE_FROM_YAML
        value: "1"

  # ---- Frontend (static React build) ----
  - type: web
    name: nexa
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nexa-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback so React Router works
