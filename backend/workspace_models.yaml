id: academy_users_day_and_page_wise_time_spent_details
type: model
description: This table captures day-wise and page-wise user engagement on the
  learning portal. It is used to analyze user activity, time spent across portal
  pages, engagement trends, and learning portal access status. Page identifiers
  are derived from CloudWatch route paths and may be added, renamed, or
  deprecated over time; therefore, domain knowledge is required to interpret the
  data correctly, especially for historical analysis.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_users_day_and_page_wise_time_spent_details`"
measures:
  - id: count_of_records
    func: count
  - id: active_learning_portal_users
    func: count_distinct
    of: user_id
    filters:
      - is_lp_active
    description: Count of unique users with learning portal access status ACTIVE (lp_status)
dimensions:
  - id: user_date_page_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${time_spent_date} AS STRING), '-', ${time_spent_page})
    unique: true
    visibility: "internal"
    description: Unique identifier combining user_id, time_spent_date, and time_spent_page for each user's daily page-level engagement record
  - id: user_id
    type: string
    description: Unique identifier of the user (UUID with hyphens).
  - id: lpoad
    type: timestamp_naive
    description: Datetime when learning portal onboarding access was granted to the user.
  - id: lp_status
    type: string
    description: >-
      Current learning portal access status of the user. Exact enum values -
        • ACTIVE    (user currently has learning portal access)
        • EXPIRED   (user currently does not have learning portal access — access period expired or was explicitly removed)
        • REVOKED   (user access was removed earlier and later restored; the user currently has access)
  - id: is_lp_active
    type: boolean
    expr_sql: ${lp_status} = 'ACTIVE'
    description: TRUE when the user currently has active learning portal access
    visibility: "internal"
  - id: time_spent_date
    type: date
    description: Date on which the user spent time on the learning portal. This
      value is NULL if the user has never visited the platform or has not spent
      at least 1 minute on any page.
  - id: time_spent_page
    type: string
    description: Logical page identifier (ENUM name) mapped to a route path from
      CloudWatch event data (e.g., HOME_PAGE, BONUS_COURSES, USER_PROGRAM_JOURNEY_PAGE). 
      • Page names may be configured after initial
      release; earlier records may have NULL values (typically excluded from
      analysis). 
      • Some page identifiers may be deprecated or renamed over time,
      requiring domain knowledge to interpret historical data correctly.
  - id: time_spent_in_mins
    type: number
    description: Total time spent by the user on the specified page on the given
      date, measured in minutes.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${time_spent_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}

id: academy_users_month_wise_login_summary
type: model
description: |2-
    Academy-specific month-level summary of each user's login behaviour.
    Restricted to Academy users only, and login dates are considered starting
    from the user's Learning Portal Access Given Date (lpoad). One row per
    user_id × month — spanning from the user's lpoad month through the
    current month. Months with zero logins appear with days_active = 0,
    ensuring inactive months are not silently dropped from analyses.

    WHAT THIS TABLE MEASURES:
    Login presence — whether the Academy user opened the platform on a given
    day, counted only from their lpoad onward. A consecutive run = unbroken
    sequence of days with at least one login. A gap (any day with no login)
    breaks the run and starts a new one.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_users_month_wise_login_summary`"
measures:
  - id: count_of_records
    func: count
    description: Total count of academy user-month summary rows
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique academy users
  - id: total_days_active
    func: sum
    of: days_active
    description: Total active days across all user-months
  - id: total_days_tracked
    func: sum
    of: days_tracked
    description: Total tracked days across all user-months
  - id: avg_active_rate
    func: avg
    of: active_rate
    description: Average active rate across user-months
  - id: avg_max_run_in_month
    func: avg
    of: max_run_in_month
    description: Average of max streak runs per user-month
  - id: avg_num_runs
    func: avg
    of: num_runs
    description: Average number of streak runs per user-month
  - id: max_best_login_streak_ever
    func: max
    of: best_login_streak_ever
    description: Maximum best login streak ever observed
  - id: avg_best_login_streak
    func: avg
    of: best_login_streak_ever
    description: Average of best login streak across user-months
  - id: active_months_count
    func: count
    filters:
      - is_active_month
    description: Count of user-months that had any activity
dimensions:
  - id: user_month_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${month} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite key of user_id and month for uniqueness
  - id: user_id
    type: string
    description: Unique identifier of the academy user (UUID with hyphens)
  - id: month
    type: date
    description: First day of the calendar month being summarized. Spans from the user's lpoad month through the current month.
  - id: month_number
    type: number
    description: Sequential month number for the user, starting from their lpoad month (1 = lpoad month)
  - id: days_active
    type: number
    description: Number of days the user was active (logged in) during this month, counted only from lpoad onward
  - id: days_tracked
    type: number
    description: Number of days tracked for the user in this month (from lpoad onward, capped at the calendar month boundary)
  - id: active_rate
    type: number
    description: Active rate (days_active / days_tracked) for the month
  - id: max_run_in_month
    type: number
    description: Longest single login streak (consecutive days) within this month
  - id: num_runs
    type: number
    description: Number of distinct login streak runs in the month
  - id: has_carry_over
    type: number
    description: Flag (1/0) indicating whether streak carried over from prior month
  - id: best_login_streak_ever
    type: number
    description: Best login streak attained by the user up to and including this month
  - id: logged_in_on_bom
    type: number
    description: Flag (1/0) indicating whether the user logged in on the first day of the month (or lpoad date, whichever is later)
  - id: logged_in_on_eom
    type: number
    description: Flag (1/0) indicating whether the user logged in on the last day of the month
  - id: trend_direction
    type: string
    description: Direction of the login activity trend for this month (e.g. up/down/flat)
  - id: is_active_month
    type: boolean
    expr_sql: ${days_active} > 0
    visibility: "internal"
    description: True if the user had any activity in the month
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${month} = DATE_TRUNC(${y_academy_user_daily_engagement_time_spent.calendar_date}, MONTH)
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND ${month} = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND ${month} = ${academy_nps_form_responses.form_submission_month}
  - id: academy_nbfc_renewals_conversion_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_nbfc_renewals_conversion_details.user_id} AND ${month} = ${academy_nbfc_renewals_conversion_details.month}
  - id: academy_users_month_wise_streak_summary
    type: one_to_one
    join_sql: ${user_id} = ${academy_users_month_wise_streak_summary.user_id} AND ${month} = ${academy_users_month_wise_streak_summary.month}

id: academy_users_month_wise_streak_summary
type: model
description: >-
  Monthly user-level learning streak summary on the Academy learning platform.
  One row per (user_id, month), capturing daily-activity-derived streak metrics
  for that calendar month - streak length at the start and end of the month,
  the longest run within the month, number of distinct active-day runs, reset
  behavior, activity coverage, and the user's all-time personal-best streak as
  of that month.

  A "run" is a contiguous sequence of active days; "streak_bom" / "streak_eom"
  represent the active-day streak length carried into the first of the month
  and as of the last tracked day of the month, respectively. "best_streak_ever"
  is cumulative across months, so it is monotonically non-decreasing per user
  over time.

  Primary use cases - tracking streak/consistency behavior, identifying
  personal-best months, measuring habit formation (active_rate, days_active vs
  days_tracked), detecting drop-offs (had_reset), and trend analysis across
  months (trend_direction).
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_users_month_wise_streak_summary`"
measures:
  - id: count_of_records
    func: count
    description: Total number of user-month streak summary records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users with at least one monthly streak record
  - id: total_days_active
    func: sum
    of: days_active
    description: Total active days summed across all user-month records
  - id: total_days_tracked
    func: sum
    of: days_tracked
    description: Total tracked days summed across all user-month records
  - id: avg_active_rate
    func: avg
    of: active_rate
    description: Average active rate (days_active / days_tracked) across user-month records
  - id: avg_max_run_in_month
    func: avg
    of: max_run_in_month
    description: Average longest within-month active-day run across user-month records
  - id: avg_num_runs
    func: avg
    of: num_runs
    description: Average number of distinct active-day runs per user-month
  - id: max_best_streak_ever
    func: max
    of: best_streak_ever
    description: Maximum all-time personal-best streak observed across all user-month records
  - id: reset_months
    func: sum
    of: had_reset
    description: Total count of user-months that contained at least one streak reset (active streak broken)
dimensions:
  - id: user_month_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${month} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and month for each user's monthly streak summary record
  - id: user_id
    type: string
    description: Unique identifier of the user (UUID with hyphens)
  - id: month
    type: date
    description: Calendar month for the streak summary, truncated to the first day of the month
  - id: month_number
    type: number
    description: Sequential month number relative to the user's first tracked month (1 = first month tracked for the user)
  - id: streak_bom
    type: number
    description: Active-day streak length carried into the first day of the month (Beginning Of Month). 0 if the user was not on an active streak as of the prior day.
  - id: streak_eom
    type: number
    description: Active-day streak length as of the last tracked day of the month (End Of Month). 0 if the user's streak was broken at month end.
  - id: best_streak_ever
    type: number
    description: User's all-time personal-best active-day streak as of this month. Monotonically non-decreasing per user across months.
  - id: max_run_in_month
    type: number
    description: Longest contiguous active-day run that occurred within this month
  - id: num_runs
    type: number
    description: Number of distinct contiguous active-day runs within this month
  - id: days_active
    type: number
    description: Number of days within the month on which the user was active
  - id: days_tracked
    type: number
    description: Number of days within the month for which activity was tracked for the user (denominator for active_rate)
  - id: active_rate
    type: number
    description: Ratio of days_active to days_tracked within the month (0 to 1)
  - id: had_reset
    type: number
    description: Flag indicating whether the user's active streak was broken at least once within this month (1 = streak reset occurred, 0 = no reset)
  - id: trend_direction
    type: string
    description: >-
      Month-over-month trend direction of the user's streak/activity behavior compared to the prior month. Exact enum values -
        • IMPROVING
        • DECLINING
        • STABLE
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${month} = DATE_TRUNC(${y_academy_user_daily_engagement_time_spent.calendar_date}, MONTH)
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND ${month} = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND ${month} = ${academy_nps_form_responses.form_submission_month}
  - id: academy_nbfc_renewals_conversion_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_nbfc_renewals_conversion_details.user_id} AND ${month} = ${academy_nbfc_renewals_conversion_details.month}

id: academy_users_relative_day_progress_snapshots
type: model
description: >-
  Per-user unit progress and platform engagement snapshots captured at 13 fixed
  relative-day checkpoints (Day 1, 2, 3, 4, 5, 6, 7, 14, 21, 30, 60, 90, 180)
  measured from each user's Learning Portal Onboarding Access Date (lpoad =
  Day 0). Every enrolled user gets exactly 13 rows — one per checkpoint —
  regardless of whether they ever engaged, making zero-activity users visible
  in analysis.

  Each row carries three families of metrics:
    1. Completed-on-day — units whose first-ever 100% completion occurred on
       exactly that relative day, broken out by unit category.
    2. Cumulative snapshot — total completed and in-progress units as of the
       checkpoint, by unit category, based on the latest known progress state
       per unit. Post-completion rows are excluded for all unit types to
       correctly handle re-attempt patterns (especially QUESTION_SET resets),
       ensuring cumulative state reflects true forward progress.
    3. Engagement signals — active days and platform time spent (exact day,
       trailing 7-day window, and cumulative from Day 0), sourced from the
       sessions log independently of unit-level progress.

  Unit categories used in the breakdowns:
    • learning_set (ls)   → LEARNING_SET
    • question_set (qs)   → QUESTION_SET
    • other_set    (other) → ASSESSMENT, EXAM, PRACTICE, QUIZ

  Primary use cases - activation-threshold discovery, habit-formation profiling,
  onboarding health benchmarking, early-engagement cohort analysis, and
  identifying drop-off patterns across the first 6 months.

  Notes -
  - user_id is stored WITHOUT hyphens. Apply REPLACE(user_id, '-', '') when
    joining from tables that store user_id with hyphens.
  - cumulative_units_completed is monotonically non-decreasing per user across
    checkpoints; cumulative_units_inprogress can go down as units transition
    to completed.
  - active_days_in_last_7 is capped at 7.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_users_relative_day_progress_snapshots`"
measures:
  - id: count_of_records
    func: count
    description: Total number of user × checkpoint snapshot rows
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users present in the snapshot table
  - id: total_units_completed_on_day
    func: sum
    of: units_completed_on_day
    description: Total units first completed on the snapshot's relative day (sum of ls + qs + other)
  - id: total_ls_completed_on_day
    func: sum
    of: ls_completed_on_day
    description: Total LEARNING_SET units first completed on the snapshot's relative day
  - id: total_qs_completed_on_day
    func: sum
    of: qs_completed_on_day
    description: Total QUESTION_SET units first completed on the snapshot's relative day
  - id: total_other_completed_on_day
    func: sum
    of: other_completed_on_day
    description: Total ASSESSMENT/EXAM/PRACTICE/QUIZ units first completed on the snapshot's relative day
  - id: avg_cumulative_units_completed
    func: avg
    of: cumulative_units_completed
    description: Average cumulative units completed as of the checkpoint
  - id: avg_cumulative_units_inprogress
    func: avg
    of: cumulative_units_inprogress
    description: Average cumulative units in-progress as of the checkpoint
  - id: avg_active_days_in_last_7
    func: avg
    of: active_days_in_last_7
    description: Average active days in the trailing 7-day window ending at the checkpoint (consistency signal, max 7)
  - id: avg_active_days_cumulative
    func: avg
    of: active_days_cumulative
    description: Average cumulative active days from Day 0 up to and including the checkpoint
  - id: avg_time_spent_on_day
    func: avg
    of: time_spent_on_day
    description: Average platform time (minutes) spent on exactly the snapshot's relative day
  - id: avg_time_spent_in_last_7
    func: avg
    of: time_spent_in_last_7
    description: Average platform time (minutes) spent in the trailing 7-day window ending at the checkpoint
  - id: avg_time_spent_cumulative
    func: avg
    of: time_spent_cumulative
    description: Average cumulative platform time (minutes) from Day 0 up to the checkpoint
  - id: total_time_spent_cumulative
    func: sum
    of: time_spent_cumulative
    description: Sum of cumulative platform time (minutes) across all snapshot rows. Use carefully — this double-counts across checkpoints; prefer averages or filtering to a single capturing_point.
dimensions:
  - id: user_checkpoint_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${capturing_point})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and capturing_point. Each user has exactly 13 rows — one per checkpoint.
  - id: user_id
    type: string
    description: Student identifier (UUID without hyphens). One user has one row per checkpoint they have actually reached — up to 13 rows maximum. A user onboarded 10 days ago will have 7 rows (day_1 through day_7); a user onboarded 180+ days ago will have all 13.
  - id: capturing_point
    type: string
    description: >-
      Checkpoint label identifying the relative-day snapshot. Exact enum values -
        • day_1
        • day_2
        • day_3
        • day_4
        • day_5
        • day_6
        • day_7
        • day_14
        • day_21
        • day_30
        • day_60
        • day_90
        • day_180
  - id: capturing_day
    type: number
    description: Numeric relative day from onboarding (Day 0 = lpoad). One of 1, 2, 3, 4, 5, 6, 7, 14, 21, 30, 60, 90, 180.
  - id: units_completed_on_day
    type: number
    description: Units whose overall completion first hit 100% on exactly this relative day. Equals ls_completed_on_day + qs_completed_on_day + other_completed_on_day.
  - id: ls_completed_on_day
    type: number
    description: LEARNING_SET units first completed (overall_% = 100) on exactly this relative day.
  - id: qs_completed_on_day
    type: number
    description: QUESTION_SET units first completed (overall_% = 100) on exactly this relative day.
  - id: other_completed_on_day
    type: number
    description: Units of ASSESSMENT, EXAM, PRACTICE, or QUIZ first completed (overall_% = 100) on exactly this relative day.
  - id: cumulative_units_completed
    type: number
    description: Total units ever completed by the user as of this checkpoint. Includes Day 0 activity. Monotonically non-decreasing across checkpoints.
  - id: cumulative_units_inprogress
    type: number
    description: Units started but not yet at 100% as of this checkpoint, based on latest known overall_% per unit up to this day. A unit exits this count once it hits 100% — post-completion rows are excluded from the log, so resets (e.g. QUESTION_SET re-attempts) do not pull a completed unit back into in-progress.
  - id: cumulative_ls_completed
    type: number
    description: Cumulative count of LEARNING_SET units completed as of this checkpoint.
  - id: cumulative_ls_inprogress
    type: number
    description: Cumulative count of LEARNING_SET units in-progress (started but not completed) as of this checkpoint.
  - id: cumulative_qs_completed
    type: number
    description: Cumulative count of QUESTION_SET units completed as of this checkpoint.
  - id: cumulative_qs_inprogress
    type: number
    description: Cumulative count of QUESTION_SET units in-progress as of this checkpoint.
  - id: cumulative_other_completed
    type: number
    description: Cumulative count of ASSESSMENT/EXAM/PRACTICE/QUIZ units completed as of this checkpoint.
  - id: cumulative_other_inprogress
    type: number
    description: Cumulative count of ASSESSMENT/EXAM/PRACTICE/QUIZ units in-progress as of this checkpoint.
  - id: active_days_in_last_7
    type: number
    description: Distinct days with any unit progress in the trailing 7-day window ending on this checkpoint. Max = 7. Consistency signal. Use alongside time_spent_in_last_7 for habit segmentation — high active days + low time = shallow engagement, high active days + high time = strong habit.
  - id: active_days_cumulative
    type: number
    description: Distinct days with any unit progress from Day 0 up to and including this checkpoint. Includes onboarding day.
  - id: time_spent_on_day
    type: number
    description: Total platform time (minutes) on exactly this relative day. Sourced from users_day_wise_learning_sessions_log. 0 for users with no session activity on that day.
  - id: time_spent_in_last_7
    type: number
    description: Total platform time (minutes) in the 7-day window ending on this checkpoint (learning_date BETWEEN capturing_day - 6 AND capturing_day). Complements active_days_in_last_7 — active days measures consistency, this measures volume.
  - id: time_spent_cumulative
    type: number
    description: Total platform time (minutes) from day 0 up to this checkpoint. Pairs with cumulative_units_completed for learning efficiency analysis (units completed per hour spent).
