id: z_ccbp_academy_users_jobs_details
type: model
description: >-
  This table captures the full life cycle of job interactions between academy
  users and job opportunities available on the platform. It covers job creation
  and configuration, user application activity, hiring process progression, and
  final placement outcomes. Supports analysis across job application funnels,
  placement conversion rates, user engagement patterns, salary benchmarks,
  company hiring trends, and internship vs. full-time performance.

  IMPORTANT SCOPE NOTE:
  - This table contains ONLY users with active learning platform access (i.e.,
    lp_status = 'ACTIVE'). Users whose access has expired or been revoked are
    NOT present here. Any analysis derived from this table should be interpreted
    as representing the active-access user base only, not the full academy user
    population.

  Key distinction:
  - user_job_status is the top-level funnel stage (You Are Eligible, Applied,
    Did Not Apply, Not Interested, Hiring Completed, Requirements Closed).
  - user_job_application_status is only meaningful for users who applied and
    tracks granular hiring pipeline stages (resume screening, assessments,
    assignments, group discussion, telephonic, technical, HR rounds, Hired,
    Not Selected).

  Important considerations:
  - **Hiring-cycle time metrics use CALENDAR TIME, not working hours.** All
    `avg_days_*` measures spanning application -> process completion are
    computed as raw wall-clock day differences between datetimes. They do NOT
    exclude weekends, holidays, or non-working hours, and they do NOT apply any
    placements-team / company-side hiring business calendar. An application
    submitted on Friday and processed the following Tuesday will show 4 calendar
    days even though only ~2 are working days. Whenever you query this table
    for hiring-funnel SLA analysis (e.g. time-to-decision, time-to-hire), you
    MUST surface this caveat to the stakeholder so they interpret the numbers
    as calendar latency, not effective working-day latency.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_c\
  cbp_academy_users_jobs_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of user-job interaction records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who interacted with jobs
  - id: unique_jobs
    func: count_distinct
    of: job_id
    description: Count of unique job postings
  - id: unique_organisations
    func: count_distinct
    of: organisation_id
    description: Count of unique hiring organisations
  - id: total_eligible_users
    func: count_distinct
    of: user_id
    filters:
      - is_eligible
    description: Count of unique users who were eligible for jobs (user_job_status = 'You Are Eligible')
  - id: total_applied_users
    func: count_distinct
    of: user_id
    filters:
      - is_applied
    description: Count of unique users who applied to jobs
  - id: total_not_interested_users
    func: count_distinct
    of: user_id
    filters:
      - is_not_interested
    description: Count of unique users who marked themselves as not interested
  - id: total_hired_users
    func: count_distinct
    of: user_id
    filters:
      - is_hired
    description: Count of unique users who were hired (user_job_application_status = 'Hired')
  - id: application_count
    func: count
    filters:
      - is_applied
    description: Total number of applications submitted
  - id: hired_count
    func: count
    filters:
      - is_hired
    description: Total number of hires
  - id: application_to_hire_rate
    func_sql: SAFE_DIVIDE(COUNTIF(${is_hired}), COUNTIF(${is_applied})) * 100
    description: Percentage of applications that resulted in a hire
  - id: avg_min_ctc
    func: avg
    of: min_ctc
    description: Average minimum CTC offered across jobs
  - id: avg_max_ctc
    func: avg
    of: max_ctc
    description: Average maximum CTC offered across jobs
  - id: total_positions_available
    func: sum
    of: no_of_positions_available
    description: Total number of open positions across all jobs
  - id: avg_days_from_apply_to_process_done
    func_sql: AVG(TIMESTAMP_DIFF(${process_done_datetime}, ${applied_datetime}, DAY))
    description: >-
      Average CALENDAR days from a user's application to the hiring process being marked complete (only rows with both applied_datetime and process_done_datetime contribute).
      IMPORTANT - this is raw wall-clock time. It does NOT exclude weekends, holidays, or non-working hours, and does NOT apply any placements-team / company-side hiring business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-day latency.
  - id: avg_days_from_job_creation_to_apply
    func_sql: AVG(TIMESTAMP_DIFF(${applied_datetime}, ${job_creation_datetime}, DAY))
    description: >-
      Average CALENDAR days from job posting to user application (signals how quickly eligible users discover and act on a job).
      IMPORTANT - this is raw wall-clock time. It does NOT exclude weekends, holidays, or non-working hours, and does NOT apply any business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-day latency.
dimensions:
  - id: user_job_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${job_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and job_id for each user-job interaction record
  - id: user_id
    type: string
    description: Unique identifier for the user (32-character UUID without hyphens)
  - id: job_id
    type: string
    description: Unique identifier for the job posting
  - id: organisation_id
    type: string
    description: Unique identifier for the hiring organisation
  - id: organisation_name
    type: string
    description: Name of the hiring organisation
  - id: job_title
    type: string
    description: Title of the job role
  - id: job_type
    type: string
    description: >-
      Type of engagement. Exact enum values -
        • INTERNSHIP
        • FULL_TIME
        • INTERNSHIP_AND_FULL_TIME
  - id: job_source
    type: string
    description: >-
      Origin of the job listing. Exact enum values -
        • INTERNAL
        • EXTERNAL
  - id: job_status
    type: string
    description: >-
      Current status of the job posting. Exact enum values -
        • Open
        • Hiring In Progress
        • Hiring Completed
        • Requirements Closed
        • Yet To Start Interviews
  - id: skills_required
    type: string
    description: Skills required for the role
  - id: locations
    type: string
    description: Location(s) where the role is based
  - id: no_of_positions_available
    type: number
    description: Number of open positions for the job
  - id: min_ctc
    type: number
    description: Minimum CTC (Cost to Company) offered
  - id: max_ctc
    type: number
    description: Maximum CTC (Cost to Company) offered
  - id: service_agreement_in_months
    type: number
    description: Duration of service agreement required, in months
  - id: perks
    type: string
    description: Additional perks or benefits offered
  - id: job_creation_datetime
    type: timestamp_naive
    description: Datetime when the job was created in the system
  - id: apply_by
    type: timestamp_naive
    description: Application deadline
  - id: applied_datetime
    type: timestamp_naive
    description: Datetime when the user applied to the job. NULL if user has not applied.
  - id: process_done_datetime
    type: timestamp_naive
    description: Datetime when the hiring process was completed
  - id: user_job_status
    type: string
    description: >-
      High-level/top-level funnel stage of the user's relationship with the job. Exact enum values -
        • You Are Eligible
        • Applied
        • Did Not Apply
        • Not Interested
        • Hiring Completed
        • Requirements Closed
  - id: user_job_application_status
    type: string
    description: >-
      Granular stage of the user's application in the hiring pipeline. Tracks
      progress across rounds such as resume screening, assessments, assignments,
      group discussion, telephonic, technical, and HR rounds, through to final
      outcomes like Hired or Not Selected. Only meaningful for users who applied.
  - id: not_interested_reason
    type: string
    description: Reason provided by the user for not applying. Populated when user_job_status = 'Not Interested'.
  - id: enroll_plans_str
    type: string
    description: User's enrollment plan details, including any last-minute pro plans (JSON-like string)
  - id: year_of_graduation
    type: number
    description: User's year of graduation
  - id: applied_date
    type: date
    expr_sql: DATE(${applied_datetime})
    description: Date when the user applied to the job
  - id: job_creation_date
    type: date
    expr_sql: DATE(${job_creation_datetime})
    description: Date when the job was created
  - id: applied_month
    type: date
    expr_sql: DATE_TRUNC(DATE(${applied_datetime}), MONTH)
    description: Month when the user applied to the job, truncated to first day of month
  - id: is_eligible
    type: boolean
    expr_sql: ${user_job_status} = 'You Are Eligible'
    description: TRUE if user is eligible but has not yet acted on the job
    visibility: "internal"
  - id: is_applied
    type: boolean
    expr_sql: ${user_job_status} = 'Applied'
    description: TRUE if user applied to the job
    visibility: "internal"
  - id: is_not_interested
    type: boolean
    expr_sql: ${user_job_status} = 'Not Interested'
    description: TRUE if user marked themselves as not interested
    visibility: "internal"
  - id: is_hired
    type: boolean
    expr_sql: ${user_job_application_status} = 'Hired'
    description: TRUE if user was hired
    visibility: "internal"
  - id: is_internship
    type: boolean
    expr_sql: ${job_type} = 'INTERNSHIP'
    description: TRUE if the job is internship-only
    visibility: "internal"
  - id: is_full_time
    type: boolean
    expr_sql: ${job_type} IN ('FULL_TIME', 'INTERNSHIP_AND_FULL_TIME')
    description: TRUE if the job includes a full-time component
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: ${user_id} = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_basic_details.user_id}, "-", "")
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_education_details.user_id}, "-", "")
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${y_academy_user_daily_engagement_time_spent.user_id}, "-", "") AND DATE(${applied_datetime}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${z_academy_users_npc_master_table.user_id}, "-", "") AND DATE_TRUNC(DATE(${applied_datetime}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: y_academy_users_placements_details
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${y_academy_users_placements_details.user_id}, "-", "") AND ${job_id} = ${y_academy_users_placements_details.job_id}
  - id: z_academy_users_topin_tech_assessments
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${z_academy_users_topin_tech_assessments.user_id}, "-", "")
  - id: y_academy_user_event_engagement_details
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_user_event_engagement_details.user_id}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_nps_form_responses.user_id}, "-", "") AND DATE_TRUNC(DATE(${applied_datetime}), MONTH) = ${academy_nps_form_responses.form_submission_month}
  - id: nps_form_responses_nov_and_dec_2025
