id: z_ccbp_users_cloudwatch_interactions_with_job_readiness
type: model
description: >-
  This model captures user interaction events within the Job Readiness page.
  Each record represents a single interaction performed by a user while
  navigating different sections of the page such as banners, cards, tabs,
  tooltips, CTAs, and learning resources.

  Note:
  If an attribute is not applicable for a particular interaction, its value
  will be NULL. For example, link_type is populated only for redirection events.

  Active interactions covered:

  Landing Page & Onboarding
  • CLICKED_JOB_READINESS_REGISTER_PROFILE_CTA
  • JOB_READINESS_HOW_IT_WORKS_CARD_DEAD_CLICK (step_number)
  • JOB_READINESS_ROLE_CARD_DEAD_CLICK (role_title, role_level)
  • JOB_READINESS_JOB_ROLES_TOOLTIP_OPEN
  • JOB_READINESS_TOOLTIP_INFO_DEAD_CLICK
  • JOB_READINESS_ONBOARDING_MODAL_PRIMARY_CTA_CLICK
  • JOB_READINESS_ONBOARDING_MODAL_SECONDARY_CTA_CLICK

  Assessment Banner & Slot Booking
  • JOB_READINESS_ASSESSMENT_BANNER_CTA_CLICK
    - banner_state=MAIN_ASSESSMENT_LIVE (open_main_exam)
    - banner_state=MOCK_TEST_LIVE (open_mock_exam)
    - banner_state=MOCK_TEST_MISSED (show_main_pending_view)
    - banner_state=MAIN_ASSESSMENT_MISSED (activate_reattempt_booking)

  • JOB_READINESS_ASSESSMENT_BANNER_DEAD_CLICK
    - banner_state=NOT_ANNOUNCED
    - banner_state=MOCK_TEST_LIVE
    - banner_state=MOCK_TEST_MISSED
    - banner_state=MOCK_TEST_COMPLETED_MAIN_PENDING

  • JOB_READINESS_BOOK_SLOT_MODAL_CONFIRM_CLICK
  • JOB_READINESS_BOOK_SLOT_MODAL_CANCEL_CLICK

  Assessment Content
  • JOB_READINESS_STRUCTURE_CARD_DEAD_CLICK (card_title, is_expanded)
  • JOB_READINESS_ROLE_MAPPING_CARD_DEAD_CLICK
  • JOB_READINESS_REATTEMPT_CTA_CLICK
  • JOB_READINESS_INTERVIEW_INFO_SECTION_DEAD_CLICK

  Scrolling & Navigation
  • JOB_READINESS_HORIZONTAL_SCROLL
    - interaction_type=scroll
    - interaction_type=progress_bar_click

  • JOB_READINESS_HORIZONTAL_SCROLL_ARROW_CLICK
    - direction=left
    - direction=right

  Tooltips & Information
  • JOB_READINESS_INFO_TIP_DEAD_CLICK
    - tip_type=format_update
    - tip_type=qualification_disclaimer
    - tip_type=result_cutoff

  • JOB_READINESS_JOB_ROLES_TOOLTIP_OPEN
  • JOB_READINESS_TOOLTIP_INFO_DEAD_CLICK

  Links & Directions
  • JOB_READINESS_REDIRECTION_LINK_CLICK
    - link_type=banner_instructions

  • JOB_READINESS_GET_DIRECTION_CLICK

