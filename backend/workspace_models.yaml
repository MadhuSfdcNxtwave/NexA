id: all_users_bot_raw_conversation_details
type: model
description: AI bot conversations — raw transcripts of user–bot interactions, with timestamps and session metadata. Enables qualitative analysis, intent understanding, and bot effectiveness measurement.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`all\
