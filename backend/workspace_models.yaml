id: z_ccbp_academy_users_master_data
type: model
description: >-
  Academy user master profile — one row per user. Source of truth for user
  demographics, growth cycle, coach assignment, pause status, and learning
  portal onboarding access. Use for counts of active learning-portal users
  (pause_status IS NULL and portal access granted).
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_c\
  cbp_academy_users_master_data`"
measures:
  - id: count_of_records
    func: count
  - id: active_learning_portal_users
    func: count_distinct
    of: user_id
    filters:
      - is_not_paused
      - has_portal_access_granted
    description: >-
      Users with learning portal onboarding access granted and not paused.
      For currently ACTIVE access (~34k), prefer lp_status from
      academy_users_day_and_page_wise_time_spent_details.
dimensions:
  - id: user_id
    type: string
    unique: true
    description: Unique identifier of the user in the Academy system
  - id: bachelors_institute_name
    type: string
    description: Name of the institute from which the user is pursuing or has
      completed their bachelor’s degree
  - id: pause_status
    type: string
    description: Indicates whether the user’s learning schedule is paused; 'Pause'
      means paused, NULL means active
  - id: is_not_paused
    type: boolean
    expr_sql: ${pause_status} IS NULL
    description: TRUE when the user is not on a learning pause
    visibility: "internal"
  - id: has_portal_access_granted
    type: boolean
    expr_sql: ${learning_portal_onboarding_access_given_datetime} IS NOT NULL
    description: TRUE when learning portal onboarding access was granted
    visibility: "internal"
  - id: preferred_languages_for_communication
