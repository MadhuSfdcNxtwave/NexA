id: nw_events_all_users_registration_details
type: model
description: >-
  This table captures event registration details for all users on the CCBP
  learning platform. Each row represents a single user's registration for a
  specific event. Event categories covered include - VIRTUAL_MEET_UP,
  CHALLENGE, MEGA_WORKSHOP, PODCAST.

  Note - user_id is stored as UUID WITH hyphens. Apply REPLACE(user_id, "-", "")
  when joining to tables that store user_id without hyphens (e.g.,
  y_academy_user_event_engagement_details, z_ccbp_academy_users_master_data,
  academy_virtual_meet_up_user_attendance_details).
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`nw_\
  events_all_users_registration_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of event registration records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who registered for events
  - id: unique_events
    func: count_distinct
    of: event_id
    description: Count of unique events that had at least one registration
dimensions:
  - id: user_event_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${event_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and event_id for each user's event registration record
  - id: event_category
    type: string
    description: >-
      Category classification of the event. No NULL values present in this column. Exact enum values -
        • VIRTUAL_MEET_UP
        • CHALLENGE
        • MEGA_WORKSHOP
        • PODCAST

      OPEN QUESTION (stakeholder confirmation required) - a separate
      category named just 'WORKSHOP' has been observed/mentioned but its scope,
      definition, and relationship to MEGA_WORKSHOP are not yet clarified. Before
      using 'WORKSHOP' in any analysis or segmentation, please confirm with the
      table owner/requester (a) whether 'WORKSHOP' is a valid current category,
      (b) how it differs from MEGA_WORKSHOP, and (c) whether it should be treated
      as a distinct category or merged.
  - id: event_id
    type: string
    description: Unique identifier of the event (UUID without hyphens).
  - id: event_title
    type: string
    description: Title of the event. Note - the same event_title may appear across multiple event_ids (e.g., recurring podcasts or weekly meetups using the same name). Always use event_id as the canonical identifier for joining and segmenting at the event level; reserve event_title for display purposes only.
  - id: event_registration_datetime
    type: timestamp_naive
    description: Timestamp when the user registered for the event.
  - id: event_registration_date
    type: date
    expr_sql: DATE(${event_registration_datetime})
    description: Date portion of event_registration_datetime. Useful for daily, weekly, and monthly trend aggregations.
  - id: user_id
    type: string
    description: Unique identifier of the user (UUID with hyphens).
relations:
  - id: y_academy_user_event_engagement_details
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${y_academy_user_event_engagement_details.user_id} AND ${event_id} = ${y_academy_user_event_engagement_details.event_id}
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${event_registration_datetime}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
