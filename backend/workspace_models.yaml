id: acad_weekend_sprint_commitment_registration_form_responses
type: model
description: >-
  This form is created for weekly Weekend Sprint session confirmations.
  Weekend Sprints are live AI full-stack project-building sessions conducted
  every Sunday. The form includes details such as the topic of the week, the
  project students will build during the session, and the expected learning
  outcomes. Students who register through this form are providing confirmation
  that they understand the session details and intend to attend the weekend
  sprint regularly. The primary use case of this form is to track student
  participation interest, measure engagement for weekly sprint sessions, and
  maintain attendance intent data for operational planning and communication
  purposes.

  Form sections:
   - Commitment: intent to attend the upcoming weekend sprint
   - Motivation: reasons for joining the weekend sprint (multi-select)
   - Outcome: expected achievements by the end of the class (multi-select)
   - Experience: prior MERN/AI project experience level
   - Prerequisites: mandatory setup checklist before joining the session (select all)

  Note: a user may submit the form more than once (for different weekend sprints);
  use form_submission_datetime along with user_id to uniquely identify a response.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  d_weekend_sprint_commitment_registration_form_responses`"
measures:
  - id: count_of_records
    func: count
    description: Total number of weekend sprint form submissions
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who submitted the weekend sprint registration form
dimensions:
  - id: user_submission_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${form_submission_datetime} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and form_submission_datetime, since a user may submit the form multiple times across weekend sprints
  - id: user_id
    type: string
    description: Unique identifier of the user who submitted the form (UUID with hyphens)
  - id: form_submission_datetime
    type: timestamp_naive
    description: Date and time when the user submitted the weekend sprint registration form
  - id: are_you_ready_to_commit_to_attending_the_upcoming_weekend_sprint
    type: string
    description: >-
      Commitment intent of the user toward attending the upcoming weekend sprint. Exact enum values -
        • Yes, fully committed
        • Will try my best
  - id: why_do_you_want_to_join_this_weekend_sprint
    type: string
    description: >-
      User's motivation(s) for joining the weekend sprint. Multi-select field;
      multiple reasons are stored as comma-separated values. Possible options -
      Build a real-world AI project, Learn MERN stack with hands-on coding,
      Strengthen my portfolio with a live project, Improve placement/job readiness.
  - id: what_do_you_expect_to_achieve_by_the_end_of_this_class
    type: string
    description: >-
      Expected outcomes the user wants to achieve by the end of the session.
      Multi-select field; multiple outcomes are stored as comma-separated values.
      Possible options - Build and deploy the AI project, Understand how AI
      integrates into web apps, Learn end-to-end project workflow, Gain
      confidence in full stack development.
  - id: have_you_worked_on_any_mern_or_ai_based_project_before
    type: string
    description: >-
      Self-reported prior project experience of the user. Exact enum values -
        • Yes, both MERN & AI
        • Only MERN projects
        • Only AI basics
        • No, this will be my first project
  - id: prerequisites_checklist_mandatory_before_joining_the_session
    type: string
    description: >-
      Mandatory prerequisites checklist the user confirmed before joining the
      session (select-all field; stored as comma-separated values). Items -
      VS Code installed on your system, Node.js installed and working, Basic
      understanding of MERN stack (MongoDB, Express, React, Node).
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
