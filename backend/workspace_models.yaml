    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}

  - id: academy_student_success_salesforce_task_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_student_success_salesforce_task_details.user_id}

  - id: academy_nbfc_renewals_conversion_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_nbfc_renewals_conversion_details.user_id}

  - id: y_academy_user_event_engagement_details
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${y_academy_user_event_engagement_details.user_id}

id: z_ccbp_users_cloudwatch_interactions_with_live_classes
type: model
description: >-
  Live Classes interaction events captured from CloudWatch and transformed into a
  structured analytics table for HEX AI Analytics.

  Each row represents a single user interaction on the Live Classes surface of the
  CCBP learning platform. Depending on the interaction type, only a subset of
  contextual columns will be populated — NULL values are expected for fields that
  are not relevant to a particular interaction.

  Active interactions covered (see interaction → context mapping below):
  NAV_ITEM_BUTTON_CLICKED, LIVE_SESSION_RESOURCE_CARD_CLICKED,
  LIVE_SESSION_COURSE_SCHEDULE_CTA_CLICKED, LIVE_SESSION_FAQ_CLICKED,
  LIVE_SESSION_FILTER_OPTION_CLICKED,
  CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_NOTIFY_ME,
  CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_EXPLORE_LATER,
  LIVE_CLASSES_TOP_BANNER_CLICKED,
  LIVE_CLASSES_ENROLLED_COURSES_CAROUSEL_NAV_CLICKED,
  LIVE_CLASSES_ENROLLED_COURSE_CARD_CTA_CLICKED,
  LIVE_CLASSES_FOR_YOUR_JOURNEY_CAROUSEL_NAV_CLICKED,
  LIVE_CLASSES_FOR_YOUR_JOURNEY_CARD_CTA_CLICKED,
  LIVE_CLASSES_CATEGORY_SECTION_CARD_CTA_CLICKED,
  LIVE_CLASSES_CATEGORY_SECTION_CAROUSEL_NAV_CLICKED,
  LIVE_CLASSES_NEW_ON_NXTWAVE_CLICKED, LIVE_SESSION_SEARCH_BAR_FOCUSED,
  LIVE_SESSION_SEARCH_QUERY_ENTERED, LIVE_SESSION_SEARCH_BAR_CLEARED,
  LIVE_CLASSES_SEARCH_RESULT_CLICKED.

  Interaction Categories

  Navigation
  - NAV_ITEM_BUTTON_CLICKED

  Resource Discovery
  - LIVE_SESSION_RESOURCE_CARD_CLICKED
  - LIVE_CLASSES_TOP_BANNER_CLICKED

  Scheduling
  - LIVE_SESSION_COURSE_SCHEDULE_CTA_CLICKED

  Search
  - LIVE_SESSION_SEARCH_BAR_FOCUSED
  - LIVE_SESSION_SEARCH_QUERY_ENTERED
  - LIVE_SESSION_SEARCH_BAR_CLEARED
  - LIVE_CLASSES_SEARCH_RESULT_CLICKED

  Filters
  - LIVE_SESSION_FILTER_OPTION_CLICKED
  - CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_NOTIFY_ME
  - CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_EXPLORE_LATER

  FAQ & Help
  - LIVE_SESSION_FAQ_CLICKED

  Course Discovery & Selection
  - LIVE_CLASSES_ENROLLED_COURSE_CARD_CTA_CLICKED
  - LIVE_CLASSES_FOR_YOUR_JOURNEY_CARD_CTA_CLICKED
  - LIVE_CLASSES_CATEGORY_SECTION_CARD_CTA_CLICKED

  Carousel Navigation
  - LIVE_CLASSES_ENROLLED_COURSES_CAROUSEL_NAV_CLICKED
  - LIVE_CLASSES_FOR_YOUR_JOURNEY_CAROUSEL_NAV_CLICKED
  - LIVE_CLASSES_CATEGORY_SECTION_CAROUSEL_NAV_CLICKED

  Promotional Discovery
  - LIVE_CLASSES_NEW_ON_NXTWAVE_CLICKED

  Note: user_id is stored as UUID WITH hyphens. Apply REPLACE(user_id, "-", "")
  when joining to tables that store user_id without hyphens.

  Analytics Guidance

  Event Grain:
  - One row represents one interaction event.

  Recommended Metrics:
  - count(*) = total interaction events.
  - count(distinct user_id) = unique users performing an interaction.
  - count(distinct user_event_key) = deduplicated interaction events when joins introduce duplicates.

  Best Practices:
  - Always filter using interaction when analyzing specific Live Classes actions.
  - Context columns are sparsely populated and should only be used for interactions that support them.
  - Null values are expected for non-applicable context fields.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_c\
  cbp_users_cloudwatch_interactions_with_live_classes`"
measures:
  - id: count_of_records
    func: count
    description: Total number of Live Classes interaction events
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who triggered Live Classes interactions
  - id: unique_interaction_types
    func: count_distinct
    of: interaction
    description: Count of distinct interaction types observed
dimensions:
  - id: user_event_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${interaction}, '-', CAST(${event_time} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, interaction, and event_time for each Live Classes interaction record
  - id: user_id
    type: string
    description: Unique identifier of the user who performed the interaction (UUID with hyphens). Apply REPLACE(user_id, "-", "") when joining to tables that store user_id without hyphens.
  - id: event_time
    type: timestamp_naive
    description: >-
      Timestamp when the Live Classes interaction (click, search, filter, carousel nav, etc.)
      occurred on the client side, captured via CloudWatch. Use this to analyze when users
      engage with the Live Classes surface — e.g., pre-class discovery flows, browsing
      patterns around scheduled slot times, drop-off after a slot ends, and time-of-day
      usage of search/filter/category interactions. Also useful for funnel ordering across
      Live Classes interactions within a single user session.
  - id: event_date
    type: date
    expr_sql: DATE(${event_time})
    description: Date extracted from event_time for daily aggregations and trend analysis.
  - id: interaction
    type: string
    description: >-
      Name of the interaction/event performed by the user. Drives the interpretation of all
      contextual columns — each interaction populates only a relevant subset. Exact enum values -
        • NAV_ITEM_BUTTON_CLICKED
        • LIVE_SESSION_RESOURCE_CARD_CLICKED
        • LIVE_SESSION_COURSE_SCHEDULE_CTA_CLICKED
        • LIVE_SESSION_FAQ_CLICKED
        • LIVE_SESSION_FILTER_OPTION_CLICKED
        • CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_NOTIFY_ME
        • CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_EXPLORE_LATER
        • LIVE_CLASSES_TOP_BANNER_CLICKED
        • LIVE_CLASSES_ENROLLED_COURSES_CAROUSEL_NAV_CLICKED
        • LIVE_CLASSES_ENROLLED_COURSE_CARD_CTA_CLICKED
        • LIVE_CLASSES_FOR_YOUR_JOURNEY_CAROUSEL_NAV_CLICKED
        • LIVE_CLASSES_FOR_YOUR_JOURNEY_CARD_CTA_CLICKED
        • LIVE_CLASSES_CATEGORY_SECTION_CARD_CTA_CLICKED
        • LIVE_CLASSES_CATEGORY_SECTION_CAROUSEL_NAV_CLICKED
        • LIVE_CLASSES_NEW_ON_NXTWAVE_CLICKED
        • LIVE_SESSION_SEARCH_BAR_FOCUSED
        • LIVE_SESSION_SEARCH_QUERY_ENTERED
        • LIVE_SESSION_SEARCH_BAR_CLEARED
        • LIVE_CLASSES_SEARCH_RESULT_CLICKED

      This column should be the primary dimension used for segmenting Live Classes behavior.
  - id: page_from
    type: string
    description: Source page from which the user navigated. Populated only for NAV_ITEM_BUTTON_CLICKED.
  - id: page_to
    type: string
    description: Destination page navigated to by the user. Populated only for NAV_ITEM_BUTTON_CLICKED.
  - id: device
    type: string
    description: Device type from which navigation was performed. Populated only for NAV_ITEM_BUTTON_CLICKED.
  - id: source_url
    type: string
    description: >-
      URL or page location where the interaction occurred.

      This is one of the most widely populated context fields and is useful for
      understanding entry points, navigation paths, and page-level interaction behavior.
  - id: course_id
    type: string
    description: >-
      Unique course identifier associated with the interaction (UUID with hyphens).

      Represents the course being explored, scheduled, recommended, or whose live session
      resource was clicked.

      Populated for:
      - LIVE_SESSION_RESOURCE_CARD_CLICKED
      - LIVE_SESSION_COURSE_SCHEDULE_CTA_CLICKED
      - LIVE_CLASSES_ENROLLED_COURSE_CARD_CTA_CLICKED
      - LIVE_CLASSES_FOR_YOUR_JOURNEY_CARD_CTA_CLICKED
      - LIVE_CLASSES_CATEGORY_SECTION_CARD_CTA_CLICKED
  - id: course_title
    type: string
    description: >-
      Human-readable course title. Populated for -
      LIVE_CLASSES_ENROLLED_COURSE_CARD_CTA_CLICKED,
      LIVE_CLASSES_FOR_YOUR_JOURNEY_CARD_CTA_CLICKED,
      LIVE_CLASSES_CATEGORY_SECTION_CARD_CTA_CLICKED.
  - id: cohort_id
    type: string
    description: >-
      Cohort identifier associated with a live session resource (UUID with hyphens).
      Populated only for LIVE_SESSION_RESOURCE_CARD_CLICKED. A cohort is a template
      containing a series of daily slots, so the relationship from cohort_id to slot_id
      in z_academy_users_live_classes_attendance_and_time_spent_details is one-to-many —
      a single cohort_id maps to many slot_ids.
  - id: topic_id
    type: string
    description: Topic identifier associated with a live session resource (UUID with hyphens). Populated only for LIVE_SESSION_RESOURCE_CARD_CLICKED.
  - id: resource_id
    type: string
    description: >-
      Resource identifier associated with a clicked live session resource (UUID with hyphens).
      Populated only for LIVE_SESSION_RESOURCE_CARD_CLICKED. resource_id is equivalent to
      unit_id elsewhere on the platform — it can be mapped to unit_id in any unit-level
      table (e.g., content_question_set_units_questions_details.question_set_id,
      users_discussion_comments_summary_details.unit_id) for unit-level context.
  - id: faq_question
    type: string
    description: FAQ question selected by the user. Populated only for LIVE_SESSION_FAQ_CLICKED.
  - id: direction
    type: string
    description: >-
      Carousel navigation direction. Typical values - LEFT, RIGHT, PREVIOUS, NEXT. Populated for -
      LIVE_CLASSES_ENROLLED_COURSES_CAROUSEL_NAV_CLICKED,
      LIVE_CLASSES_FOR_YOUR_JOURNEY_CAROUSEL_NAV_CLICKED,
      LIVE_CLASSES_CATEGORY_SECTION_CAROUSEL_NAV_CLICKED.
  - id: cta_type
    type: string
    description: >-
      Type of call-to-action clicked by the user. Populated for -
      LIVE_CLASSES_ENROLLED_COURSE_CARD_CTA_CLICKED,
      LIVE_CLASSES_FOR_YOUR_JOURNEY_CARD_CTA_CLICKED,
      LIVE_CLASSES_CATEGORY_SECTION_CARD_CTA_CLICKED.
  - id: search_query
    type: string
    description: Search text entered by the user. Populated only for LIVE_SESSION_SEARCH_QUERY_ENTERED.
  - id: search_result
    type: string
    description: Search result selected by the user. Populated only for LIVE_CLASSES_SEARCH_RESULT_CLICKED.
  - id: filter_label
    type: string
    description: >-
      Display label of the selected filter. Populated only for LIVE_SESSION_FILTER_OPTION_CLICKED.

      Used for analyzing filter adoption and filter transition behavior.
  - id: filter_value
    type: string
    description: >-
      Internal value representing the selected filter. Populated for -
      LIVE_SESSION_FILTER_OPTION_CLICKED,
      CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_NOTIFY_ME,
      CLICKED_ON_COURSE_LIVE_SESSIONS_EMPTY_STATE_EXPLORE_LATER.

      Used for analyzing filter adoption and filter transition behavior.
  - id: previous_filter
    type: string
    description: >-
      Previously selected filter before the current change. Populated only for LIVE_SESSION_FILTER_OPTION_CLICKED.

      Used for analyzing filter adoption and filter transition behavior.
  - id: new_filter
    type: string
    description: >-
      Newly selected filter after the change. Populated only for LIVE_SESSION_FILTER_OPTION_CLICKED.

      Used for analyzing filter adoption and filter transition behavior.
  - id: filter_action
    type: string
    description: >-
      Action performed on a filter. Examples - SELECT, CHANGE, REMOVE, RESET.
      Populated only for LIVE_SESSION_FILTER_OPTION_CLICKED.

      Used for analyzing filter adoption and filter transition behavior.
  - id: category_enum
    type: string
    description: >-
      Category identifier associated with category-based Live Classes sections. Populated for -
      LIVE_CLASSES_CATEGORY_SECTION_CARD_CTA_CLICKED,
      LIVE_CLASSES_CATEGORY_SECTION_CAROUSEL_NAV_CLICKED.
  - id: card_id
    type: string
    description: Identifier of the card clicked within the 'New on NxtWave' section. Populated only for LIVE_CLASSES_NEW_ON_NXTWAVE_CLICKED.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${event_time}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(DATE(${event_time}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND DATE_TRUNC(DATE(${event_time}), MONTH) = ${academy_nps_form_responses.form_submission_month}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_live_classes_attendance_and_time_spent_details.user_id} AND REPLACE(${course_id}, "-", "") = REPLACE(${z_academy_users_live_classes_attendance_and_time_spent_details.course_id}, "-", "")
  - id: live_classes_attendance_by_cohort
    type: one_to_many
    target: z_academy_users_live_classes_attendance_and_time_spent_details
    join_sql: ${user_id} = ${live_classes_attendance_by_cohort.user_id} AND ${cohort_id} = ${live_classes_attendance_by_cohort.cohort_id}
  - id: z_academy_users_live_classes_recordings_watched_details
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_live_classes_recordings_watched_details.user_id} AND REPLACE(${course_id}, "-", "") = REPLACE(${z_academy_users_live_classes_recordings_watched_details.course_id}, "-", "")
  - id: live_classes_user_feedback_responses
    type: one_to_many
    join_sql: ${user_id} = ${live_classes_user_feedback_responses.user_id} AND REPLACE(${course_id}, "-", "") = REPLACE(${live_classes_user_feedback_responses.course_id}, "-", "")

id: z_ccbp_users_cloudwatch_interactions_with_nav_bar
type: model
description: >-
  Logs every user interaction with the navigation bar on the CCBP learning
  platform. 

  Each row represents a single nav event — a click, route change, modal open, or
  side-effect action — captured via CloudWatch. 

  Contains two distinct interaction paradigms tracked across different time
  periods, with known data quality issues around device–nav_zone mismatches and
  null values in legacy records.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_c\
  cbp_users_cloudwatch_interactions_with_nav_bar`"
measures:
  - id: count_of_records
    func: count
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who triggered nav interactions
dimensions:
  - id: user_event_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${event_time} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and event_time for each nav interaction record
  - id: user_id
    type: string
    description: Unique identifier of the user, which is UUID with hyphens.
  - id: event_time
    type: timestamp_naive
    description: Timestamp of when the nav interaction was triggered on the client side, captured via CloudWatch. Useful for time-series analysis, session stitching, and funnel ordering.
  - id: event_date
    type: date
    expr_sql: DATE(${event_time})
    description: Date extracted from event_time for daily aggregations and trend analysis.
  - id: interaction
    type: string
    description: >-
      Type of nav interaction. Two values exist across two eras. Filter to NAVIGATION_INTERACTION for clean analysis. Exact enum values -
        • NAVIGATION_INTERACTION    (active from 31 March 2025, full metadata populated)
        • NAV_ITEM_BUTTON_CLICKED   (legacy, 31 Dec 2024 to 30 March 2025, nav_zone and destination_type will be NULL)
  - id: nav_zone
    type: string
    description: >-
      UI component/region where the nav click originated. NULL for legacy rows. Known issue - not device-restricted, so don't use as proxy for device type. Exact enum values -
        • idp_desktop_sidebar
        • tablet_bottom_sheet
        • profile_menu
        • tablet_user_profile
        • header_top_nav
        • mobile_side_drawer
  - id: page_from
    type: string
    description: Page or route the user was on when the nav interaction occurred. Use with page_to to reconstruct navigation flows. NULL for legacy NAV_ITEM_BUTTON_CLICKED rows.
  - id: page_to
    type: string
    description: Destination page or route after the nav interaction. Meaningful only when destination_type is route or external. Not meaningful for modal/action types (no URL change).
  - id: destination_type
    type: string
    description: >-
      Outcome of the nav interaction. NULL for legacy rows. Exact enum values -
        • route      (in-app navigation)
        • modal      (overlay/dialog)
        • action     (side-effect like logout)
        • external   (external website)
  - id: device
    type: string
    description: >-
      Device category at interaction time. Known issue - mismatches with nav_zone exist, so rely on device as the source of truth. Exact enum values -
        • MOBILE
        • DESKTOP
        • TABLET
  - id: is_modern_interaction
    type: boolean
    expr_sql: ${interaction} = 'NAVIGATION_INTERACTION'
    description: TRUE for modern NAVIGATION_INTERACTION events (from 31 March 2025) with full metadata; FALSE for legacy NAV_ITEM_BUTTON_CLICKED events. Use to filter for clean analysis.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${event_time}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id}
  - id: academy_nps_form_responses
    type: one_to_many
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}

id: z_ccbp_users_cloudwatch_interactions_with_role_roadmaps
type: model
description: >-
  Role Roadmaps interaction events captured from CloudWatch.

  This model contains user interactions related to the Role Roadmaps feature within
  the My Journey experience. It is intended to support behavioral analytics,
  engagement analysis, roadmap discovery analysis, and feature adoption reporting.

  Event Grain:
  - One row represents one user interaction event.

  Active interactions covered:

  Navigation
  - MY_JOURNEY_ROLE_ROADMAPS_TAB_CLICKED

  Roadmap Discovery
  - MY_JOURNEY_INFO_MODAL_EXPLORE_ROADMAPS_CLICKED
  - ROLE_ROADMAPS_ACTIVE_CARD_CLICKED

  Value Proposition Engagement
  - ROLE_ROADMAPS_VALUE_PROP_CLICKED

  Interaction → Context Mapping

  MY_JOURNEY_ROLE_ROADMAPS_TAB_CLICKED
  - source_url

  MY_JOURNEY_INFO_MODAL_EXPLORE_ROADMAPS_CLICKED
  - source_url

  ROLE_ROADMAPS_ACTIVE_CARD_CLICKED
  - source_url
  - role_slug
  - role_title

  ROLE_ROADMAPS_VALUE_PROP_CLICKED
  - source_url
  - value_prop_index
  - value_prop_label

  Interaction not currently observed in CloudWatch:
  - ROLE_ROADMAPS_UPCOMING_CARD_NOTIFY_ME_CLICKED

  Analytics Guidance

  Recommended Metrics:
  - count(*) = total interaction events.
  - count(distinct user_id) = unique users performing an interaction.

  Best Practices:
  - Always analyze interactions using the interaction column.
  - Context columns are sparsely populated and only applicable to specific interactions.
  - Null values are expected for non-applicable context fields.
  - role_title is the primary business dimension for roadmap engagement analysis.
  - value_prop_label is the primary business dimension for value proposition engagement analysis.

  Note: user_id is stored as UUID WITH hyphens. Apply REPLACE(user_id, "-", "")
  when joining to tables that store user_id without hyphens.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_c\
  cbp_users_cloudwatch_interactions_with_role_roadmaps`"
measures:
  - id: count_of_records
    func: count
    description: Total number of Role Roadmaps interaction events
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who triggered Role Roadmaps interactions
  - id: unique_interaction_types
    func: count_distinct
    of: interaction
    description: Count of distinct interaction types observed
dimensions:
  - id: user_event_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${interaction}, '-', CAST(${event_time} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, interaction, and event_time for each Role Roadmaps interaction record
  - id: interaction
    type: string
    description: >-
      Name of the interaction event captured from CloudWatch. This column should be
      the primary dimension used for segmenting Role Roadmaps behavior.

      Supported interactions:
      - MY_JOURNEY_ROLE_ROADMAPS_TAB_CLICKED
      - MY_JOURNEY_INFO_MODAL_EXPLORE_ROADMAPS_CLICKED
      - ROLE_ROADMAPS_ACTIVE_CARD_CLICKED
      - ROLE_ROADMAPS_VALUE_PROP_CLICKED

      Expected but currently not observed:
      - ROLE_ROADMAPS_UPCOMING_CARD_NOTIFY_ME_CLICKED
  - id: event_time
    type: timestamp_naive
    description: Timestamp when the interaction event occurred.
  - id: event_date
    type: date
    expr_sql: DATE(${event_time})
    description: Date extracted from event_time for daily aggregations and trend analysis.
  - id: source_url
    type: string
    description: >-
      URL or page location where the interaction occurred. Populated for all four
      active interactions. Useful for understanding navigation paths, page-level
      engagement, and feature entry points.
  - id: role_title
    type: string
    description: >-
      Human-readable title of the roadmap role selected by the user. Populated only
      for ROLE_ROADMAPS_ACTIVE_CARD_CLICKED. Primary dimension for analyzing roadmap
      popularity and user interest across different career roles.
  - id: value_prop_label
    type: string
    description: >-
      Label or text associated with the value proposition clicked by the user.
      Populated only for ROLE_ROADMAPS_VALUE_PROP_CLICKED. Primary dimension for
      analyzing which roadmap value propositions resonate most with users.
  - id: value_prop_index
    type: number
    description: >-
      Position of the value proposition item clicked by the user. Populated only
      for ROLE_ROADMAPS_VALUE_PROP_CLICKED. Useful for analyzing engagement by
      value proposition placement and ordering.
  - id: role_slug
    type: string
    description: >-
      Internal roadmap role identifier associated with the selected roadmap.
      Populated only for ROLE_ROADMAPS_ACTIVE_CARD_CLICKED.
  - id: user_id
    type: string
    description: Unique identifier of the user who performed the interaction (UUID with hyphens). Apply REPLACE(user_id, "-", "") when joining to tables that store user_id without hyphens.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${event_time}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(DATE(${event_time}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND DATE_TRUNC(DATE(${event_time}), MONTH) = ${academy_nps_form_responses.form_submission_month}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}

id: z_users_contextual_feedback_details
type: model
format: long
grain: one row per user per question response
survey:
  long:
    question_col: question_text
    answer_col: user_answer
    trigger_col: feedback_trigger
    type_col: question_type
    topic_columns:
      - user_answer
      - question_text
      - feedback_trigger
topic_columns:
  - user_answer
  - question_text
  - feedback_trigger
description: >-
  Captures contextual, in-app user feedback collected on the CCBP learning platform
  based on specific user triggers (events or page visits).

  Each row represents a single user's response to one question within a feedback survey.

  Feedback surveys are triggered by micro user experiences such as visiting a page,
  performing an action, or spending time on a feature.

  IMPORTANT:
  - A single feedback_id represents a full survey (multiple questions)
  - Always analyze data based on the actual TEXT values of feedback_trigger and question_text — do NOT rely on feedback_type (EVENT/URL).
  - feedback_type is a tech-team-side classification and is unreliable: an EVENT may be created for a page visit, and the same trigger context can be implemented as either EVENT or URL. Treat it as metadata only.
  - Before answering stakeholder queries, always inspect the distinct feedback_trigger text values and question_text together to determine the real user context being measured.
  - Same question_id may appear across multiple triggers
  - Surveys are shown only once per user per feedback_id

  Known Data Considerations:
  - Some records have NULL feedback_trigger or malformed URL values (e.g., '//')
  - user_answer format varies by question_type (numeric for EMOJI, text otherwise)
  - enroll_plans_str is a JSON string and requires parsing for analysis
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`users_contextual_feedback_details`"
measures:
  - id: total_responses
    func: count
    description: Total number of question-level responses submitted
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Number of unique users who submitted feedback
  - id: unique_feedback_surveys
    func: count_distinct
    of: feedback_id
    description: Number of unique feedback survey instances
  - id: avg_emoji_rating
    func: avg
    of: emoji_rating
    description: Average rating for EMOJI-type questions (scale typically 1–5)
dimensions:
  - id: user_feedback_question_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${feedback_id}, '-', CAST(${question_id} AS STRING))
    unique: true
    visibility: "internal"
    description: Unique key representing one user's response to a specific question in a feedback survey
  - id: user_id
    type: string
    description: Unique identifier for the user (UUID with hyphens)
  - id: feedback_id
    type: string
    description: Unique identifier for a feedback survey instance (group of questions)
  - id: feedback_trigger
    type: string
    description: >-
      Trigger that caused the feedback survey to appear.
      Can be a URL path (e.g., /course-library, /leaderboard) or an event name
      (e.g., VISITED_COURSE_LIBRARY_V2).
      This is the most important dimension for analysis. Always segment or filter by this.
  - id: feedback_type
    type: string
    description: >-
      Tech-side classification of the trigger (EVENT or URL).
      WARNING: This is set by the tech team and is NOT a reliable indicator of user context — an EVENT may be created for a page visit and vice versa.
      Do NOT segment or filter analysis purely on this field. Always rely on the actual text of feedback_trigger and question_text to interpret the user experience being measured.
  - id: question_id
    type: number
    description: Unique identifier of the question
  - id: question_order
    type: number
    description: Order of the question within the feedback survey
  - id: question_type
    type: string
    description: >-
      Type of question. Exact enum values -
        • EMOJI            (rating scale)
        • SINGLE_SELECT
        • MULTI_SELECT
        • TEXTUAL
  - id: question_text
    type: string
    description: Actual question shown to the user
  - id: user_answer
    type: string
    description: Raw response submitted by the user (format varies by question type)
  - id: emoji_rating
    type: number
    expr_sql: SAFE_CAST(${user_answer} AS INT64)
    description: Numeric rating extracted from user_answer for EMOJI-type questions
  - id: submitted_date
    type: date
    description: Date when the feedback was submitted
  - id: enroll_plans_str
    type: string
    description: JSON string containing list of user's enrolled plans
  - id: is_valid_question
    type: boolean
    expr_sql: >
      ${question_id} IS NOT NULL 
      AND ${question_order} IS NOT NULL 
      AND ${question_type} IS NOT NULL
    description: TRUE if essential question fields are present
  - id: is_valid_trigger
    type: boolean
    expr_sql: >
      ${feedback_trigger} IS NOT NULL 
      AND ${feedback_trigger} NOT IN ('', '//')
    description: TRUE if feedback trigger is valid and usable for analysis
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${submitted_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(${submitted_date}, MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: z_academy_users_course_wise_completion_details
    type: one_to_many
