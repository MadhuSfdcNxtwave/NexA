id: z_academy_placement_eligibility_user_wise_stage_wise_best_attempts
type: model
description: >-
  This table consolidates the best assessment attempt per user per stage across
  the Academy Placement Eligibility process. It covers both Online stages
  (Prelims, DSA, Prelims+DSA) and the Offline Drive stage.

  ALSO KNOWN AS:
  - "Placement Roadmap Assessments" — this
    is the common business/stakeholder name for this same process. Treat any
    reference to "Placement Roadmap Assessments" as referring to this table
    and the Academy Placement Eligibility assessment funnel it captures.

  The "best attempt" is determined by a priority ranking — preferring better
  qualification outcomes first, then higher score percentages, then earlier
  assessment start datetimes. Only assessments tagged with
  ACADEMY_PLACEMENT_ELIGIBILITY and of type MAIN are included, and only for
  users who were given access.

  The table is the single source of truth for answering: "For each student, what
  was their best result at each stage, and do they qualify overall?"
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_a\
  cademy_placement_eligibility_user_wise_stage_wise_best_attempts`"
measures:
  - id: count_of_records
    func: count
    description: Total number of user-stage best-attempt records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users with at least one stage attempt
  - id: prelims_attempted_users
    func: count_distinct
    of: user_id
    filters:
      - is_prelims_attempted
    description: Unique users who attempted Prelims stage
  - id: prelims_qualified_users
    func: count_distinct
    of: user_id
    filters:
      - is_prelims_qualified
    description: Unique users who qualified the Prelims stage
  - id: dsa_attempted_users
    func: count_distinct
    of: user_id
    filters:
      - is_dsa_attempted
    description: Unique users who attempted DSA stage
  - id: dsa_qualified_users
    func: count_distinct
    of: user_id
    filters:
      - is_dsa_qualified
    description: Unique users who qualified the DSA stage
  - id: prelims_dsa_attempted_users
    func: count_distinct
    of: user_id
    filters:
      - is_prelims_dsa_attempted
    description: Unique users who attempted the combined Prelims+DSA stage
  - id: prelims_dsa_qualified_users
    func: count_distinct
    of: user_id
    filters:
      - is_prelims_dsa_qualified
    description: Unique users who qualified the Prelims+DSA stage
  - id: offline_drive_attempted_users
    func: count_distinct
    of: user_id
    filters:
      - is_offline_drive_attempted
    description: Unique users who attempted the Offline Drive stage
  - id: offline_drive_qualified_users
    func: count_distinct
    of: user_id
    filters:
      - is_offline_drive_qualified
    description: Unique users who qualified the Offline Drive stage (any bucket A/B/C)
  - id: offline_drive_bucket_a_users
    func: count_distinct
    of: user_id
    filters:
      - is_offline_drive_bucket_a
    description: Unique users who qualified Offline Drive via Bucket A
  - id: offline_drive_bucket_b_users
    func: count_distinct
    of: user_id
    filters:
      - is_offline_drive_bucket_b
    description: Unique users who qualified Offline Drive via Bucket B
  - id: offline_drive_bucket_c_users
    func: count_distinct
    of: user_id
    filters:
      - is_offline_drive_bucket_c
    description: Unique users who qualified Offline Drive via Bucket C
  - id: prelims_qualification_rate
    func_sql: SAFE_DIVIDE(COUNT(DISTINCT IF(${is_prelims_qualified}, ${user_id}, NULL)), COUNT(DISTINCT IF(${is_prelims_attempted}, ${user_id}, NULL))) * 100
    description: Percentage of Prelims attempters who qualified
  - id: dsa_qualification_rate
    func_sql: SAFE_DIVIDE(COUNT(DISTINCT IF(${is_dsa_qualified}, ${user_id}, NULL)), COUNT(DISTINCT IF(${is_dsa_attempted}, ${user_id}, NULL))) * 100
    description: Percentage of DSA attempters who qualified
  - id: offline_drive_qualification_rate
    func_sql: SAFE_DIVIDE(COUNT(DISTINCT IF(${is_offline_drive_qualified}, ${user_id}, NULL)), COUNT(DISTINCT IF(${is_offline_drive_attempted}, ${user_id}, NULL))) * 100
    description: Percentage of Offline Drive attempters who qualified (any bucket)
  - id: avg_prelims_score_percentage
    func: avg
    of: prelims_user_assessment_score_percentage
    description: Average overall Prelims score percentage across users (best attempt)
  - id: avg_dsa_score_percentage
    func: avg
    of: dsa_user_assessment_score_percentage
    description: Average overall DSA score percentage across users (best attempt)
  - id: avg_prelims_dsa_score_percentage
    func: avg
    of: prelims_dsa_user_assessment_score_percentage
    description: Average overall Prelims+DSA score percentage across users (best attempt)
  - id: avg_offline_drive_score_percentage
    func: avg
    of: offline_drive_user_assessment_score_percentage
    description: Average overall Offline Drive score percentage across users (best attempt)
dimensions:
  - id: user_id
    type: string
    unique: true
    description: Unique identifier for the user (UUID with hyphens). Primary key — one row per user. Joins to other tables across the project.
  - id: year_of_graduation
    type: number
    description: User's year of graduation
  - id: current_status
    type: string
    description: >-
      Overall student status derived by joining best attempts across all stages.
      Reflects the highest stage reached and outcome. NULL if the student doesn't
      match the best-attempts model due to a failed LEFT JOIN.

  # ─── Prelims stage ───
  - id: prelims_organisation_assessment_id
    type: string
    description: Organisation assessment ID for the user's best Prelims attempt
  - id: prelims_assessment_start_datetime
    type: timestamp_naive
    description: Scheduled start datetime of the user's best Prelims attempt
  - id: prelims_stage_status
    type: string
    description: >-
      Qualification outcome for the Prelims stage. NULL if the user did not attempt Prelims. Exact enum values -
        • Qualified
        • Not Qualified
  - id: prelims_user_assessment_score_percentage
    type: number
    description: User's overall total score percentage in the best Prelims attempt
  - id: prelims_problem_solving_coding_score_percentage
    type: number
    description: Problem Solving Coding section percentage in Prelims. Qualification threshold ≥ 50%.
  - id: prelims_aptitude_and_verbal_ability_mcqs_score_percentage
    type: number
    description: Aptitude & Verbal Ability MCQs section percentage in Prelims
  - id: prelims_technical_mcqs_score_percentage
    type: number
    description: Technical MCQs section percentage in Prelims

  # ─── DSA stage ───
  - id: dsa_organisation_assessment_id
    type: string
    description: Organisation assessment ID for the user's best DSA attempt
  - id: dsa_assessment_start_datetime
    type: timestamp_naive
    description: Scheduled start datetime of the user's best DSA attempt
  - id: dsa_stage_status
    type: string
    description: >-
      Qualification outcome for the DSA stage. NULL if the user did not attempt DSA. Exact enum values -
        • Qualified
        • Not Qualified
  - id: dsa_user_assessment_score_percentage
    type: number
    description: User's overall total score percentage in the best DSA attempt
  - id: dsa_coding_score_percentage
    type: number
    description: Problem Solving Coding section percentage in DSA. Qualification threshold ≥ 50%.

  # ─── Prelims + DSA stage ───
  - id: prelims_dsa_organisation_assessment_id
    type: string
    description: Organisation assessment ID for the user's best Prelims+DSA attempt
  - id: prelims_dsa_assessment_start_datetime
    type: timestamp_naive
    description: Scheduled start datetime of the user's best Prelims+DSA attempt
  - id: prelims_dsa_stage_status
    type: string
    description: >-
      Qualification outcome for the Prelims+DSA combined stage. NULL if the user did not attempt this stage. Exact enum values -
        • Qualified
        • Not Qualified
  - id: prelims_dsa_user_assessment_score_percentage
    type: number
    description: User's overall total score percentage in the best Prelims+DSA attempt
  - id: prelims_dsa_coding_score_percentage
    type: number
    description: >-
      Coding section percentage in Prelims+DSA. One of three qualification paths -
      ≥ 50%, OR ≥ 20.83% combined with Technical ≥ 60%, OR ≥ 20.83% combined
      with Aptitude ≥ 60%.
  - id: prelims_dsa_aptitude_and_verbal_ability_mcqs_score_percentage
    type: number
    description: Aptitude & Verbal Ability MCQs section percentage in Prelims+DSA. Qualification path ≥ 60% when Coding ≥ 20.83%.
  - id: prelims_dsa_technical_mcqs_score_percentage
    type: number
    description: Technical MCQs section percentage in Prelims+DSA. Qualification path ≥ 60% when Coding ≥ 20.83%.

  # ─── Offline Drive stage ───
  - id: offline_drive_organisation_assessment_id
    type: string
    description: Organisation assessment ID for the user's best Offline Drive attempt
  - id: offline_drive_assessment_start_datetime
    type: timestamp_naive
    description: Scheduled start datetime of the user's best Offline Drive attempt
  - id: offline_drive_stage_status
    type: string
    description: >-
      Qualification outcome for the Offline Drive stage. NULL if the user did not attempt Offline Drive. Exact enum values -
        • Qualified - Bucket A
        • Qualified - Bucket B
        • Qualified - Bucket C
        • Not Qualified
  - id: offline_drive_user_assessment_score_percentage
    type: number
    description: User's overall total score percentage in the best Offline Drive attempt
  - id: offline_drive_problem_solving_coding_score_percentage
    type: number
    description: Coding section percentage in Offline Drive. Required for all bucket qualifications - ≥ 50% for Bucket A, ≥ 20.83% for Buckets B and C.
  - id: offline_drive_technical_mcqs_score_percentage
    type: number
    description: Technical MCQs section percentage in Offline Drive. Used in Bucket B qualification - ≥ 60%.
  - id: offline_drive_aptitude_and_verbal_ability_mcqs_score_percentage
    type: number
    description: Aptitude & Verbal Ability MCQs section percentage in Offline Drive. Used in Bucket C qualification - ≥ 60%.
  - id: offline_drive_core_cs_mcqs_score_percentage
    type: number
    description: Core CS MCQs section percentage in Offline Drive. Used in Bucket A qualification - ≥ 25%.
  - id: offline_drive_dsa_mcqs_score_percentage
    type: number
    description: DSA MCQs section percentage in Offline Drive. Used in Bucket A qualification - ≥ 40%.

  # ─── Internal helper boolean dimensions ───
  - id: is_prelims_attempted
    type: boolean
    expr_sql: ${prelims_stage_status} IS NOT NULL
    description: TRUE if user attempted Prelims (stage_status is non-null)
    visibility: "internal"
  - id: is_prelims_qualified
    type: boolean
    expr_sql: ${prelims_stage_status} = 'Qualified'
    description: TRUE if user qualified the Prelims stage
    visibility: "internal"
  - id: is_dsa_attempted
    type: boolean
    expr_sql: ${dsa_stage_status} IS NOT NULL
    description: TRUE if user attempted DSA
    visibility: "internal"
  - id: is_dsa_qualified
    type: boolean
    expr_sql: ${dsa_stage_status} = 'Qualified'
    description: TRUE if user qualified the DSA stage
    visibility: "internal"
  - id: is_prelims_dsa_attempted
    type: boolean
    expr_sql: ${prelims_dsa_stage_status} IS NOT NULL
    description: TRUE if user attempted the combined Prelims+DSA stage
    visibility: "internal"
  - id: is_prelims_dsa_qualified
    type: boolean
    expr_sql: ${prelims_dsa_stage_status} = 'Qualified'
    description: TRUE if user qualified the Prelims+DSA stage
    visibility: "internal"
  - id: is_offline_drive_attempted
    type: boolean
    expr_sql: ${offline_drive_stage_status} IS NOT NULL
    description: TRUE if user attempted the Offline Drive stage
    visibility: "internal"
  - id: is_offline_drive_qualified
    type: boolean
    expr_sql: ${offline_drive_stage_status} LIKE 'Qualified%'
    description: TRUE if user qualified the Offline Drive stage in any bucket (A/B/C)
    visibility: "internal"
  - id: is_offline_drive_bucket_a
    type: boolean
    expr_sql: ${offline_drive_stage_status} = 'Qualified - Bucket A'
    description: TRUE if user qualified Offline Drive via Bucket A
    visibility: "internal"
  - id: is_offline_drive_bucket_b
    type: boolean
    expr_sql: ${offline_drive_stage_status} = 'Qualified - Bucket B'
    description: TRUE if user qualified Offline Drive via Bucket B
    visibility: "internal"
  - id: is_offline_drive_bucket_c
    type: boolean
    expr_sql: ${offline_drive_stage_status} = 'Qualified - Bucket C'
    description: TRUE if user qualified Offline Drive via Bucket C
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
