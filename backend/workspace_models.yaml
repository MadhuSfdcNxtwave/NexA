    join_sql: ${user_id} = REPLACE(${academy_user_profile_education_details.user_id}, "-", "")

id: all_users_question_wise_responses_summary_details_for_question_set_units
type: model
description: Attempt-level activity — most granular table capturing every user attempt on every question, including answer, score, evaluation result, and time spent. Critical for deep behavioral and performance analysis.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`all\
  _users_question_wise_responses_summary_details_for_question_set_units`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_question_set_question_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${question_set_id}, '-', ${question_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, question_set_id, and question_id for each user's question-level response summary
  - id: user_id
    type: string
    description: The unique identifier for the user.
  - id: question_id
    type: string
    description: The unique identifier of the question.
  - id: question_short_text
    type: string
    description: A brief summary of the question text.
  - id: question_type
    type: string
    description: >-
      Defines the interaction format. Exact enum values -
        • MULTIPLE_CHOICE
        • CODING
        • SQL_CODING
        • TEXTUAL
        • MORE_THAN_ONE_MULTIPLE_CHOICE
  - id: question_set_id
    type: string
    description: The identifier for the learning unit (or question set) this question belongs to.
  - id: actual_score
    type: number
    description: The total possible score that the question is worth.
  - id: first_attempt_score
    type: number
    description: The score the user received on their very first attempt.
  - id: question_start_datetime
    type: timestamp_naive
    description: The timestamp when the user first started interacting with the question.
  - id: total_time_spent_in_seconds
    type: number
    description: The total cumulative time the user has spent on the question across all sessions.
  - id: first_attempt_submission_datetime
    type: timestamp_naive
    description: The timestamp of the user's very first submission.
  - id: first_attempt_evaluation_result
    type: string
    description: >-
      The evaluation outcome of the first attempt. Exact enum values -
        • CORRECT
        • INCORRECT
        • PARTIAL_CORRECT
  - id: first_attempt_user_response_id
    type: number
    description: The identifier for the user's first response record.
  - id: first_correct_attempt_score
    type: number
    description: The score achieved on the first fully correct attempt.
  - id: first_correct_attempt_submission_datetime
    type: timestamp_naive
    description: The timestamp of the user's first fully correct submission.
  - id: first_correct_attempt_number
    type: number
    description: The attempt number on which the user first achieved a fully correct answer.
  - id: first_correct_users_response_id
    type: number
    description: The identifier for the user's first fully correct response record.
  - id: first_partial_correct_attempt_score
    type: number
    description: The score achieved on the first partially correct attempt. A partial score occurs when some, but not all, test cases pass for a coding question.
  - id: first_partial_correct_attempt_submission_datetime
    type: timestamp_naive
    description: The timestamp of the user's first partially correct submission.
  - id: first_partial_correct_attempt_number
    type: number
    description: The attempt number on which the user first achieved a partially correct answer.
  - id: first_partial_correct_user_response_id
    type: number
    description: The identifier for the user's first partially correct response record.
  - id: latest_attempt_score
    type: number
    description: The score the user received on their most recent attempt.
  - id: latest_attempt_number
    type: number
    description: The attempt number of the user's most recent submission.
  - id: latest_attempt_submission_datetime
    type: timestamp_naive
    description: The timestamp of the user's most recent submission.
  - id: latest_attempt_evaluation_result
    type: string
    description: >-
      The evaluation outcome of the most recent attempt. Exact enum values -
        • CORRECT
        • INCORRECT
        • PARTIAL_CORRECT
  - id: latest_attempt_user_response_id
    type: number
    description: The identifier for the user's most recent response record.
  - id: best_score
    type: number
    description: The highest score the user attained on this question across all attempts.
  - id: best_score_attempt_number
    type: number
    description: The attempt number on which the user achieved their best score.
  - id: best_score_attempt_submission_datetime
    type: timestamp_naive
    description: The timestamp of the submission that resulted in the user's best score.
  - id: best_score_attempt_evaluation_result
    type: string
    description: >-
      The evaluation outcome of the best score attempt. Exact enum values -
        • CORRECT
        • INCORRECT
        • PARTIAL_CORRECT
  - id: best_score_attempt_user_response_id
    type: number
    description: The identifier for the response record that achieved the best score.
  - id: first_answer_seen_datetime
    type: timestamp_naive
    description: The timestamp when the user first viewed the correct answer or solution.
  - id: first_answer_seen_attempt_no
    type: number
    description: The attempt number before which the user first viewed the answer.
  - id: best_score_before_first_answer_seen
    type: number
    description: The user's best score achieved before they viewed the correct answer.
  - id: best_score_attempt_no_before_first_answer_seen
    type: number
    description: The attempt number that achieved the best score before the user viewed the answer.
  - id: best_score_attempt_number_based_on_gamification
    type: number
    description: The attempt number that achieved the best score according to a separate gamification logic.
  - id: best_score_attempt_submission_datetime_based_on_gamification
    type: timestamp_naive
    description: The submission timestamp for the best score attempt, based on gamification logic.
  - id: best_score_attempt_evaluation_result_based_on_gamification
    type: string
    description: The evaluation result for the best score attempt, based on gamification logic.
  - id: best_score_attempt_user_response_id_based_on_gamification
    type: number
    description: The response ID for the best score attempt, based on gamification logic.
  - id: user_first_tutorial_view_datetime
    type: timestamp_naive
    description: The timestamp when the user first viewed a tutorial for this question.
  - id: user_first_sambot_response_datetime
    type: timestamp_naive
    description: The timestamp when the user first received a response from the 'Sambot' AI tutor for this question.
  - id: user_first_discussion_creation_datetime
    type: timestamp_naive
    description: The timestamp when the user first created a discussion post related to this question.
  - id: does_user_took_help_before_first_correct_submission
    type: number
    description: A binary flag (1 for yes, 0 for no) indicating if the user used any help resource (tutorial, bot, answer) before their first correct submission.
relations:
  - id: content_question_set_units_questions_details
    type: many_to_one
    join_sql: ${question_set_id} = ${content_question_set_units_questions_details.question_set_id} AND ${question_id} = ${content_question_set_units_questions_details.question_id}
  - id: all_users_question_attempt_details_for_question_set_units
    type: one_to_many
    join_sql: ${user_id} = ${all_users_question_attempt_details_for_question_set_units.user_id} AND ${question_set_id} = ${all_users_question_attempt_details_for_question_set_units.question_set_id} AND ${question_id} = ${all_users_question_attempt_details_for_question_set_units.question_id}
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: ${user_id} = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_basic_details.user_id}, "-", "")
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_education_details.user_id}, "-", "")

id: content_ai_bot_details
type: model
description: AI bot configuration table — maps AI bots to specific learning content (question/unit level), including bot type, status, and creation metadata. Enables analysis of bot coverage, rollout, and availability across content.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`con\
  tent_ai_bot_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: bot_entity_key
    type: string
    expr_sql: CONCAT(${bot_id}, '-', ${entity_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining bot_id and entity_id for each bot-entity assignment
  - id: bot_type
    type: string
    description: >-
      Defines the function of the bot. Exact enum values -
        • CODING_QUESTION_TUTOR_BOT          (assists with questions)
        • SESSION_CONVERSATION_BOT           (used within units)
        • CODING_QUESTION_TUTOR_BOT_V2
        • CODING_QUESTION_TUTOR_BOT_LEVEL_2
  - id: bot_id
    type: string
    description: The unique identifier for the specific AI bot instance.
  - id: is_enabled
    type: number
    description: A flag (e.g., true/false or 1/0) indicating if the bot is currently active and available for the assigned entity.
  - id: bot_creation_datetime_for_entity
    type: timestamp_naive
    description: The date and time when the bot was created for or assigned to the specific entity.
  - id: entity_id
    type: string
    description: The identifier for the content to which the bot is attached. This ID corresponds to a question_id or a unit_id.
  - id: entity_type
    type: string
    description: >-
      Describes the type of content the bot is for. Exact enum values -
        • QUESTION
        • UNIT
relations:
  - id: content_question_set_units_questions_details
    type: many_to_one
    join_sql: ${entity_id} = ${content_question_set_units_questions_details.question_id}
  - id: all_users_bot_raw_conversation_details
    type: one_to_many
    join_sql: ${bot_id} = ${all_users_bot_raw_conversation_details.bot_id}

id: content_question_set_units_questions_details
type: model
description: Content catalog — master table of all questions and their associated units (question sets), including metadata like type, difficulty, score, and sequence. Forms the foundation for all content-level analysis.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`con\
  tent_question_set_units_questions_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: question_set_question_key
    type: string
    expr_sql: CONCAT(${question_set_id}, '-', ${question_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining question_set_id and question_id for each question within a learning unit
  - id: question_content
    type: string
    description: The full body of the question, which could be text, HTML, or another format defined in question_content_type.
  - id: question_order
    type: number
    description: The numerical position of this question within the sequence of its learning unit (e.g., 1, 2, 3).
  - id: question_set_id
    type: string
    description: The unique identifier for a learning unit (often referred to as unit_id).
  - id: question_content_type
    type: string
    description: >-
      Specifies the format of the question_content field. Exact enum values -
        • HTML
        • MARKDOWN
        • PLAIN_TEXT
        • JSON
        • RICH_TEXT
  - id: question_type
    type: string
    description: >-
      Defines how the user interacts with the question. Exact enum values -
        • MULTIPLE_CHOICE                (single-answer)
        • MORE_THAN_ONE_MULTIPLE_CHOICE  (multi-answer)
        • TEXTUAL                        (free-response)
        • CODING                         (code submission)
        • SQL_CODING
        • IDE_BASED_CODING
  - id: question_set_content_type
    type: string
    description: >-
      Specifies the subject domain of the learning unit. Exact enum values -
        • SQL                  (SQL problems)
        • AIML_CODING          (AI/ML problems)
        • CODING               (standard coding)
        • IDE_BASED_CODING     (coding in a browser-based IDE)
        • INTERACTIVE_BUILDER  (questions using a visual builder tool)
  - id: question_id
    type: string
    description: The unique identifier for a single question.
  - id: question_set_title
    type: string
    description: The user-facing title of the learning unit.
  - id: question_creation_datetime
    type: timestamp_naive
    description: The exact date and time when the question was first created.
  - id: question_score
    type: number
    description: The number of points or score value assigned to the question.
  - id: question_short_text
    type: string
    description: A brief summary or shortened version of the question text.
  - id: question_difficulty
    type: string
    description: The difficulty level of the question, often represented as a number which maps to a text label (e.g., 1 = 'Easy', 2 = 'Medium', 3 = 'Hard').
  - id: is_primary
    type: number
    description: A boolean flag (true/false or 1/0) indicating if this is the primary, original version of a question (true) or a derived/copied variant (false).
relations:
  - id: content_ai_bot_details
    type: one_to_many
    join_sql: ${question_id} = ${content_ai_bot_details.entity_id}
  - id: all_users_question_wise_responses_summary_details_for_question_set_units
    type: one_to_many
    join_sql: ${question_set_id} = ${all_users_question_wise_responses_summary_details_for_question_set_units.question_set_id} AND ${question_id} = ${all_users_question_wise_responses_summary_details_for_question_set_units.question_id}
  - id: all_users_question_attempt_details_for_question_set_units
    type: one_to_many
    join_sql: ${question_set_id} = ${all_users_question_attempt_details_for_question_set_units.question_set_id} AND ${question_id} = ${all_users_question_attempt_details_for_question_set_units.question_id}

id: feedback_successcoach_support
type: model
description: >-
  This table stores the form responses collected via the `feedback-successcoach-support`
  form (form_id = feedback-successcoach-support). It is NOT the form definition itself —
  it is the landing table where every form submission is persisted as one row.

  ALSO KNOWN AS:
  - "Post SC call CSAT" — this is the common business/stakeholder name for this
    form. Treat any reference to "Post SC call CSAT", "Post SC Call CSAT",
    "Post-call CSAT of SCs", "Post Call CSAT of SCs", or "Success Coach
    Post Call CSAT" as referring to this table and the
    feedback-successcoach-support form it captures.

  The CSAT (Customer Satisfaction) form is shared with students after each call or
  support interaction completed by the Success Coach. It is intended to capture the
  student's experience, satisfaction level, quality of guidance received, and overall
  effectiveness of the support provided during the interaction.

  The primary use case of this form is to measure Success Coach performance,
  understand student satisfaction trends, identify areas of improvement in
  student support, and maintain interaction-level feedback records for
  operational analysis and quality monitoring purposes.

  Users are allowed to submit the form multiple times because feedback is
  collected after different interactions/calls. Hence, the primary key for the
  dataset is the combination of user_id and form_submission_datetime.

  IMPORTANT — Form config vs. table schema (read before analyzing fields):
  The dimensions in this model reflect the form fields config that was active at the
  time this model was authored, and the response-extraction logic was built against
  that config. Because the table schema is NOT auto-synced with the live form config,
  the following caveats apply:
    • If a field is REMOVED or RENAMED in a newer form config, the corresponding
      column here will start receiving NULLs for submissions made after the change
      (the column is not auto-dropped — old rows retain their values, new rows just
      come in empty).
    • If a NEW field is ADDED to the form, it will NOT automatically appear as a new
      column in this table. New columns are added only when the respective team
      (form owners / data engineering) explicitly informs us and we extend the
      extraction logic.
  When analyzing a sudden drop-off to NULL on any column, or when a stakeholder
  references a field that doesn't exist here, suspect a form-config change first and
  confirm with the form owners before drawing conclusions.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`fee\
  dback_successcoach_support`"
measures:
  - id: count_of_records
    func: count
    description: Total number of feedback submissions
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique students who submitted feedback
  - id: avg_satisfaction_rating
    func: avg
    of: satisfaction_rating_numeric
    description: Average CSAT rating on a 1–5 scale across all feedback submissions
  - id: satisfied_responses
    func: count
    filters:
      - is_satisfied
    description: Count of submissions where the student rated satisfaction 4 (Very satisfied) or 5 (Extremely satisfied)
  - id: dissatisfied_responses
    func: count
    filters:
      - is_dissatisfied
    description: Count of submissions where the student rated satisfaction 1, 2, or 3 (i.e., 'Somewhat satisfied' or lower) — these are the lower-rating submissions that also trigger the follow-up questions
  - id: coach_understands_responses
    func: count
    filters:
      - is_coach_understanding
    description: Count of submissions where the student felt the Success Coach understood and guided them well
  - id: csat_score_percentage
    func_sql: SAFE_DIVIDE(COUNTIF(${satisfaction_rating_numeric} >= 4), COUNTIF(${satisfaction_rating_numeric} IS NOT NULL)) * 100
    description: CSAT% — percentage of submissions rated 4 or 5 out of all rated submissions
dimensions:
  - id: user_submission_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${form_submission_datetime} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and form_submission_datetime, since a user can submit feedback multiple times after different Success Coach interactions
  - id: form_submission_datetime
    type: timestamp_naive
    description: Date and time when the student submitted the Success Coach CSAT feedback form
  - id: form_submission_date
    type: date
    expr_sql: DATE(${form_submission_datetime})
    description: Date portion of form_submission_datetime — useful for daily/weekly/monthly trend aggregations
  - id: user_id
    type: string
    description: Unique identifier of the student who submitted the feedback (UUID with hyphens)
  - id: your_success_coach_name
    type: string
    description: Name of the Success Coach the feedback is about (free-text entered by the student; mandatory)
  - id: how_is_your_success_coach_understanding_and_guiding_you
    type: string
    description: >-
      Student's perception of how well the Success Coach understands and guides them. Mandatory single-select. Exact enum values -
        • My Success Coach understands me and guides me very well.
        • My Success Coach doesn't understand me and my concerns well.
  - id: how_satisfied_are_you_with_the_support_provided_by_your_success_coach_recently
    type: string
    description: >-
      Student's recent satisfaction rating with the support provided by the Success Coach. Mandatory single-select. Exact enum values -
        • 5-Extremely satisfied
        • 4-Very satisfied
        • 3-Somewhat satisfied
        • 2-Not so satisfied
        • 1-Not at all satisfied
  - id: satisfaction_rating_numeric
    type: number
    expr_sql: SAFE_CAST(SPLIT(${how_satisfied_are_you_with_the_support_provided_by_your_success_coach_recently}, '-')[SAFE_OFFSET(0)] AS INT64)
    description: Numeric satisfaction rating (1–5) extracted from the leading digit of the satisfaction response. Use this for quantitative CSAT analysis.
  - id: satisfaction_bucket
    type: string
    expr_sql: >-
      CASE
        WHEN ${satisfaction_rating_numeric} IN (4, 5) THEN 'Satisfied (4-5)'
        WHEN ${satisfaction_rating_numeric} = 3 THEN 'Neutral (3)'
        WHEN ${satisfaction_rating_numeric} IN (1, 2) THEN 'Dissatisfied (1-2)'
        ELSE 'Unrated'
      END
    description: Bucketed CSAT classification — Satisfied (4–5), Neutral (3), Dissatisfied (1–2), or Unrated.
  - id: what_kind_of_support_were_you_expecting_but_didnt_receive
    type: string
    description: >-
      Free-text feedback (TEXTAREA) describing what kind of support the student was expecting but did not receive.
      Shown ONLY when the satisfaction rating is 3, 2, or 1 (lower satisfaction). Will be NULL/blank for higher ratings.
  - id: which_areas_did_your_success_coach_support_you_in
    type: string
    description: >-
      Multi-select checkbox group capturing areas in which the Success Coach supported the student. Multiple selections are stored as comma-separated values.
      Shown ONLY when the satisfaction rating is 3, 2, or 1 (per current form logic). Known dropdown options -
        • Completing Daily/weekly learning tasks
        • Time management & planning
        • Staying motivated & consistent
        • LinkedIn or resume building support
        • Placement and Internship preparation
        • Handling portal & EMI related queries
        • Engagement activities like WhatsApp polls, quiz, etc
        • Regular check-in, reminders & follow-ups
      Note - additional options may be added in the future; treat the list as extensible.
  - id: feedback_about_success_coach
    type: string
    description: Open-ended (TEXTAREA) feedback the student wants to share about the Success Coach. Mandatory.
  - id: guidance_for_next_call
    type: string
    description: Open-ended (TEXTAREA) input from the student describing what they would like the Success Coach to focus on or guide them about in the next call. Mandatory.
  - id: is_satisfied
    type: boolean
    expr_sql: ${satisfaction_rating_numeric} >= 4
    description: TRUE if the student rated 4 (Very satisfied) or 5 (Extremely satisfied)
    visibility: "internal"
  - id: is_dissatisfied
    type: boolean
    expr_sql: ${satisfaction_rating_numeric} <= 3
    description: TRUE if the satisfaction rating is 3 or lower — i.e., the rating values that also trigger the follow-up TEXTAREA / CHECKBOX GROUP questions
    visibility: "internal"
  - id: is_coach_understanding
    type: boolean
    expr_sql: ${how_is_your_success_coach_understanding_and_guiding_you} = 'My Success Coach understands me and guides me very well.'
    description: TRUE if the student feels the Success Coach understands and guides them well
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
