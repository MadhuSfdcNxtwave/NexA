id: nbfcs_and_monthly_installments_paid_payment_details
type: model
description: >-
  User-level repayment transactions dataset capturing payment activity across NBFC
  and Flex repayment plans. Each record represents an application-level repayment
  entry, combining repayment schedules, payment execution details, payment status,
  and collection methods into a single source.

  The table acts as the foundational dataset for repayment tracking, collections
  monitoring, DPD analysis, and payment reconciliation. It connects:
  Loan/Application Creation → Repayment Due Date → Payment Execution →
  Bounce Updates → Repayment Status Tracking.

  Key business logic:
  - DUE DATE: For NBFC users, sourced directly from backend repayment schedules.
    For Flex users, derived dynamically — when mode_of_payment = AUTO_DEBIT,
    paid_date is treated as the due date; when mode_of_payment = PAYMENT_LINK,
    due date is fixed as the 5th of the payment month.
  - PAID DATE: For Flex users, captured via webhook events. For NBFC users,
    updated from bounce/payment data from NBFC partners. NULL when
    payment_status = PAID_LATE.
  - MODE OF PAYMENT: If due_date = paid_date → AUTO_DEBIT; otherwise PAYMENT_LINK.
    NULL when paid_date is NULL.

  Grain caveat: There is NO composite unique key. Multiple payments can occur on
  the same day for the SAME application_id, but ONLY for FLEX payment plans
  (not for NBFC). Always dedup/aggregate carefully before user-level reporting.

  Primary use cases - repayment behavior monitoring, due-vs-paid timeline tracking,
  AUTO_DEBIT vs PAYMENT_LINK collection efficiency comparison, NBFC partner
  repayment monitoring, DPD analysis, and collections dashboards.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`nbf\
  cs_and_monthly_installments_paid_payment_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of repayment transaction records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users with repayment records
  - id: unique_applications
    func: count_distinct
    of: application_id
    description: Count of unique loan/financing applications
  - id: paid_payments
    func: count
    filters:
      - is_paid
    description: Count of payments with status PAID
  - id: paid_late_payments
    func: count
    filters:
      - is_paid_late
    description: Count of payments marked PAID_LATE
  - id: paid_in_advance_payments
    func: count
    filters:
      - is_paid_in_advance
    description: Count of payments marked PAID_IN_ADVANCE
  - id: auto_debit_payments
    func: count
    filters:
      - is_auto_debit
    description: Count of repayments collected via AUTO_DEBIT
  - id: payment_link_payments
    func: count
    filters:
      - is_payment_link
    description: Count of repayments collected via PAYMENT_LINK
  - id: avg_days_due_to_paid
    func_sql: AVG(DATE_DIFF(${paid_date}, ${due_date}, DAY))
    description: >-
      Average CALENDAR days between due_date and paid_date (only payments with a non-null paid_date contribute).
      Positive values = paid after due date; negative values = paid in advance.
      CALENDAR latency — does not exclude weekends/holidays.
dimensions:
  - id: user_application_due_date_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${application_id}, '-', CAST(${due_date} AS STRING), '-', COALESCE(CAST(${paid_date} AS STRING), 'NULL'))
    unique: true
    visibility: "internal"
    description: >-
      Composite key combining user_id, application_id, due_date, and paid_date. Used as a best-effort
      unique identifier since the source table has no strict composite primary key — multiple payments
      on the same day for the same application_id can occur for FLEX plans.
  - id: user_id
    type: string
    description: Unique identifier for the user (UUID with hyphens).
  - id: application_id
    type: string
    description: Unique identifier for the loan or financing application linked to this payment.
  - id: nbfc_name
    type: string
    description: >-
      Name of the Non-Banking Financial Company (NBFC) that issued or manages the loan. Possible values -
        • FEEMONK
        • SHOPSE
        • MONEYVIEW
        • FIBE
        • PINE_LABS
        • NORTHERN_ARC
        • LEO1
        • EDUVANZ
        • GYANDHAN
        • VARTHANA
        • JODO_CRED
        • CREDENC
        • BAJAJ_FINANCE_LIMITED
        • TECHFINO
        • KUHOO
        • JODO_FLEX
  - id: payment_plan
    type: string
    description: >-
      Type of repayment plan selected for the application. Exact enum values -
        • NBFC
        • FLEX
  - id: due_date
    type: date
    description: >-
      Scheduled date by which the payment is due. For NBFC users, sourced directly from the
      backend repayment schedule. For Flex users, derived based on mode_of_payment - if
      AUTO_DEBIT, paid_date is treated as the due date; if PAYMENT_LINK, due date is fixed
      as the 5th of the payment month.
  - id: payment_status
    type: string
    description: >-
      Current status of the payment. Exact enum values -
        • PAID
        • PAID_LATE
        • PAID_IN_ADVANCE
  - id: paid_date
    type: date
    description: >-
      Actual payment completion date. For Flex users, captured via webhook events; for NBFC
      users, updated from bounce/payment data received from NBFC partners. NULL when
      payment_status = PAID_LATE.
  - id: mode_of_payment
    type: string
    description: >-
      Method used to collect the payment. Derived as AUTO_DEBIT when due_date = paid_date,
      else PAYMENT_LINK. NULL when paid_date is NULL. Exact enum values -
        • AUTO_DEBIT     (automatically deducted from the user's bank account)
        • PAYMENT_LINK   (user manually completes payment through a shared link)
  - id: due_month
    type: date
    expr_sql: DATE_TRUNC(${due_date}, MONTH)
    description: Month of the due date, truncated to the first day of the month. Useful for monthly trend analysis.
  - id: paid_month
    type: date
    expr_sql: DATE_TRUNC(${paid_date}, MONTH)
    description: Month of the payment date, truncated to the first day of the month. NULL when paid_date is NULL.
  - id: days_due_to_paid
    type: number
    expr_sql: DATE_DIFF(${paid_date}, ${due_date}, DAY)
    description: Calendar days between due_date and paid_date. Positive = paid late; negative = paid in advance; NULL if paid_date is NULL.
  - id: is_paid
    type: boolean
    expr_sql: ${payment_status} = 'PAID'
    description: TRUE if payment_status is PAID.
    visibility: "internal"
  - id: is_paid_late
    type: boolean
    expr_sql: ${payment_status} = 'PAID_LATE'
    description: TRUE if payment_status is PAID_LATE.
    visibility: "internal"
  - id: is_paid_in_advance
    type: boolean
    expr_sql: ${payment_status} = 'PAID_IN_ADVANCE'
    description: TRUE if payment_status is PAID_IN_ADVANCE.
    visibility: "internal"
  - id: is_auto_debit
    type: boolean
    expr_sql: ${mode_of_payment} = 'AUTO_DEBIT'
    description: TRUE if the repayment was collected via AUTO_DEBIT.
    visibility: "internal"
  - id: is_payment_link
    type: boolean
    expr_sql: ${mode_of_payment} = 'PAYMENT_LINK'
    description: TRUE if the repayment was collected via PAYMENT_LINK.
    visibility: "internal"
  - id: is_nbfc_plan
    type: boolean
    expr_sql: ${payment_plan} = 'NBFC'
    description: TRUE if the user is on the NBFC repayment plan.
    visibility: "internal"
  - id: is_flex_plan
    type: boolean
    expr_sql: ${payment_plan} = 'FLEX'
    description: TRUE if the user is on the FLEX repayment plan.
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(${due_date}, MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nbfc_renewals_conversion_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_nbfc_renewals_conversion_details.user_id} AND DATE_TRUNC(${due_date}, MONTH) = ${academy_nbfc_renewals_conversion_details.month}
  - id: academy_dpd_salesforce_task_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_dpd_salesforce_task_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${paid_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}

