id: z_academy_users_course_wise_completion_details
type: model
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_a\
  cademy_users_course_wise_completion_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_course_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${course_id})
    unique: true
    visibility: "internal"
    description: Unique identifier combining user_id and course_id for each user's course enrollment
  - id: completion_datetime
    type: timestamp_naive
    description: completion datetime when user completed the resource with 100 %
  - id: completion_status
    type: string
    description: >-
      Completion status of that resource. Exact enum values -
        • YET_TO_START
        • IN_PROGRESS
        • COMPLETED
  - id: course_title
    type: string
    description: Title of the course. Few courses may have same title but the id is different.
  - id: user_id
    type: string
    description: Unique User ID , UUID with hyphens
  - id: course_id
    type: string
    description: Unique id of the available course to the user, UUID without hyphens
  - id: completion_percentage
    type: number
    description: completion percentage of the resource
  - id: last_progress_date
    type: date
    description: Last progress date of the resource
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${last_progress_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_live_classes_attendance_and_time_spent_details.user_id} AND REPLACE(${course_id},"-","") = ${z_academy_users_live_classes_attendance_and_time_spent_details.course_id}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND ${last_progress_date} = ${academy_nps_form_responses.form_submission_month}

id: z_academy_users_live_classes_attendance_and_time_spent_details
type: model
description: >-
  User-level live class attendance and engagement dataset at (user_id, slot_id) granularity.
  Includes session schedule, actual timings, join/leave behavior, time spent, completion %, and attendance status
  across cohorts and courses.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_a\
  cademy_users_live_classes_attendance_and_time_spent_details`"
measures:
  - id: count_of_records
    func: count
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users with live class attendance records
  - id: joined_attendance_users
    func: count_distinct
    of: user_id
    filters:
      - is_joined
    description: Users who joined live class sessions (attendance_status = JOINED)
dimensions:
  - id: user_slot_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${slot_id})
    unique: true
    visibility: "internal"
    description: Unique identifier for a user's attendance at a specific slot
  - id: realtime_stage_arn
    type: string
    description: ivs stage arn mapped to the slot
  - id: user_id
    type: string
    description: unique user id
  - id: slot_start_time
    type: other
    description: slot start time like 08:00
  - id: last_connected_datetime
    type: timestamp_naive
    description: last joined time for the slot of a user
  - id: meet_ended_at
    type: timestamp_naive
    description: actual meet end datetime
  - id: cohort_start_date
    type: date
    description: starting date of the cohort, series of slots.live classes
  - id: last_disconnected_datetime
    type: timestamp_naive
    description: last left time of the user for a slot
  - id: first_disconnected_datetime
    type: timestamp_naive
    description: first left time of the user for a slot
  - id: day_count
    type: number
    description: day count of the slot in a cohort
  - id: session_duration_in_minutes
    type: number
    description: actual session duration of the slot
  - id: slot_id
    type: string
    description: unique id. of the slot in a cohort, in which instructor takes live class
  - id: session_completion_percentage
    type: number
    description: user time spent percentage on total session duration
  - id: total_time_spent_in_minutes
    type: number
    description: time spent in minutes by the user in that slot
  - id: attendance_source
    type: string
    description: internal purpose, neglect
  - id: cohort_id
    type: string
    description: cohort is a template which contains slots, every day in a cohort there will a slot
  - id: course_id
    type: string
    description: unique id of the course which is UUID with hyphens.
  - id: course_title
    type: string
    description: Title of the course.
  - id: slot_date
    type: date
    description: date of the slot , live class session
  - id: attendance_status
    type: string
    description: >-
      Attendance outcome of the user for the slot. Exact enum values -
        • JOINED                     (user attended the session/slot)
        • CAME_BEFORE_NOT_JOINED     (didn't join but came before the session)
        • CAME_DURING_NOT_JOINED     (didn't join but came during the session)
        • CAME_AFTER_NOT_JOINED      (didn't join but came to the page after the meet ended)
  - id: is_joined
    type: boolean
    expr_sql: ${attendance_status} = 'JOINED'
    description: TRUE when user joined the live class session
    visibility: "internal"
  - id: first_connected_datetime
    type: timestamp_naive
    description: first joined datetime of the user for the slot
  - id: cohort_name
    type: string
    description: name of the cohort
  - id: slot_end_time
    type: other
    description: slot end time like 10:00
  - id: meet_started_at
    type: timestamp_naive
    description: actual meet started datetime
relations:
  - id: z_ccbp_academy_users_master_data
