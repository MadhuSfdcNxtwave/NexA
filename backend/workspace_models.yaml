id: irp_registration_form_responses
type: model
description: >-
  The objective of the IRP 2.0 Registration Form is to identify, onboard, and
  engage serious 1st & 2nd year students into a structured internship readiness
  journey that helps them build the right skills, participate in assessments and
  activities, and become internship-ready through consistent learning and
  execution.

  Users are allowed to submit the form multiple times because feedback is
  collected after different interactions/calls. Hence, the primary key for the
  dataset should be considered as a combination of user_id and
  form_submission_datetime
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`irp\
  _registration_form_responses`"
measures:
  - id: count_of_records
    func: count
    description: Total number of IRP 2.0 registration form submissions
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who submitted the IRP 2.0 registration form
  - id: interested_users
    func: count_distinct
    of: user_id
    filters:
      - is_interested_in_irp
    description: Count of unique users who expressed interest in participating in IRP 2.0
  - id: available_for_assessment_users
    func: count_distinct
    of: user_id
    filters:
      - is_available_for_assessment
    description: Count of unique users who confirmed availability to attend the IRP 2.0 assessment
  - id: explored_roadmap_users
    func: count_distinct
    of: user_id
    filters:
      - has_explored_roadmap
    description: Count of unique users who have explored the IRP 2.0 roadmap
dimensions:
  - id: user_submission_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${form_submission_datetime} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and form_submission_datetime, since a user can submit the form multiple times
  - id: user_id
    type: string
    description: Unique identifier of the user who submitted the form (UUID with hyphens)
  - id: form_submission_datetime
    type: timestamp_naive
    description: Timestamp when the form was submitted
  - id: are_you_interested_in_participating_in_irp20
    type: string
    description: >-
      Captures whether the user is interested in participating in IRP 2.0. Exact enum values -
        • Yes
        • No
  - id: state_your_reason_for_not_showing_interest_in_irp20
    type: string
    description: Free-text reason provided by the user for not showing interest in IRP 2.0. NULL when the user is interested.
  - id: have_you_explored_the_internship_readiness_path20_roadmap
    type: string
    description: >-
      Captures whether the user has explored the IRP 2.0 roadmap. Exact enum values -
        • Yes, I have explored and I'm aware of the IRP 2.0 assessment structure, tracks and eligibility criteria.
        • No, I will explore now!
  - id: which_level_are_you_most_interested_in
    type: string
    description: Preferred level selected by the user for IRP 2.0 (depends on the configured form options at submission time)
  - id: are_you_available_to_attend_the_internship_readiness_path20_assessment
    type: string
    description: >-
      Captures user availability for attending the IRP 2.0 assessment. Exact enum values -
        • Yes
        • No
  - id: i_understand_that
    type: string
    description: >-
      Acknowledgement confirmation captured through a checkbox-group field (stored as a JSON string).
      Known value - '["Irrespective of my current Growth Cycle (GC) or course learning stage, I can attend this assessment!"]'.
      NULL when the user did not check the acknowledgement.
  - id: if_registered_for_this_assessment_slot_will_you_definitely_attend
    type: string
    description: >-
      Attendance confirmation captured through a checkbox-group field (stored as a JSON string).
      Known value - '["Yes, I will definitely attend!"]'. NULL when the user did not check the box.
  - id: state_your_reason_for_unavailability
    type: string
    description: Free-text reason provided by the user for assessment unavailability. NULL when the user is available.
  - id: is_interested_in_irp
    type: boolean
    expr_sql: ${are_you_interested_in_participating_in_irp20} = 'Yes'
    description: TRUE if the user expressed interest in participating in IRP 2.0
    visibility: "internal"
  - id: is_available_for_assessment
    type: boolean
    expr_sql: ${are_you_available_to_attend_the_internship_readiness_path20_assessment} = 'Yes'
    description: TRUE if the user is available to attend the IRP 2.0 assessment
    visibility: "internal"
  - id: has_explored_roadmap
    type: boolean
    expr_sql: ${have_you_explored_the_internship_readiness_path20_roadmap} LIKE 'Yes%'
    description: TRUE if the user has explored the IRP 2.0 roadmap
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
