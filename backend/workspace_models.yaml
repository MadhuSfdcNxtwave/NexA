    type: one_to_many
    join_sql: ${user_id} = ${academy_users_day_and_page_wise_time_spent_details.user_id}
  - id: all_users_question_wise_responses_summary_details_for_question_set_units
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${all_users_question_wise_responses_summary_details_for_question_set_units.user_id}
  - id: all_users_question_attempt_details_for_question_set_units
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${all_users_question_attempt_details_for_question_set_units.user_id}
  - id: all_users_bot_raw_conversation_details
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${all_users_bot_raw_conversation_details.user_id}

id: academy_user_profile_education_details
type: model
description: >-
  This table contains education-related details of users as available in their
  profile. It includes information across different education levels such as
  SSC, Intermediate, and Bachelor's.

  Education details are primarily collected during the onboarding process and
  can be updated later by users through the profile edit functionality. The data
  is directly sourced from backend systems and reflects the latest available
  information provided by the user.

  Certain fields are captured using predefined dropdown values (e.g., course
