id: academy_course_wise_users_certificate_completion_criteria_resources
type: model
description: >-
  This table captures user-level progress and certificate eligibility for
  Academy courses at a user × course granularity.

  IMPORTANT SCOPE NOTE:

  This table contains ONLY certification-enabled courses (i.e., courses that
  are configured to issue a completion certificate). It does NOT contain all
  Academy courses. Non-certificate courses are out of scope here — for full
  course-completion coverage across all courses, use
  z_academy_users_course_wise_completion_details. Any "course count" or
  "course-level coverage" metric derived from this table represents the
  certification-enabled course universe only.

  It includes all learners enrolled in certificate-eligible Academy-plan courses
  and provides:

  Overall course completion status and progress

  Detailed tracking of completion for each certificate criteria resource
  (topics/units)

  Certificate issuance status

  A user becomes eligible for a certificate when:

  completed_criteria_resources_count >= criteria_resource_count

  (Note - uses >= rather than strict equality to correctly handle cases where a
  course's criteria configuration has changed over time and a user may have
  completed historical/retired criteria resources beyond the currently required
  set.)

  This table serves as the primary source for monitoring certificate readiness
  and issuance across Academy learners.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_course_wise_users_certificate_completion_criteria_resources`"
measures:
  - id: count_of_records
    func: count
    description: Total number of user × course records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique learners across courses
  - id: unique_courses
    func: count_distinct
    of: course_id
    description: Count of unique certification-enabled courses present in this table (this is NOT the full Academy course universe — only courses configured to issue a certificate).
  - id: certificate_issued_users
    func: count_distinct
    of: user_id
    filters:
      - is_certificate_issued
    description: Count of unique users who have been issued a certificate
  - id: certificate_eligible_users
    func: count_distinct
    of: user_id
    filters:
      - is_certificate_eligible
    description: Count of unique users who meet the certificate eligibility criteria (all criteria resources completed)
  - id: course_completed_users
    func: count_distinct
    of: user_id
    filters:
      - is_course_completed
    description: Count of unique users who have fully completed the course (status = COMPLETED)
  - id: avg_course_completion_percentage
    func: avg
    of: course_completion_percentage
    description: Average course completion percentage across user × course records
dimensions:
  - id: user_course_version_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${course_id}, '-', ${version_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, course_id, and version_id for each user's course enrollment record
  - id: user_id
    type: string
    description: Unique identifier of the learner (UUID with hyphens).
  - id: course_id
    type: string
    description: Unique identifier of the course (UUID with hyphens removed).
  - id: course_title
    type: string
    description: Display name of the certification-enabled course. Only courses configured to issue a certificate appear here.
  - id: version_id
    type: string
    description: Version of the course the user is enrolled in; defaults to v0 for non-versioned courses.
  - id: is_latest_version
    type: number
    description: Flag (1/0) indicating whether the enrolled course version is the latest.
  - id: enroll_plans_str
    type: string
    description: >-
      JSON array string of plan names associated with the course (filtered to Academy plans).
      Example - '["CCBP_ACADEMY_GENIUS", "CCBP_INTENSIVE", "CCBP_ACADEMY_SMART", ...]'.
      Requires JSON parsing for element-level analysis.
  - id: course_completion_percentage
    type: number
    description: Overall completion percentage of the course for the user.
  - id: course_completion_datetime
    type: timestamp_naive
    description: Timestamp when the course was fully completed; NULL if not completed.
  - id: course_completion_status
    type: string
    description: Course status (e.g., IN_PROGRESS, COMPLETED).
  - id: course_last_progress_datetime
    type: timestamp_naive
    description: Timestamp of the user's most recent activity in the course.
  - id: criteria_resources_details
    type: string
    description: >-
      JSON array of objects representing each criteria resource. Each object includes -
      resource_id (UUID WITHOUT hyphens — note this differs from `criteria_resource_ids`
      which stores IDs WITH hyphens), resource_title, resource_type (observed values -
      UNIT, TOPIC), unit_type (observed values - QUESTION_SET, ASSESSMENT; NULL when
      resource_type = TOPIC), resource_completion_percentage, resource_completion_datetime,
      and resource_last_progress_date. Resources not started will have NULL completion
      fields. Ordered by resource_last_progress_date (ascending). Edge case - if a course's
      criteria configuration has changed over time, a user may have completion records for
      historical criteria resources that are no longer in the current criteria_resource_ids
      list; in such cases completed_criteria_resources_count can exceed criteria_resource_count.
  - id: completed_criteria_resources_count
    type: number
    description: >-
      Number of criteria resources completed by the user (i.e., where completion datetime
      is not NULL). May exceed criteria_resource_count when the course's criteria
      configuration has changed and the user has historical completions for retired
      criteria resources (see sample where this value = 5 vs criteria_resource_count = 4).
  - id: criteria_resource_ids
    type: string
    description: >-
      Comma-separated list (with spaces) of resource IDs required to complete the
      certificate. IDs here are UUIDs WITH hyphens (e.g.,
      '9d9a2a4c-764f-4dea-bb36-b1306c39c3f0, 2a46f173-a9a1-4253-b6fc-cfa49f07b20b').
      Note - the same resource_id appears WITHOUT hyphens inside criteria_resources_details.
  - id: criteria_resource_count
    type: number
    description: Total number of criteria resources currently required for certificate eligibility.
  - id: certificate_id
    type: string
    description: Unique identifier of the issued certificate (32-char UUID WITHOUT hyphens); NULL if not issued.
  - id: certificate_link_in_website
    type: string
    description: Public URL to access the certificate; NULL if not issued.
  - id: issued_datetime
    type: timestamp_naive
    description: Timestamp when the certificate was issued; NULL if not issued.
  - id: is_certificate_issued
    type: boolean
    expr_sql: ${certificate_id} IS NOT NULL
    description: TRUE if the certificate has been issued to the user.
    visibility: "internal"
  - id: is_certificate_eligible
    type: boolean
    expr_sql: ${completed_criteria_resources_count} >= ${criteria_resource_count} AND ${criteria_resource_count} IS NOT NULL
    description: >-
      TRUE if the user has completed at least all required criteria resources and is
      eligible for a certificate. Uses >= (not =) to correctly handle cases where a
      course's criteria configuration has changed over time and a user may have completed
      more resources (including retired criteria) than currently required.
    visibility: "internal"
  - id: is_course_completed
    type: boolean
    expr_sql: ${course_completion_status} = 'COMPLETED'
    description: TRUE if the user has fully completed the course.
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: z_academy_users_course_wise_completion_details
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_course_wise_completion_details.user_id} AND ${course_id} = ${z_academy_users_course_wise_completion_details.course_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${course_last_progress_datetime}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(DATE(${course_last_progress_datetime}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nps_form_responses
    type: one_to_many
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id}
  - id: nps_form_responses_nov_and_dec_2025
    type: one_to_many
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}

id: academy_dpd_salesforce_task_details
type: model
description: >-
  Table Description — academy_dpd_salesforce_task_details

  This table is a task-level dataset capturing all Salesforce activities
  performed by the DPD (collections) team, enriched with user payment status,
  DPD classification, and engagement signals. Each record represents a specific
  task or interaction (primarily calls and follow-ups) executed by an agent for
  a user.

  It combines:

  Operational data → agent assignments, call status, follow-ups, task types

  Payment context → EMI status, DPD stage, payment buckets

  User intent & feedback → call remarks, reasons for non-payment, queries

  Engagement signals → initiatives, assessments, guidance meets

  The table enables tracking of the complete collections workflow, including:

  User assignment to agents

  Call attempts and outcomes (connected, not reachable, etc.)

  Promise-to-pay commitments

  Follow-up scheduling and execution

  Final payment outcomes

  This table is primarily used to:

  Measure agent performance (call done %, contact rate, productivity)

  Analyze payment conversion efficiency (contacted → paid, PTP → paid)

  Monitor DPD bucket movement and recovery trends

  Perform root cause analysis using call remarks and reason tags

  Evaluate the effectiveness of interventions (initiatives, guidance,
  assessments)

  Since the data is at a task-level granularity, it allows detailed operational
  tracking but requires aggregation for user-level or agent-level reporting.

  Overall, this table serves as a central source for DPD operations analytics,
  connecting Salesforce task execution with user payment behavior, enabling both
  day-to-day monitoring and strategic collections optimization.

  Important considerations:
  - **Time-to-payment and follow-up-latency metrics use CALENDAR TIME, not working hours.**
    All `avg_*_to_payment` / `avg_*_to_followup` measures are computed as raw wall-clock
    differences between datetimes. They do NOT exclude weekends, holidays, or non-working
    hours, and they do NOT apply any DPD-team shift / collections business calendar.
    A task created on a Friday and paid the following Tuesday will show 4 calendar days,
    even though only ~2 of those are working days. Whenever you query this table for
    SLA-style analysis (e.g. task created -> paid time, agent follow-up latency), you
    MUST surface this caveat to the stakeholder so they interpret the numbers as
    calendar latency, not effective working-day latency.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_dpd_salesforce_task_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of DPD Salesforce task records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users with DPD Salesforce task records
  - id: unique_assignees
    func: count_distinct
    of: assignee_email
    description: Count of unique agents/representatives assigned
  - id: total_call_duration_in_mins
    func: sum
    of: call_duration_in_mins
    description: Total call duration in minutes across all tasks
  - id: avg_call_duration_in_mins
    func: avg
    of: call_duration_in_mins
    description: Average call duration in minutes per task
  - id: calls_done_count
    func: count
    filters:
      - is_call_done
    description: Total number of tasks where the call was successfully done
  - id: avg_days_from_task_created_to_payment
    func_sql: AVG(DATE_DIFF(DATE(${payment_done_date__c}), ${created_date}, DAY))
    description: >-
      Average CALENDAR days from task creation to actual payment (only tasks with a non-null Payment_done_Date__c contribute).
      IMPORTANT - this is raw wall-clock time. It does NOT exclude weekends, holidays, or non-working hours, and does NOT apply any DPD-team shift / collections business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-day latency.
  - id: avg_days_from_task_created_to_followup
    func_sql: AVG(DATE_DIFF(DATE(${follow_up_needed_date}), ${created_date}, DAY))
    description: >-
      Average CALENDAR days from task creation to the scheduled next follow-up (only tasks with a non-null follow_up_needed_date contribute).
      IMPORTANT - this is raw wall-clock time. It does NOT exclude weekends, holidays, or non-working hours, and does NOT apply any DPD-team shift / collections business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-day latency.
dimensions:
  - id: id
    type: string
    unique: true
    description: Unique identifier for the user task in Salesforce. Primary key of the dataset.
  - id: user_id
    type: string
    description: Unique identifier for a user (UUID with hyphens). Used as the foreign key to track a user across all records, payments, and product interactions.
  - id: current_nbfc__c
    type: string
    expr_sql: "`Current_NBFC__c`"
    description: The current NBFC associated with the user's loan/payment plan.
  - id: current_nbfc_status__c
    type: string
    expr_sql: "`Current_NBFC_Status__c`"
    description: >-
      Status of the user's account with the current NBFC. Exact enum values -
        • Running
        • Paused
        • Closed
        • Closed - But Dues
        • Closed - Fully Paid
  - id: current_month_paid_status__c
    type: string
    expr_sql: "`Current_month_Paid_Status__c`"
    description: >-
      Indicates whether the user has paid their EMI for the current month. Exact enum values -
        • UNPAID
        • YET_TO_PAY
        • PAID
        • NOT_PRESENTED
  - id: dpd_payment_stage__c
    type: string
    expr_sql: "`DPD_Payment_Stage__c`"
    description: >-
      Stage of payment based on Days Past Due (DPD) progression. Exact enum values -
        • Payment confirmation Pending
        • Yet to Contact
        • Contact Again
        • EMI issue
        • Ready to Pay
        • Requesting for Closure
        • Paid
  - id: assignee
    type: string
    description: Name of the agent/representative assigned to the user.
  - id: assignee_email
    type: string
    description: Email address of the assigned agent/representative.
  - id: emi_date__c
    type: date
    expr_sql: "`EMI_Date__c`"
    description: Scheduled date for the user's EMI payment.
  - id: assigned_on
    type: date
    description: Date when the user was assigned to the agent.
  - id: dpd_bucket__c
    type: string
    expr_sql: "`DPD_Bucket__c`"
    description: >-
      Bucket categorizing the user based on the last three months' payments and time spent. Exact enum values -
        • A1
        • A2
        • A3
        • B1
        • B2
        • C1
        • C2
  - id: payment_bucket__c
    type: string
    expr_sql: "`Payment_Bucket__c`"
    description: >-
      Categorization of the user based on last month to current month payment status. Exact enum values -
        • RETAINED_USER
        • RESURRECTED_USER
        • NOT_RETAINED_USER
        • AT_RISK_USER
        • LOST_USER
        • YET_TO_PAY_USER
        • NO_PLAN_IN_CURRENT_MONTH
  - id: core_reason_description__c
    type: string
    expr_sql: "`Core_Reason_Description__c`"
    description: Detailed description of the core reason for default or non-payment.
  - id: core_reasons__c
    type: string
    expr_sql: "`Core_Reasons__c`"
    description: High-level categorized reason for default or delinquency.
  - id: resurrction_priority__c
    type: string
    expr_sql: "`Resurrction_Priority__c`"
    description: >-
      Priority order to call the student for resurrecting the user. Exact enum values -
        • P1
        • P2
        • P3
  - id: initatives
    type: string
    description: Tagging Initiatives. If a user has attended multiple initiatives, they will be recorded as comma-separated values.
  - id: assessments
    type: string
    description: Assessment details recorded for the user.
  - id: assessment_status
    type: string
    description: Current status of the user's assessment process.
  - id: guidance_meets
    type: string
    description: Indicates whether the user attended guidance meets.
  - id: preparation_summary
    type: string
    description: Summary of the user's preparation.
  - id: yet_to_cover_amount
    type: string
    description: Remaining outstanding amount the user still needs to pay.
  - id: will_pay_on_date
    type: string
    description: Date committed by the user for making the payment (Promise to Pay date).
  - id: follow_up_needed_date
    type: timestamp_naive
    description: Timestamp indicating when the next follow-up with the user is due.
  - id: activity_hook
    type: string
    description: Trigger or hook that initiated a specific activity or workflow.
  - id: npc_split_tag__c
    type: string
    expr_sql: "`NPC_Split_Tag__c`"
    description: >-
      Tag indicating whether the user belongs to REGULAR or RENEWAL in that month. Exact enum values -
        • REGULAR
        • RENEWAL
  - id: created_date
    type: date
    description: Date when the task record was created.
  - id: task_name__c
    type: string
    expr_sql: "`Task_Name__c`"
    description: Name or title of the task filled by the agent.
  - id: call_done__c
    type: string
    expr_sql: "`Call_Done__c`"
    description: >-
      Flag indicating whether the scheduled call has been completed. Exact enum values -
        • Yes
        • No
  - id: call_status
    type: string
    description: Current status of the call (e.g., connected, not reachable, busy).
  - id: call_type
    type: string
    description: Type of call made (e.g., Inbound, Outbound, Closure Call).
  - id: call_task_type__c
    type: string
    expr_sql: "`Call_task_type__c`"
    description: Category/type of the call task (e.g., Parent, Student).
  - id: payment_stage_dpd__c
    type: string
    expr_sql: "`Payment_Stage_DPD__c`"
    description: Payment stage mapped specifically to the DPD level of the user.
  - id: payment_done_date__c
    type: timestamp_naive
    expr_sql: "`Payment_done_Date__c`"
    description: Timestamp when the payment was actually made by the user.
  - id: queries_asked__c
    type: string
    expr_sql: "`Queries_Asked__c`"
    description: Queries or questions raised by the user during the call.
  - id: call_remarks__c
    type: string
    expr_sql: "`Call_Remarks__c`"
    description: Agent's remarks or notes recorded after the call.
  - id: recording_url_nxt__c
    type: string
    expr_sql: "`Recording_URL_NXT__c`"
    description: URL link to the call recording on the platform.
  - id: call_duration_in_mins
    type: number
    description: Duration of the call in minutes.
  - id: call_done_status
    type: string
    description: Status indicating the outcome/completion state of the call (e.g., call done, unsuccessful, yet to contact).
  - id: bachelors_end_year
    type: number
    description: Year in which the user completed their bachelor's degree.
  - id: bachelors_end_year_bucket
    type: string
    description: Bucketed grouping of the bachelor's end year (e.g., 2024 & Below, 2025, 2026, 2027).
  - id: is_call_done
    type: boolean
    expr_sql: "`Call_Done__c` = 'Yes'"
    description: TRUE if the scheduled call was completed (Call_Done__c = 'Yes').
    visibility: "internal"
  - id: created_month
    type: date
    expr_sql: DATE_TRUNC(${created_date}, MONTH)
    description: Month in which the task record was created, truncated to the first day of the month. Useful for monthly trend analysis.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${created_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(${created_date}, MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nbfc_renewals_conversion_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_nbfc_renewals_conversion_details.user_id} AND DATE_TRUNC(${created_date}, MONTH) = ${academy_nbfc_renewals_conversion_details.month}
  - id: z_academy_users_course_wise_completion_details
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_course_wise_completion_details.user_id}
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_live_classes_attendance_and_time_spent_details.user_id}
  - id: academy_nps_form_responses
    type: one_to_many
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND DATE_TRUNC(${created_date}, MONTH) = ${academy_nps_form_responses.form_submission_month}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}
  - id: y_academy_user_event_engagement_details
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${y_academy_user_event_engagement_details.user_id}
  - id: z_academy_users_topin_tech_assessments
