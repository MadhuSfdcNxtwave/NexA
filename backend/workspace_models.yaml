id: live_class_cohort_slot_wise_users_ivschats3_data
type: model
description: >-
  Captures user interactions and engagement within live cohort sessions. Each
  row represents a single user interaction event — a chat message, emoji
  reaction, hand raise, mic toggle, or media share — enriched with cohort
  scheduling and session metadata.

  Granularity: One row = one interaction event. The content_type field drives
  interpretation of the content field:

  — CHAT_MESSAGE → text content  |  CHAT_REACTION → emoji type (like, clap,
  dislike, party, question, thinking)

  — HAND_ACTION / MIC_ACTION → boolean string (true/false)  |  CHAT_MEDIA →
  attachment reference or link

  Session linkage: meet_session_id groups events within a live class;
  chat_room_arn identifies the chat channel.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`liv\
  e_class_cohort_slot_wise_users_ivschats3_data`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: resource_id
    type: string
    description: Unique identifier of the resource or material shared during the
      session. Populated only for CHAT_MEDIA events; null otherwise.
  - id: slot_id
    type: string
    description: Unique identifier of the live class slot within the cohort
  - id: record_id
    type: string
    unique: true
    description: Unique identifier for each row in the table. Use as the primary key
      for deduplication. Note - ideally meet_session_id to slot_id is a one-to-one
      mapping, but due to some discrepancies one meet session can map to more than
      one slot; in such cases record_id may not be truly unique.
  - id: content
    type: string
    description: Actual payload of the interaction, interpreted based on
      content_type - text string for CHAT_MESSAGE; emoji label (like, clap,
      dislike, party, question, thinking) for CHAT_REACTION; boolean string
      (true/false) for HAND_ACTION and MIC_ACTION; attachment reference or link
      for CHAT_MEDIA
  - id: slot_start_time
    type: other
    description: Scheduled start time of the live class slot (e.g., 08:00 AM)
  - id: cohort_end_date
    type: date
    description: End date of the cohort
  - id: slot_date
    type: date
    description: Date on which the live class slot is scheduled
  - id: course_id
    type: string
    description: Unique identifier of the course (UUID with hyphens)
  - id: message_id
    type: string
    description: Unique identifier of the chat message. Populated for CHAT_MESSAGE
      and CHAT_REACTION events; may be null for HAND_ACTION, MIC_ACTION events.
  - id: event_timestamp
    type: timestamp_naive
    description: Timestamp when the interaction event occurred. Use this as the
      source of truth for sequencing events.
  - id: cohort_start_date
    type: date
    description: Start date of the cohort
  - id: cohort_id
    type: string
    description: Unique identifier of the cohort
  - id: resource_title
    type: string
    description: Title or name of the shared resource. Populated only for CHAT_MEDIA
      events; null otherwise.
  - id: meet_session_id
    type: string
    description: Unique identifier of the live meet session. Groups all interaction
      events that occurred within the same session.
  - id: chat_room_arn
    type: string
    description: Amazon Resource Name (ARN) identifying the IVS chat room associated
      with the session
  - id: cohort_template_title
    type: string
    description: Title of the cohort template
  - id: cohort_template_id
    type: string
    description: Unique identifier of the cohort template used to generate this
      cohort's daily slot schedule
  - id: course_title
    type: string
    description: Title of the course associated with the live class session
  - id: day_count
    type: number
    description: Day number of the slot within the cohort, representing the specific
      day in the cohort schedule
  - id: cohort_name
    type: string
    description: Name of the cohort
  - id: meet_host_user_id
    type: string
    description: User ID of the instructor or host who conducted the live class
  - id: content_type
    type: string
    description: >-
      Type of the interaction event. Drives the interpretation of the content field. Exact enum values -
        • CHAT_MESSAGE
        • CHAT_REACTION
        • HAND_ACTION
        • MIC_ACTION
        • CHAT_MEDIA
  - id: user_id
    type: string
    description: Unique identifier of the user who performed the interaction (UUID
      with hyphens)
  - id: slot_end_time
    type: other
    description: Scheduled end time of the live class slot (e.g., 10:00 AM)
  - id: event_date
    type: date
    description: Date portion of event_timestamp. Derived for use in partitioning
      and daily aggregations.
  - id: course_cohort_name
    type: string
    description: Combined name of the course and its batch number (e.g., "Data
      Analytics — Batch 3")
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
