id: academy_placement_profile_registration_details
type: model
description: >-
  Unified placement profile registration details. Registration is the first
  step in the placement roadmap provided to the users — the user shares their
  resume, coding profiles (LeetCode, CodeChef, Codeforces, GitHub), LinkedIn,
  certifications, deployed projects, and current CGPA.

  This dataset is built by UNION ALL-ing rows from multiple source registration
  form tables. The originating form is identified by the `data_source` column.
  A single user may submit multiple times across forms, so the unique grain is
  the combination of (user_id, data_source, form_submission_datetime).
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_placement_profile_registration_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of placement profile registration submissions
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who submitted placement profile registrations
dimensions:
  - id: user_submission_key
    type: string
    expr_sql: CONCAT(${user_id}, '|', COALESCE(${data_source}, ''), '|', CAST(${form_submission_datetime} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, data_source, and form_submission_datetime, since a user can submit multiple times across forms.
  - id: user_id
    type: string
    description: Unique identifier of the user who submitted the registration (UUID with hyphens).
  - id: form_submission_datetime
    type: timestamp_naive
    description: Date and time when the user submitted the placement profile registration form.
  - id: data_source
    type: string
    description: >-
      Identifier of the originating source form for this registration record
      (UNION ALL combined from multiple registration form tables). Exact enum values -
        • 2025_YOG
        • Accounts_Form
        • Assessment_SkillCerts
        • Internship_2028_2029
        • Placement_2026
        • Placement_2027
  - id: linkedin_profile_link
    type: string
    description: LinkedIn profile URL shared by the user.
  - id: share_your_github_profile_url_link
    type: string
    description: GitHub profile URL shared by the user.
  - id: share_your_leetcode_profile_url_link
    type: string
    description: LeetCode profile URL shared by the user.
  - id: share_your_code_chef_profile_url_link
    type: string
    description: CodeChef profile URL shared by the user.
  - id: share_your_codeforces_profile_link
    type: string
    description: Codeforces profile URL shared by the user.
  - id: do_you_have_any_other_coding_profile_links_if_yes_please_provide_them_below
    type: string
    description: Any other coding profile links shared by the user beyond the standard ones (HackerRank, GeeksforGeeks, etc.).
  - id: personal_website_portfolio_link_if_any
    type: string
    description: Personal website or portfolio URL shared by the user (optional).
  - id: live_deployed_project_links
    type: string
    description: Links to the user's live deployed projects.
  - id: share_your_updated_resume_drive_folder_link
    type: string
    description: Drive folder link containing the user's updated resume.
  - id: share_the_certifications_drive_folder_link
    type: string
    description: Drive folder link containing the user's certifications.
  - id: what_is_your_current_final_cgpa
    type: string
    description: User's current or final CGPA as reported in the registration form.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${form_submission_datetime}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(DATE(${form_submission_datetime}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: y_academy_users_placements_details
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_users_placements_details.user_id}
  - id: z_ccbp_academy_users_jobs_details
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_jobs_details.user_id}
  - id: z_academy_placement_eligibility_user_wise_stage_wise_best_attempts
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_placement_eligibility_user_wise_stage_wise_best_attempts.user_id}
  - id: z_academy_users_topin_tech_assessments
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_topin_tech_assessments.user_id}

id: academy_student_success_salesforce_case_details
type: model
description: >-
  This table stores the Salesforce Case object — every student support ticket
  raised on the Academy student-success platform across all channels (Phone,
  Chat, Email, Web, AI chatbot escalations, etc.). Each row represents one
  unique case, with full lifecycle metadata - creation, ownership, priority,
  channel/origin, SLA milestones (first response, resolution, violations),
  reopen history, escalations, related Contact/Account/Asset/Product, and
  free-text fields (Description, Subject, student-elaborated query) suitable
  for NLP/topic-modeling.

  Primary use cases:
  - Case volume, channel mix, and SLA compliance analysis
  - Resolution-time and first-response benchmarking by owner, queue, priority, type
  - Reopen / first-contact-resolution quality metrics
  - Linking chatbot sessions (via CONVERSATION_ID__c / Salesforce Case ID) to
    escalated human-handled tickets in ai_chat_bot_users_ticket_details
  - Joining to Contact/UID__c for student-level repeat-case and demographic analysis

  Important considerations:
  - **SLA / time-to-resolution metrics use CALENDAR TIME, not working hours.**
    The `avg_*_resolution_*` and `avg_first_response_minutes` measures are raw
    wall-clock differences. They do NOT exclude nights, weekends, holidays, or
    non-working hours. Use BusinessHoursId-aware logic in source SQL if a true
    business-hours SLA is required. Always surface this caveat to stakeholders.
  - Several Salesforce formula fields (Case_Open__c, Case_Closed_or_Resloved__c,
    Auto_Close_Time__c, Agent_Name__c, Case_Link__c) are redundant with their
    standard counterparts (Status, ClosedDate, OwnerId) — prefer the standard
    fields for cleaner analysis.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_student_success_salesforce_case_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of case records
  - id: unique_cases
    func: count_distinct
    of: id
    description: Count of unique Salesforce cases
  - id: unique_contacts
    func: count_distinct
    of: contactid
    description: Count of unique Contact records associated with cases
  - id: unique_students
    func: count_distinct
    of: uid__c
    description: Count of unique students (via UID__c) who raised cases
  - id: closed_cases
    func: count
    filters:
      - is_closed
    description: Count of cases that have been closed (ClosedDate is not null)
  - id: escalated_cases
    func: count
    filters:
      - isescalated
    description: Count of cases flagged as escalated
  - id: first_response_violated_cases
    func: count
    filters:
      - first_response_violated__c
    description: Count of cases that breached first-response SLA
  - id: resolution_time_violated_cases
    func: count
    filters:
      - resolution_time_violated__c
    description: Count of cases that breached resolution-time SLA
  - id: sla_violated_cases
    func: count
    filters:
      - violated__c
    description: Count of cases with any SLA violation (overall flag)
  - id: total_emails_sent
    func: sum
    of: email_sent__c
    description: Total emails sent across all cases
  - id: avg_first_response_minutes
    func: avg
    of: first_response_time__c
    description: >-
      Average first-response duration in minutes.
      CALENDAR TIME — does not exclude non-business hours. Surface caveat to stakeholders.
  - id: avg_resolution_hours
    func_sql: AVG(TIMESTAMP_DIFF(${closeddate}, ${createddate}, HOUR))
    description: >-
      Average CALENDAR hours from case creation to closure (only closed cases contribute).
      Raw wall-clock — does NOT exclude nights/weekends/holidays/non-business hours.
      Always surface this caveat to stakeholders.
  - id: median_resolution_hours
    func_sql: APPROX_QUANTILES(TIMESTAMP_DIFF(${closeddate}, ${createddate}, HOUR), 100)[OFFSET(50)]
    description: >-
      Median CALENDAR hours from case creation to closure. More robust to long-tail outliers.
      Raw wall-clock — does NOT exclude nights/weekends/holidays/non-business hours.
      Always surface this caveat to stakeholders.
  - id: avg_reopens_per_case
    func: avg
    of: number_of_times_reopened__c
    description: Average number of times a case was reopened. Lower is better — proxy for first-contact-resolution quality.
dimensions:
  # ─── Primary key & core identifiers ───
  - id: id
    type: string
    expr_sql: "`Id`"
    unique: true
    description: Salesforce Case primary key (18-char Case ID). Join target for ai_chat_bot_users_ticket_details.salesforce_ticket_reference_id.
  - id: casenumber
    type: string
    expr_sql: "`CaseNumber`"
    description: Auto-generated human-readable case number. Use for dashboard drill-downs and deduplication.
  - id: parentid
    type: string
    expr_sql: "`ParentId`"
    description: Reference to a parent Case. Enables parent-child case hierarchy and complex-issue tracking.

  # ─── Relationships / lookup IDs ───
  - id: accountid
    type: string
    expr_sql: "`AccountId`"
    description: Lookup to Account object — user parent/customer record. Use for account-level case volume, health scoring, and revenue-tier segmentation.
  - id: contactid
    type: string
    expr_sql: "`ContactId`"
    description: Lookup to related Contact record. Primary join key for student-level demographics, enrollment status, and repeat-case analysis.
  - id: ownerid
    type: string
    expr_sql: "`OwnerId`"
    description: Lookup to User/Group currently owning the case. Critical for agent/team workload and resolution-time-by-owner analysis. Prefer this over Agent_Name__c.
  - id: createdbyid
    type: string
    expr_sql: "`CreatedById`"
    description: User who created the case. Useful for distinguishing self-service vs agent-created cases.
  - id: lastmodifiedbyid
    type: string
    expr_sql: "`LastModifiedById`"
    description: User who last modified the case. Audit trail for collaboration and handoff analysis.
  - id: assetid
    type: string
    expr_sql: "`AssetId`"
    description: Lookup to Asset object. Enables product-specific analysis — case patterns by asset type, warranty status, lifecycle stage.
  - id: productid
    type: string
    expr_sql: "`ProductId`"
    description: Lookup to Product object. Useful for product defect tracking and roadmap prioritization.
  - id: sourceid
    type: string
    expr_sql: "`SourceId`"
    description: Lookup to the originating Salesforce object (omnichannel). Tracks unified case-creation provenance.
  - id: businesshoursid
    type: string
    expr_sql: "`BusinessHoursId`"
    description: Business Hours record governing SLA calculations for this case. Required for accurate working-hour response time analysis.
  - id: entitlementid
    type: string
    expr_sql: "`EntitlementId`"
    description: Associated Entitlement record. Used for SLA-compliance analysis by entitlement tier.
  - id: entitlement_id__c
    type: string
    expr_sql: "`Entitlement_Id__c`"
    description: External entitlement identifier for upstream-system integration with SLA tiers.

  # ─── Student identifiers ───
  - id: uid__c
    type: string
    expr_sql: "`UID__c`"
    description: Unique student identifier (master student ID). Use for cross-system student correlation and joins to academy user tables.
  - id: student_name__c
    type: string
    expr_sql: "`Student_Name__c`"
    description: Student name (denormalized). Display/reference only — use ContactId for joins.
  - id: student_registered_program__c
    type: string
    expr_sql: "`Student_Registered_Program__c`"
    description: Program the student is enrolled in. Use for program/course-specific satisfaction and case-volume analysis.

  # ─── Channel / origin / classification ───
  - id: origin
    type: string
    expr_sql: "`Origin`"
    description: Source channel of the case (Phone, Chat, Email, Web, etc.). Key dimension for channel-effectiveness analysis.
  - id: ticket_from__c
    type: string
    expr_sql: "`Ticket_From__c`"
    description: Source/provenance of the ticket creation. Internal vs external ticket analysis.
  - id: type
    type: string
    expr_sql: "`Type`"
    description: Case type classification. Use for workflow and type-specific resolution-pattern analysis.
  - id: type_of_request__c
    type: string
    expr_sql: "`Type_of_Request__c`"
    description: Specific request category. Granular service-request pattern analysis.
  - id: reason
    type: string
    expr_sql: "`Reason`"
    description: Reason for case creation. Valuable for trend analysis, training-needs identification, resource allocation.
  - id: sub_type__c
    type: string
    expr_sql: "`Sub_Type__c`"
    description: Sub-category of the issue. Granular issue breakdown.
  - id: tags__c
    type: string
    expr_sql: "`Tags__c`"
    description: Ad-hoc case tagging for flexible issue grouping.
  - id: group__c
    type: string
    expr_sql: "`Group__c`"
    description: Group assignment for the case. Use for team-level workload balancing and performance.

  # ─── Status, priority, lifecycle ───
  - id: status
    type: string
    expr_sql: "`Status`"
    description: Current case status. Use for funnel/pipeline velocity and bottleneck identification. Prefer over Case_Open__c / Case_Closed_or_Resloved__c.
  - id: priority
    type: string
    expr_sql: "`Priority`"
    description: Case priority level. Urgency analysis, priority-handling effectiveness, escalation prediction.
  - id: isclosedoncreate
    type: boolean
    expr_sql: "`IsClosedOnCreate`"
    description: TRUE if case was closed on creation (auto-resolved / spam edge case). Quality-control signal.
  - id: isescalated
    type: boolean
    expr_sql: "`IsEscalated`"
    description: Escalation flag. Use for root-cause and training-gap analysis.
  - id: milestonestatus
    type: string
    expr_sql: "`MilestoneStatus`"
    description: Status of the entitlement/service milestone. SLA milestone compliance.
  - id: number_of_times_reopened__c
    type: number
    expr_sql: "`Number_of_Times_Reopened__c`"
    description: Number of times the case was reopened. Quality KPI — first-contact-resolution effectiveness.

  # ─── Datetime fields ───
  - id: createddate
    type: timestamp_naive
    expr_sql: "`CreatedDate`"
    description: Datetime the case was created. Use for volume trending, seasonality, peak-hour analysis, staffing planning.
  - id: closeddate
    type: timestamp_naive
    expr_sql: "`ClosedDate`"
    description: Datetime the case was closed. Core SLA metric — resolution time and aging analysis.
  - id: resolved_date__c
    type: timestamp_naive
    expr_sql: "`Resolved_Date__c`"
    description: Custom resolution timestamp. Alternative to ClosedDate for nuanced resolution analysis.
  - id: first_response_date_and_time__c
    type: timestamp_naive
    expr_sql: "`First_Response_Date_and_time__c`"
    description: Timestamp of the first agent response. Critical SLA metric for first-contact-resolution benchmarking.
  - id: first_response_time__c
    type: number
    expr_sql: "`First_Response_Time__c`"
    description: First-response duration in minutes (Salesforce formula). Performance KPI for agent benchmarking and SLA compliance.
  - id: latest_closed_date__c
    type: timestamp_naive
    expr_sql: "`Latest_Closed_Date__c`"
    description: Most recent closure timestamp. Used together with reopened_date for case-stability metrics.
  - id: latest_re_opened_date__c
    type: timestamp_naive
    expr_sql: "`Latest_Re_opened_Date__c`"
    description: Most recent reopen timestamp. Use for first-time resolution rate calculation.
  - id: auto_close_time__c
    type: timestamp_naive
    expr_sql: "`Auto_Close_Time__c`"
    description: System auto-closure timestamp (Salesforce formula). Redundant with ClosedDate — prefer ClosedDate.
  - id: created_date
    type: date
    expr_sql: DATE(`CreatedDate`)
    description: Date portion of CreatedDate. Useful for daily/weekly/monthly trend aggregations.
  - id: created_month
    type: date
    expr_sql: DATE_TRUNC(DATE(`CreatedDate`), MONTH)
    description: Month of case creation, truncated to first day of month. Useful for monthly trend analysis.

  # ─── SLA violations ───
  - id: first_response_violated__c
    type: boolean
    expr_sql: "`First_Response_Violated__c`"
    description: TRUE if first-response SLA was breached. Use for systemic issue identification.
  - id: resolution_time_violated__c
    type: boolean
    expr_sql: "`Resolution_Time_Violated__c`"
    description: TRUE if resolution-time SLA was breached. Systemic performance issue indicator.
  - id: violated__c
    type: boolean
    expr_sql: "`Violated__c`"
    description: Overall SLA violation flag. High-level SLA-health indicator.

  # ─── Content / free-text ───
  - id: subject
    type: string
    expr_sql: "`Subject`"
    description: Case subject. Use for query categorization, trend analysis, and auto-classification training.
  - id: description
    type: string
    expr_sql: "`Description`"
    description: Main case description (long text). NLP candidate — topic modeling, sentiment analysis, keyword extraction.
  - id: elaborate_the_query_asked_by_student__c
    type: string
    expr_sql: "`Elaborate_the_Query_asked_by_Student__c`"
    description: Extended details of the student's query (rich text). Use for pain-point identification and FAQ development.
  - id: chat_description__c
    type: string
    expr_sql: "`Chat_Description__c`"
    description: Detailed chat conversation content (rich text). NLP candidate for sentiment, keywords, chat-quality scoring.
  - id: what_was_the_reason_the_student_reached__c
    type: string
    expr_sql: "`What_was_the_reason_the_student_reached__c`"
    description: Student-stated reason for reaching support. Root-cause analysis input.
  - id: comments
    type: string
    expr_sql: "`Comments`"
    description: Internal team notes (4000-char text). Workflow documentation and knowledge-capture signal.
  - id: private_note__c
    type: string
    expr_sql: "`Private_Note__c`"
    description: Private internal notes for team coordination.

  # ─── Communication & integration ───
  - id: email_sent__c
    type: number
    expr_sql: "`Email_Sent__c`"
    description: Count of emails sent on this case. Communication-efficiency and response-completeness signal.
  - id: conversation_id__c
    type: string
    expr_sql: "`CONVERSATION_ID__c`"
    description: Unique chat conversation ID. Join target for chatbot session-to-case conversion tracking (matches ai_chat_bot_users_session_details.session_id where applicable).
  - id: messaging_session__c
    type: string
    expr_sql: "`Messaging_Session__c`"
    description: Related messaging session ID. Omnichannel session-to-case conversion analysis.
  - id: tatateleid_nxt__c
    type: string
    expr_sql: "`TataTeleId_NXT__c`"
    description: Telecom (Tata Tele) integration ID. External-system correlation key.
  - id: language
    type: string
    expr_sql: "`Language`"
    description: Case language. Use for multilingual / language-specific resolution-pattern analysis.
  - id: emi_status__c
    type: string
    expr_sql: "`EMI_Status__c`"
    description: User's EMI payment status at case time. Correlates payment issues with case volume and resolution patterns.

  # ─── Web-form / external reporter fields ───
  - id: suppliedname
    type: string
    expr_sql: "`SuppliedName`"
    description: Name from the Web form. Self-service adoption metric.
  - id: suppliedcompany
    type: string
    expr_sql: "`SuppliedCompany`"
    description: Company name from the Web form. Self-service / web-form completion-pattern signal.
  - id: your_name__c
    type: string
    expr_sql: "`Your_Name__c`"
    description: External reporter name (third-party). Use for partner/affiliate case tracking.
  - id: your_company_mail_id__c
    type: string
    expr_sql: "`Your_company_mail_ID__c`"
    description: Reporter company email. External partner/affiliate reporting signal.
  - id: your_team_name__c
    type: string
    expr_sql: "`Your_Team_Name__c`"
    description: Reporter team. Partner / team-specific issue-pattern analysis.
  - id: contactfax
    type: string
    expr_sql: "`ContactFax`"
    description: Contact fax number. Low analytical value — rarely used in modern student support.

  # ─── Redundant / low-value Salesforce formula fields ───
  - id: agent_name__c
    type: string
    expr_sql: "`Agent_Name__c`"
    description: Assigned agent display name (Salesforce formula). Redundant with OwnerId — prefer OwnerId lookup for cleaner joins.
  - id: case_open__c
    type: number
    expr_sql: "`Case_Open__c`"
    description: Formula flag indicating whether the case is open. Redundant with Status — prefer Status picklist for granular open/closed/in-progress analysis.
  - id: case_closed_or_resloved__c
    type: number
    expr_sql: "`Case_Closed_or_Resloved__c`"
    description: Formula flag indicating whether the case is resolved. Redundant with Status — prefer Status picklist.
  - id: case_link__c
    type: string
    expr_sql: "`Case_Link__c`"
    description: Hyperlink to the case record. Not useful for analysis — use CaseNumber instead.

  # ─── Derived boolean dimensions ───
  - id: is_closed
    type: boolean
    expr_sql: "`ClosedDate` IS NOT NULL"
    description: TRUE if the case has been closed (ClosedDate is not null).
    visibility: "internal"
  - id: is_resolved
    type: boolean
    expr_sql: "`Resolved_Date__c` IS NOT NULL"
    description: TRUE if the case has a non-null Resolved_Date__c.
    visibility: "internal"
  - id: was_reopened
    type: boolean
    expr_sql: COALESCE(`Number_of_Times_Reopened__c`, 0) > 0
    description: TRUE if the case was reopened at least once. Use for first-contact-resolution analysis.
    visibility: "internal"
relations:
  - id: ai_chat_bot_users_ticket_details
    type: one_to_one
    join_sql: ${id} = ${ai_chat_bot_users_ticket_details.salesforce_ticket_reference_id}
  - id: ai_chat_bot_users_session_details
    type: many_to_one
    join_sql: ${conversation_id__c} = ${ai_chat_bot_users_session_details.session_id}
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${uid__c}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${uid__c} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${uid__c} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${uid__c} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${createddate}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${uid__c} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(DATE(${createddate}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_student_success_salesforce_task_details
    type: one_to_many
    join_sql: ${uid__c} = ${academy_student_success_salesforce_task_details.user_id}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${uid__c} = ${academy_nps_form_responses.user_id} AND DATE_TRUNC(DATE(${createddate}), MONTH) = ${academy_nps_form_responses.form_submission_month}

id: academy_student_success_salesforce_task_details
type: model
description: >-
  This table captures all user interaction call tasks performed by Success
  Coaches or agents. Each record represents a call-related task created after an
  interaction with a user or parent, including the type of interaction, call
  metadata, outcome, duration, and agent remarks.

  The table also stores historical ownership of the task (Success Coach and
  Senior Success Coach emails) and optionally includes user or parent feedback
  on live classes, available for tasks created from December 2025 onward.

  This dataset is primarily used for call performance analysis, engagement
  tracking, coach productivity reporting, and user feedback insights. When analysing outbound calls, consider only tasks with a non-null task type. For inbound calls, consider both null and non-null task types.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_student_success_salesforce_task_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: task_id
    type: string
    unique: true
    description: Unique ID of the task submitted by success coach/agent
  - id: task_type
    type: string
    description: >-
      Type of interaction. Exact enum values -
        • Engagement Call Task
        • Student Growth Call Task
        • Intro Call Task
        • Incoming Call Task
        • Payment Call Task
        • Parent Call Task
  - id: call_type
    type: string
    description: >-
      Call direction (null for direct phone calls). Exact enum values -
        • Inbound
        • Outbound
  - id: sr_sc_mail
    type: string
    description: Senior success coach email
  - id: user_id
    type: string
    description: Unique user ID (UUID with hyphens)
  - id: call_date
    type: timestamp_naive
    description: Date & time of the interaction in UTC
  - id: sc_mail
    type: string
    description: Success coach email (historical — who submitted the task)
  - id: call_duration_min
    type: number
    description: Call duration in minutes (use 0 if null; may be missing for direct
      phone calls)
  - id: any_feedback_on_live_classes
    type: string
    description: Feedback from user/parent on live classes (available from Dec 2025 onward)
  - id: call_status
    type: string
    description: >-
      Call outcome. Exact enum values -
        • Call Back
        • Call Busy
        • Call Done
        • Call Rejected
        • Not Answered
        • Switch Off
        • Wrong Number
  - id: call_remarks
    type: string
    description: Remarks added by success coach or agent
  - id: task_category
    type: string
    description: >-
      Category of the task based on the agent. Exact enum values -
        • SC_TASK   (success coach team)
        • DPD_TASK  (dpd team)
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id},"-","") = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${call_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}

id: academy_success_coach_tatatele_call_details
type: model
description: >-
  This table is a curated, de-duplicated view of outbound call activity made by
  Academy Success Coaches through the Tata Tele / Smartflo cloud telephony
  platform. It is derived from the raw source table by filtering to a defined
  roster of 65 coach agent names and to outbound calls only.

  Each row represents one unique call attempt, and is used to monitor coach
  activity, measure connection and engagement rates, analyse peak calling windows,
  and segment performance by telecom circle and operator.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_success_coach_tatatele_call_details`"
measures:
  - id: dialled
    func: count
    of: id
    description: Total call attempts in the period.
  - id: answered
    func: count
    filters:
      - is_answered
    description: Number of calls that were picked up (status = 'answered').
  - id: missed
    func: count
    filters:
      - is_missed
    description: Number of calls not picked up (status = 'missed').
  - id: early_abandoned
    func: count
    filters:
      - is_early_abandoned
    description: Answered calls dropped by the called party within 20 seconds. Proxy for accidental pick-ups or immediate hang-ups.
  - id: engaged_calls
    func: count
    filters:
      - is_engaged_call
    description: Answered calls with meaningful talk time (answered_seconds >= 20 s). Denominator for all duration metrics.
  - id: answered_rate
    func_sql: SAFE_DIVIDE(COUNTIF(${status} = 'answered'), COUNT(${id})) * 100
    description: Percentage of dials that connected. Key connection-quality KPI.
  - id: early_abandonment_rate
    func_sql: SAFE_DIVIDE(COUNTIF(${status} = 'answered' AND ${answered_seconds} < 20 AND ${reason} = 'disconnected_by_callee'), COUNTIF(${status} = 'answered')) * 100
    description: Percentage of answered calls that were abandoned within 20 seconds. High values may indicate robocall-like behaviour or wrong numbers.
  - id: avg_call_time_minutes
    func_sql: AVG(CASE WHEN ${status} = 'answered' AND ${answered_seconds} >= 20 THEN ${answered_seconds} / 60 END)
    description: Mean talk time in minutes for engaged calls (answered_seconds >= 20 s).
  - id: p25_call_time_minutes
    func_sql: APPROX_QUANTILES(CASE WHEN ${status} = 'answered' AND ${answered_seconds} >= 20 THEN ${answered_seconds} / 60 END, 100)[OFFSET(25)]
    description: 25th percentile of talk time (minutes) across engaged calls.
  - id: p50_call_time_minutes
    func_sql: APPROX_QUANTILES(CASE WHEN ${status} = 'answered' AND ${answered_seconds} >= 20 THEN ${answered_seconds} / 60 END, 100)[OFFSET(50)]
    description: Median talk time (minutes) across engaged calls.
  - id: p75_call_time_minutes
    func_sql: APPROX_QUANTILES(CASE WHEN ${status} = 'answered' AND ${answered_seconds} >= 20 THEN ${answered_seconds} / 60 END, 100)[OFFSET(75)]
    description: 75th percentile of talk time (minutes) across engaged calls.
  - id: p90_call_time_minutes
    func_sql: APPROX_QUANTILES(CASE WHEN ${status} = 'answered' AND ${answered_seconds} >= 20 THEN ${answered_seconds} / 60 END, 100)[OFFSET(90)]
    description: 90th percentile of talk time (minutes) — useful for identifying unusually long calls or coach-level outliers.
dimensions:
  - id: id
    type: string
    unique: true
    description: Unique identifier for each call record.
  - id: agent_name
    type: string
    description: Display name of the Academy Success Coach (agent) who initiated the call, as configured in the Smartflo platform.
  - id: uuid
    type: string
    description: Unique telephony session identifier assigned by the Tata Tele / Smartflo platform. Used to correlate with raw CDR exports. This is NOT the internal NxtWave user_id.
  - id: status
    type: string
    description: >-
      Outcome of the call attempt. Drives segmentation between connected and non-connected calls. Exact enum values -
        • answered  (call connected)
        • missed    (call not picked up)
  - id: reason
    type: string
    description: >-
      Telephony-level termination reason from SIP/PSTN signaling. Exact enum values -
        • noanswer
        • cancel
        • disconnected_by_callee
        • disconnected_by_caller
        • busy
        • congestion
        • chanunavail
        • Unknown reason
  - id: call_duration
    type: number
    description: Total elapsed time of the call in seconds, from dialling initiation to call termination. Includes ring time.
  - id: answered_seconds
    type: number
    description: Number of seconds the call was actually connected (post-answer). Zero for missed/unanswered calls. Primary metric for talk-time analysis. Use the 20 s threshold to separate engaged calls from early-abandoned ones.
  - id: answered_minutes
    type: number
    expr_sql: ${answered_seconds} / 60
    description: Answered seconds expressed in minutes. Use in place of answered_seconds when minute-level granularity is preferred.
  - id: circle
    type: string
    description: Telecom regulatory circle (TRAI-defined licensed service area) of the called party's number, as returned by the HLR/number-lookup service. May contain city/district names for MNP-ported numbers; NULL/empty when lookup fails.
  - id: circle_normalized
    type: string
    expr_sql: >-
      CASE
        WHEN ${circle} IS NULL OR TRIM(${circle}) = '' OR ${circle} = 'Unknown' THEN 'Unknown'
        WHEN ${circle} IN ('Jammu', 'Srinagar', 'Jammu and Kashmir') THEN 'Jammu and Kashmir'
        WHEN ${circle} IN ('Andhra Pradesh', 'Andhra Pradesh & Telangana') THEN 'Andhra Pradesh & Telangana'
        ELSE ${circle}
      END
    description: >-
      Normalized telecom circle. Consolidates Jammu/Srinagar variants into
      'Jammu and Kashmir'; Andhra Pradesh into 'Andhra Pradesh & Telangana';
      NULL/empty/Unknown into 'Unknown'. City/district-level values from MNP-ported
      numbers (e.g. Bhadrachalam, Burhanpur, Moga) are passed through as-is and
      have not yet been mapped to their parent TRAI circle.
  - id: operator
    type: string
    description: Carrier name as returned by HLR lookup. Multiple raw variants may exist for the same MNO; use operator_normalized for canonical grouping.
  - id: operator_normalized
    type: string
    expr_sql: >-
      CASE
        WHEN ${operator} IN ('Jio', 'Reliance JIO', 'Reliance Jio') THEN 'Reliance Jio'
        WHEN ${operator} IN ('Vodafone', 'Idea', 'Vodafone Idea') THEN 'Vodafone Idea (Vi)'
        WHEN ${operator} IN ('Reliance', 'Reliance Mobile CDMA', 'Reliance Mobile GSM') THEN 'Reliance (legacy CDMA/GSM)'
        WHEN ${operator} IN ('BSNL', 'BSNL CDMA', 'BSNL/MTNL - Central Gov.') THEN 'BSNL'
        WHEN ${operator} IN ('Airtel India', 'Airtel') THEN 'Airtel'
        WHEN ${operator} IS NULL OR TRIM(${operator}) = '' THEN 'Unknown'
        ELSE ${operator}
      END
    description: Canonical operator grouping (Reliance Jio, Vodafone Idea (Vi), Reliance (legacy CDMA/GSM), BSNL, Airtel, Unknown) consolidating raw HLR variants.
  - id: date
    type: date
    description: Date on which the call took place.
  - id: time
    type: string
    description: Time of day the call took place, in HH:MM:SS format (IST).
  - id: week
    type: date
    description: Calendar week of the call, truncated to Monday (ISOWEEK).
  - id: month
    type: date
    description: Calendar month of the call, truncated to the first day of the month.
  - id: is_answered
    type: boolean
    expr_sql: ${status} = 'answered'
    description: TRUE if the call was picked up (status = 'answered').
    visibility: "internal"
  - id: is_missed
    type: boolean
    expr_sql: ${status} = 'missed'
    description: TRUE if the call was not picked up (status = 'missed').
    visibility: "internal"
  - id: is_early_abandoned
    type: boolean
    expr_sql: ${status} = 'answered' AND ${answered_seconds} < 20 AND ${reason} = 'disconnected_by_callee'
    description: TRUE if the call was answered but the called party hung up within 20 seconds. Classified as a low-quality connection and excluded from duration metrics.
    visibility: "internal"
  - id: is_engaged_call
    type: boolean
    expr_sql: ${status} = 'answered' AND ${answered_seconds} >= 20
    description: TRUE for answered calls with meaningful talk time (>= 20 s). Denominator for all duration metrics.
    visibility: "internal"
  - id: call_classification
    type: string
    expr_sql: >-
      CASE
        WHEN ${status} = 'missed' THEN 'Missed'
        WHEN ${status} = 'answered' AND ${answered_seconds} < 20 AND ${reason} = 'disconnected_by_callee' THEN 'Early-abandoned'
        WHEN ${status} = 'answered' AND ${answered_seconds} >= 20 THEN 'Engaged'
        WHEN ${status} = 'answered' THEN 'Answered (other)'
        ELSE 'Unknown'
      END
    description: "Business-rule call classification: Missed, Early-abandoned (answered < 20 s and disconnected_by_callee), Engaged (answered >= 20 s), Answered (other), or Unknown."

id: academy_user_profile_basic_details
type: model
description: >-
  This table contains user profile details for all users who have been granted
  access to the learning platform. It includes users across all lifecycle states
  such as ACTIVE, EXPIRED, and REVOKED.

  User profile information is initially collected during the onboarding process,
  which is mandatory for accessing the platform. During onboarding, users are
  required to provide certain details, while some fields may be optional. After
  onboarding, users can update their profile information at any time through the
  profile edit page.

  The data in this table is directly sourced from backend systems and reflects
  the latest available information for each user based on their inputs during
  onboarding or subsequent profile updates.

  It is important to note that the definition of "mandatory fields" is not
  standardized across all users. As onboarding requirements have evolved over
  time, especially for older users, a consistent list of required fields is not
  available. Hence, any field related to completeness of required data should be
  interpreted with caution.

  PII fields are masked, and only their availability/status is exposed.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_user_profile_basic_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_id
    type: string
    unique: true
    description: Unique ID of the user (UUID with hyphens).
  - id: guardian_occupation
    type: string
    description: Occupation of the guardian.
  - id: preferred_languages_for_communication
    type: string
    description: Preferred language(s) for communication with the user.
  - id: current_address_pincode
    type: string
    description: Current PIN code as per profile.
  - id: preferred_language_for_teaching
    type: string
    description: Preferred language for teaching/learning.
  - id: have_laptop_or_computer
    type: string
    description: Indicates whether the user has access to a laptop or computer.
  - id: current_address_city
    type: string
    description: Current city of residence as per profile.
  - id: guardian_phone_number_and_whatapp_number_mapping_status
    type: string
    description: >-
      Indicates relationship between guardian phone number and WhatsApp number. Exact enum values -
        • Both are same
        • Both are different
        • WhatsApp number not filled
        • Phone number not filled
        • Both are not filled
  - id: guardian_relation_with_student
    type: string
    description: Relationship of the guardian with the student (e.g., Father, Mother, etc.).
  - id: last_name
    type: string
    description: User’s last name as available in the user profile.
  - id: currently_studying_or_highest_education
    type: string
    description: User’s current education or highest qualification.
  - id: user_email_status
    type: string
    description: >-
      Indicates whether user email is present in the profile. As this is PII, only status is exposed. Exact enum values -
        • Filled
        • Not Filled
  - id: is_required_fields_filled
    type: string
    description: >-
      Indicates whether required profile fields (primarily collected during onboarding) are filled. Note - Required fields are not consistently defined across all users due to changes in onboarding flows over time. Exact enum values -
        • Yes
        • No
        • Null
  - id: dob
    type: date
    description: User’s date of birth as available in the user profile.
  - id: have_work_experience
    type: string
    description: Indicates whether the user has prior work experience.
  - id: first_name
    type: string
    description: User’s first name as available in the user profile.
  - id: guardian_email_status
    type: string
    description: >-
      Indicates whether guardian email is present in the profile. As this is PII, only status is exposed. Exact enum values -
        • Filled
        • Not Filled
  - id: occupation
    type: string
    description: User’s current occupation.
  - id: guardian_whatsapp_number_status
    type: string
    description: >-
      Indicates whether guardian WhatsApp number is present in the profile. As this is PII, only status is exposed. Exact enum values -
        • Filled
        • Not Filled
  - id: gender
    type: string
    description: User’s gender as available in the user profile.
  - id: is_user_email_verified
    type: string
    description: >-
      Indicates whether the user’s email is verified. Exact enum values -
        • Yes
        • No
  - id: current_address_district
    type: string
    description: Current district of residence as per profile.
  - id: current_address_state
    type: string
    description: Current state of residence as per profile.
  - id: guardian_phone_number_status
    type: string
    description: >-
      Indicates whether guardian phone number is present in the profile. As this is PII, only status is exposed. Exact enum values -
        • Filled
        • Not Filled
  - id: user_phone_number_status
    type: string
    description: >-
      Indicates whether the user's phone number is present in the profile. As this is PII, only status is exposed. Exact enum values -
        • Filled
        • Not Filled
  - id: student_and_guardian_phone_number_mapping_status
    type: string
    description: >-
      Indicates the relationship between the student's phone number and the guardian's phone number. Exact enum values -
        • Both are same
        • Both are different
        • Student phone number not filled
        • Guardian phone number not filled
        • Both are not filled
  - id: student_guardian_whatapp_number_mapping_status
    type: string
    description: >-
      Indicates the relationship between the student's whatsapp number and the guardian's whatsapp number. Exact enum values -
        • Both are same
        • Both are different
        • User Whatsapp Number is not filled
        • Guardian Whatsapp Number is not filled
        • Both are not filled
relations:
  - id: z_ccbp_academy_users_master_data
