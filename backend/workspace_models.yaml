  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND DATE_TRUNC(${submitted_date}, MONTH) = ${academy_nps_form_responses.form_submission_month}
  - id: nps_form_responses_nov_and_dec_2025
