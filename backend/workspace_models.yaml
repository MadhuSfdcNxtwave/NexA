    description: Title of the growth cycle currently assigned to the user
  - id: latest_retention_bucket_streak
    type: number
    description: Number of consecutive days the user has remained in the current
      retention bucket
  - id: latest_retention_bucket
    type: string
    description: Retention classification of the user based on recent learning activity
  - id: growth_cycle_name_enum
    type: string
    description: Enum value representing the growth cycle assigned to the user
  - id: no_of_other_sets_completed
    type: number
    description: Total number of other non-standard sets completed by the user
  - id: no_of_learning_sets_completed
    type: number
    description: Total number of learning sets completed by the user
  - id: bachelors_end_year
    type: number
    description: Year in which the user completed or is expected to complete their
      bachelor’s degree
  - id: gender
    type: string
    description: Gender of the user as reported during onboarding or profile setup
  - id: learning_portal_onboarding_access_given_datetime
    type: timestamp_naive
    description: Datetime when access to the learning portal was granted to the user
  - id: no_of_question_sets_completed
    type: number
    description: Total number of coding or problem-solving question sets completed
      by the user
  - id: no_of_practice_sets_completed
    type: number
    description: Total number of practice sets completed by the user
  - id: success_coach_object_id
    type: string
    description: Salesforce ID of the student
  - id: success_coach_email
    type: string
    description: Mail ID of the success coach assigned to the student
  - id: sr_success_coach_email
    type: string
    description: Mail ID of the senior success coach assigned to the student

