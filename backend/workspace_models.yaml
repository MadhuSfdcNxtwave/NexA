id: academy_virtual_meet_up_user_attendance_details
type: model
description: >-
  This table contains user-level attendance and engagement metrics for Academy
  Virtual Meetup sessions derived from AWS IVS realtime stage events.

  Expected grain:

  1 row = 1 user x 1 meetup session

  Known exception:

  Duplicate rows can occur if duplicate JOINED/LEFT events are generated
  upstream. 
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_virtual_meet_up_user_attendance_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of attendance records (user x meetup session)
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who attended virtual meetup sessions
  - id: unique_events
    func: count_distinct
    of: event_id
    description: Count of unique meetup events
  - id: unique_sessions
    func: count_distinct
    of: meet_session_id
    description: Count of unique meet sessions
  - id: total_time_spent_in_minutes_sum
    func: sum
    of: total_time_spent_in_minutes
    description: Total attendance duration in minutes across all users and sessions
  - id: avg_time_spent_in_minutes
    func: avg
    of: total_time_spent_in_minutes
    description: Average attendance duration per user-session in minutes
  - id: avg_session_completion_percentage
    func: avg
    of: session_completion_percentage
    description: Average percentage of session attended per user
  - id: avg_relative_first_connected_minute
    func: avg
    of: relative_first_connected_minute
    description: Average minutes late from actual session start when users first joined
  - id: avg_relative_last_disconnected_minute
    func: avg
    of: relative_last_disconnected_minute
    description: Average minutes before session end when users last left
dimensions:
  - id: user_event_session_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${event_id}, '-', ${meet_session_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, event_id, and meet_session_id for each user's attendance record in a meetup session
  - id: user_id
    type: string
    description: Unique user identifier (UUID without hyphens). NULL/empty user IDs are excluded upstream.
  - id: event_id
    type: string
    description: Unique event identifier (UUID without hyphens). May be missing for unmapped events.
  - id: event_title
    type: string
    description: Title of the meetup. Duplicate titles may exist across different events.
  - id: event_category
    type: string
    description: >-
      Event category. May be NULL/incorrect in some cases. Exact enum values -
        • VIRTUAL_MEET_UP   (always this value in valid records)
  - id: event_date
    type: date
    description: Date on which the event is scheduled. May be NULL in some records.
  - id: registration_start_time
    type: timestamp_naive
    description: Timestamp when registration opens for the event. May be NULL.
  - id: registration_end_time
    type: timestamp_naive
    description: Timestamp when registration closes for the event. Invalid registration windows possible.
  - id: event_start_time
    type: timestamp_naive
    description: Scheduled event start time. May be after event_end_time in edge cases.
  - id: event_end_time
    type: timestamp_naive
    description: Scheduled event end time. May be missing in some records.
  - id: meet_session_id
    type: string
    description: Unique live session identifier (UUID without hyphens). An event may have multiple sessions.
  - id: meet_started_at
    type: timestamp_naive
    description: Actual session start timestamp. May be NULL when start was not captured.
  - id: meet_ended_at
    type: timestamp_naive
    description: Actual session end timestamp. May be missing; used as fallback for last_disconnected_datetime when LEFT events are missing.
  - id: meet_host_user_id
    type: string
    description: User ID of the session host. May be missing if host mapping is unavailable.
  - id: realtime_stage_arn
    type: string
    description: AWS IVS realtime stage ARN associated with the session. NULL if mapping is missing, in which case attendance records become unavailable.
  - id: first_connected_datetime
    type: timestamp_naive
    description: Timestamp when the user first joined the session. May be before the actual session start in edge cases.
  - id: last_connected_datetime
    type: timestamp_naive
    description: Timestamp of the user's last JOINED event. Duplicate JOINED events upstream can cause discrepancies.
  - id: first_disconnected_datetime
    type: timestamp_naive
    description: Timestamp when the user first left the session. May appear before first_connected_datetime in invalid event sequencing edge cases.
  - id: last_disconnected_datetime
    type: timestamp_naive
    description: Timestamp of the user's final LEFT event. Falls back to meet_ended_at if LEFT events are missing.
  - id: relative_first_connected_minute
    type: number
    description: Minutes late from actual session start when the user first joined. Negative values possible when the user joins before the session starts.
  - id: relative_last_disconnected_minute
    type: number
    description: Minutes before session end when the user last left. Negative values possible if the user disconnects after session end.
  - id: total_time_spent_in_minutes
    type: number
    description: Total attendance duration of the user in minutes. May be negative or abnormally high due to upstream event anomalies.
  - id: scaled_first_connected_minute_percentage
    type: number
    description: Late join percentage relative to session duration. Values greater than 100 are possible.
  - id: scaled_last_disconnected_minute_percentage
    type: number
    description: Early exit percentage relative to session duration. Negative values are possible.
  - id: session_duration_in_minutes
    type: number
    description: Total session duration in minutes. Zero/negative durations possible; causes completion percentage to be NULL.
  - id: session_completion_percentage
    type: number
    description: Percentage of session attended by the user. Can exceed 100 due to overlapping intervals.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: ${user_id} = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_basic_details.user_id}, "-", "")
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_education_details.user_id}, "-", "")
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${y_academy_user_daily_engagement_time_spent.user_id}, "-", "") AND ${event_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${z_academy_users_npc_master_table.user_id}, "-", "") AND DATE_TRUNC(${event_date}, MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: y_academy_user_event_engagement_details
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_event_engagement_details.user_id} AND ${event_id} = ${y_academy_user_event_engagement_details.event_id}

id: academy_virtual_meet_up_user_chat_details
type: model
description: >-
  This table captures user-level interaction data during Academy virtual
  meet-up sessions. Each row represents a single chat or content action
  performed by a user during a meet — sending a message, reacting, raising a
  hand, sharing media, or turning the mic on/off. Alongside the activity, each
  row carries meet-level context like who hosted the session, the coordinator's
  role, and the actual session start/end timestamps.

  Grain:
  One row = one chat/content action × one user × one meet-up event. A single
  user can appear multiple times for the same event_id if they performed
  multiple actions during the session (e.g., two chat messages and one reaction
  = three rows). Always use COUNT(DISTINCT user_id) when measuring unique
  participation, and COUNT(DISTINCT event_id) for unique meet-ups.

  IMPORTANT — Coordinator data included:
  This table includes interaction records for the meet coordinator/host as well
  (identifiable via meet_host_user_id and meet_coordinator_role). When preparing
  data for stakeholders (e.g., student engagement, participation, chat volume),
  ALWAYS EXCLUDE the coordinator's rows — typically by filtering out rows where
  user_id = meet_host_user_id, or where the user appears in the coordinator
  roster. Failure to exclude coordinators will inflate chat/reaction/mic/hand
  action counts and skew engagement metrics.

  Timezone:
  All timestamp fields (meet_started_at, meet_ended_at, chat_timestamp) are in
  IST.

  Notes:
  - user_id and meet_host_user_id are UUIDs WITH hyphens. Apply
    REPLACE(user_id, "-", "") when joining to tables that store user_id
    without hyphens (e.g., z_ccbp_academy_users_master_data).
  - event_id is stored WITHOUT hyphens — matches event_id in
    academy_virtual_meet_up_user_attendance_details,
    y_academy_user_event_engagement_details, and
    nw_events_all_users_registration_details.
  - content_type drives interpretation of the content field; see the
    content_type dimension for the full enum.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`aca\
  demy_virtual_meet_up_user_chat_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of chat/content action records (one row per action per user per meet)
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who performed at least one chat/content action during a meet-up
  - id: unique_events
    func: count_distinct
    of: event_id
    description: Count of unique meet-up events with at least one chat/content action
  - id: chat_messages
    func: count
    filters:
      - is_chat_message
    description: Total number of CHAT_MESSAGE actions
  - id: chat_reactions
    func: count
    filters:
      - is_chat_reaction
    description: Total number of CHAT_REACTION actions
  - id: hand_actions
    func: count
    filters:
      - is_hand_action
    description: Total number of HAND_ACTION events
  - id: mic_actions
    func: count
    filters:
      - is_mic_action
    description: Total number of MIC_ACTION events
  - id: chat_media_actions
    func: count
    filters:
      - is_chat_media
    description: Total number of CHAT_MEDIA actions
dimensions:
  - id: user_event_action_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${event_id}, '-', ${content_type}, '-', CAST(${chat_timestamp} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, event_id, content_type, and chat_timestamp for each chat/content action record
  - id: event_id
    type: string
    description: Unique identifier for the event (event_id without hyphens).
  - id: event_title
    type: string
    description: Title of the meet-up event. Note - the same event_title may appear across multiple event_ids; use event_id as the canonical identifier.
  - id: event_date
    type: date
    description: Date of the meet-up event.
  - id: meet_started_at
    type: timestamp_naive
    description: Timestamp when the meet actually started.
  - id: meet_ended_at
    type: timestamp_naive
    description: Timestamp when the meet actually ended.
  - id: meet_host_user_id
    type: string
    description: Unique identifier of the host who conducted the meet.
  - id: meet_coordinator_role
    type: string
    description: Role of the person (coordinator) who has taken/hosted the meet.
  - id: chat_timestamp
    type: timestamp_naive
    description: Timestamp when the student performed the chat/content action (e.g., sent the message) during the meet.
  - id: user_id
    type: string
    description: Unique identifier of the user who performed the action (UUID with hyphens).
  - id: content_type
    type: string
    description: >-
      Type of action performed by the user during the meet. Drives the interpretation of the content field. Exact enum values -
        • HAND_ACTION
        • CHAT_REACTION
        • CHAT_MESSAGE
        • CHAT_MEDIA
        • MIC_ACTION
  - id: content
    type: string
    description: >-
      Payload of the action, interpreted based on content_type - text string for
      CHAT_MESSAGE; emoji/reaction label for CHAT_REACTION; boolean/state value for
      HAND_ACTION and MIC_ACTION; attachment reference or link for CHAT_MEDIA.
  - id: is_chat_message
    type: boolean
    expr_sql: ${content_type} = 'CHAT_MESSAGE'
    description: TRUE if the action is a chat message.
    visibility: "internal"
  - id: is_chat_reaction
    type: boolean
    expr_sql: ${content_type} = 'CHAT_REACTION'
    description: TRUE if the action is a chat reaction.
    visibility: "internal"
  - id: is_hand_action
    type: boolean
    expr_sql: ${content_type} = 'HAND_ACTION'
    description: TRUE if the action is a hand-raise/lower action.
    visibility: "internal"
  - id: is_mic_action
    type: boolean
    expr_sql: ${content_type} = 'MIC_ACTION'
    description: TRUE if the action is a mic on/off action.
    visibility: "internal"
  - id: is_chat_media
    type: boolean
    expr_sql: ${content_type} = 'CHAT_MEDIA'
    description: TRUE if the action is a chat media (attachment/link) action.
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${event_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(${event_date}, MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: y_academy_user_event_engagement_details
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${y_academy_user_event_engagement_details.user_id} AND ${event_id} = ${y_academy_user_event_engagement_details.event_id}
  - id: academy_virtual_meet_up_user_attendance_details
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${academy_virtual_meet_up_user_attendance_details.user_id} AND ${event_id} = ${academy_virtual_meet_up_user_attendance_details.event_id}
  - id: nw_events_all_users_registration_details
    type: many_to_one
    join_sql: ${user_id} = ${nw_events_all_users_registration_details.user_id} AND ${event_id} = ${nw_events_all_users_registration_details.event_id}

id: ai_chat_bot_users_session_details
type: model
description: This table contains one record per unique student chat session
  initiated with the NxtWave AI support chatbot. It captures the complete
  to-and-fro conversation between the student and the bot, along with
  session-level feedback ratings and any Salesforce ticket references created
  during the session. Use this table to analyze conversation patterns, bot
  containment, session volumes, and student engagement with the chatbot. This
  table contains live data — query only when current session-level analysis is
  required.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`ai_\
  chat_bot_users_session_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_session_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${session_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and session_id for each user's chat session
  - id: session_id
    type: string
    description: Unique identifier of the chat session. Use this to join to
      ai_chat_bot_users_ticket_details on session_id.
  - id: chat_datetime
    type: timestamp_naive
    description: Exact date and time when the chat session was created.
  - id: no_of_feedbacks
    type: number
    description: Total number of emoji feedback responses submitted by the student
      for this session. Subject to a 24-hour data delay — do not use for
      same-day feedback analysis. Null if the student did not submit any
      feedback.
  - id: status
    type: string
    description: >-
      Current live state of the chat session. Exact enum values -
        • ACTIVE  (session is ongoing)
        • ENDED   (session is closed)
  - id: chat_date
    type: date
    description: Date portion of session creation. Use this for daily, weekly, and
      monthly trend aggregations.
  - id: chat_log
    type: string
    description: Full chronological conversation transcript for the session. Each
      entry contains the student query with its timestamp and the bot response
      with its timestamp, separated by a divider line. Null if no messages were
      exchanged. Use this field to analyze conversation content, identify common
      query patterns, and perform sentiment or intent analysis.
  - id: avg_emoji_rating
    type: number
    description: Average emoji rating score across all feedback submissions for this
      session. Higher values indicate greater student satisfaction. Subject to a
      24-hour data delay — reflects feedback submitted up to the previous day
      only. Null if no feedback was submitted.
  - id: user_id
    type: string
    description: Unique Identifier of the student/user. UUID with hyphens
  - id: message_exchanges
    type: number
    description: Total number of messages exchanged in the session, counted across all query-response pairs. Use this to measure session depth and student engagement with the bot.
  - id: avg_latency_in_seconds
    type: number
    description: Average time in seconds the bot took to respond to student queries within the session. Use this to monitor bot response speed and identify performance bottlenecks.
  - id: min_latency_in_seconds
    type: number
    description: Shortest bot response time in seconds observed across all message exchanges in the session. Reflects the best-case response latency for the session.
  - id: max_latency_in_seconds
    type: number
    description: Longest bot response time in seconds observed across all message exchanges in the session. Use this to detect outlier delays or slow responses within a session.
  - id: salesforce_ticket_references
    type: string
    description: Comma-separated list of Salesforce Case IDs raised during this
      session. Null if the session was resolved by the bot without escalation.
      Use this to join to the Salesforce Case object for ticket-level analysis.
      A non-null value indicates the session was escalated to human support.

relations:
