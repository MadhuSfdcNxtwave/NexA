id: user_wise_league_leaderboard_details
type: model
description: >-
  Monthly snapshot of each user's participation in the NxtWave League gamification system.
  One row per user per league_instance_month, capturing their cluster (monthly batch),
  competitive league group, XP earned, activation status, and how they entered the
  current month's league (new, promoted, demoted, or retained).

  League system mechanics:
  - Users join monthly "batches" identified by cluster_id; each cluster contains
    ~30-user competitive groups (league_id). The final cluster of a month may
    contain ~44–45 users in its last league.
  - A user is ACTIVATED for a month when they earn at least 10 XP (xp_points >= 10).
  - At month-end, the top X% of a league are PROMOTED and the bottom X% are
    DEMOTED (with remainder rules favoring promotions), where X depends on the
    league level (see promotion_criteria_percentage). Levels range from L1
    (IRON) to L6 (SAPPHIRE); SAPPHIRE is the ceiling and cannot be promoted
    further. Promotion/demotion percentages by level -
      • L1 IRON       → 40%
      • L2 BRONZE     → 40%
      • L3 SILVER     → 35%
      • L4 GOLD       → 35%
      • L5 PLATINUM   → 25%
      • L6 SAPPHIRE   → 25% (demotion only; cannot be promoted)
  - user_league_entry_status indicates how the user entered the current month's
    league - NEW_USER, RETAINED_USER, PROMOTED_USER, or DEMOTED_USER.

  Important considerations for analysis:
  - Available from 2025-05-01 onward (league system launch).
  - Users who joined after the 25th of a month have cluster_id = NULL for that
    month and enter the league system the following month.
  - October 2025 introduced a structural change in league structure; treat
    earlier and later months separately for trend analysis.
  - EXCLUDE March 2026 and April 2026 from XP / activation analyses (data quality issue).
  - EXCLUDE the current ongoing month from completed-month analyses.
  - IRON (L1) contains three distinct populations - brand-new users, demoted
    users, and retained-at-bottom users. Always segment IRON by user_league_entry_status.
  - For cross-month user counts, always use COUNT(DISTINCT user_id) — a user
    appears in multiple monthly rows.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`use\
  r_wise_league_leaderboard_details`"
measures:
  - id: count_of_records
    func: count
    description: Count of user-month league rows.
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Distinct user count. Use this for cross-month user counts since a user appears in multiple monthly rows.
  - id: unique_clusters
    func: count_distinct
    of: cluster_id
    description: Distinct cluster (monthly batch) count.
  - id: unique_competitive_groups
    func: count_distinct
    of: league_id
    description: Distinct competitive league group count.
  - id: total_xp
    func: sum
    of: xp_points
    description: Total XP earned. Exclude March 2026 and April 2026 for clean trends.
  - id: avg_xp
    func: avg
    of: xp_points
    description: Average XP per user-month. Exclude March 2026 and April 2026 for clean trends.
  - id: activated_users
    func: count_distinct
    of: user_id
    filters:
      - is_activated
    description: Distinct users who were activated (xp_points >= 10) within the filtered scope.
  - id: new_users
    func: count_distinct
    of: user_id
    filters:
      - is_new_user
    description: Distinct users entering the league system as NEW_USER.
  - id: retained_users
    func: count_distinct
    of: user_id
    filters:
      - is_retained_user
    description: Distinct users retained at the same league level.
  - id: promoted_users
    func: count_distinct
    of: user_id
    filters:
      - is_promoted_user
    description: Distinct users promoted from the previous month's league.
  - id: demoted_users
    func: count_distinct
    of: user_id
    filters:
      - is_demoted_user
    description: Distinct users demoted from the previous month's league.
dimensions:
  - id: user_league_instance_id
    type: string
    unique: true
    description: Surrogate primary key — uniquely identifies a user's participation in a single monthly league instance.
  - id: user_id
    type: string
    description: User identifier (UUID with hyphens). Joins to other academy user-level tables.
  - id: league_instance_month
    type: date
    description: First-of-month date representing the league month this row covers. Available from 2025-05-01 onward.
  - id: cluster_id
    type: string
    description: Identifier of the monthly batch ("cluster") the user belongs to. NULL for users who joined after the 25th of the month — those users enter the league system the following month.
  - id: cluster_name
    type: string
    description: Human-readable name of the cluster (monthly batch).
  - id: cluster_creation_date
    type: date
    description: Date the cluster was created.
  - id: league_id
    type: string
    description: Identifier of the ~30-person competitive league group the user competes within for this month. The last cluster's final league may contain ~44–45 users.
  - id: league_level
    type: number
    description: >-
      League level 1–6. Mapping to league_name and promotion_criteria_percentage -
        1 = IRON      (40% promote / 40% demote)
        2 = BRONZE    (40% promote / 40% demote)
        3 = SILVER    (35% promote / 35% demote)
        4 = GOLD      (35% promote / 35% demote)
        5 = PLATINUM  (25% promote / 25% demote)
        6 = SAPPHIRE  (25% demote only; ceiling, cannot be promoted further).
  - id: league_name
    type: string
    description: >-
      League name. Exact enum values -
        • IRON_LEAGUE
        • BRONZE_LEAGUE
        • SILVER_LEAGUE
        • GOLD_LEAGUE
        • PLATINUM_LEAGUE
        • SAPPHIRE_LEAGUE
      IRON_LEAGUE contains three populations (new, demoted, retained-at-bottom) — segment by user_league_entry_status.
  - id: xp_points
    type: number
    description: XP earned by the user in this league month. Users with xp_points >= 10 are considered ACTIVATED. EXCLUDE March 2026 and April 2026 from XP analyses (data quality issue).
  - id: user_status
    type: string
    description: >-
      Activation status for the month. Exact enum values -
        • ACTIVATED      (xp_points >= 10)
        • NOT_ACTIVATED  (xp_points < 10)
  - id: user_league_entry_status
    type: string
    description: >-
      How the user entered this month's league. Exact enum values -
        • NEW_USER       (user's first league month)
        • RETAINED_USER  (stayed at the same league level as the prior month)
        • PROMOTED_USER  (moved up from the prior month's league)
        • DEMOTED_USER   (moved down from the prior month's league)
  - id: promotion_criteria_percentage
    type: number
    description: >-
      Top-X% / bottom-X% threshold applied at month-end for promotion and demotion in this
      league instance. Varies by league_level -
        IRON / BRONZE     → 40.0
        SILVER / GOLD     → 35.0
        PLATINUM / SAPPHIRE → 25.0
      SAPPHIRE is the ceiling so only the demotion side applies.
  - id: is_activated
    type: boolean
    expr_sql: ${user_status} = 'ACTIVATED'
    description: TRUE if the user was activated (xp_points >= 10) for this month.
    visibility: "internal"
  - id: is_new_user
    type: boolean
    expr_sql: ${user_league_entry_status} = 'NEW_USER'
    description: TRUE if the user entered this month's league as a NEW_USER.
    visibility: "internal"
  - id: is_retained_user
    type: boolean
    expr_sql: ${user_league_entry_status} = 'RETAINED_USER'
    description: TRUE if the user was retained at the same league level.
    visibility: "internal"
  - id: is_promoted_user
    type: boolean
    expr_sql: ${user_league_entry_status} = 'PROMOTED_USER'
    description: TRUE if the user was promoted from the previous month's league.
    visibility: "internal"
  - id: is_demoted_user
    type: boolean
    expr_sql: ${user_league_entry_status} = 'DEMOTED_USER'
    description: TRUE if the user was demoted from the previous month's league.
    visibility: "internal"
  - id: has_cluster
    type: boolean
    expr_sql: ${cluster_id} IS NOT NULL
    description: TRUE if the user was assigned to a cluster this month (joined on or before the 25th).
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${league_instance_month} = DATE_TRUNC(${y_academy_user_daily_engagement_time_spent.calendar_date}, MONTH)
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND ${league_instance_month} = ${z_academy_users_npc_master_table.calendar_month}

id: user_wise_link_id_access_log
type: model
description: >-
  SSO link access log — captures every access event where a user opened a URL
  that was wired through the platform's SSO login process to capture their
  user_id.

  Background:
  Accounts forms, Google forms, generic web forms, external pages, survey
  forms, registration pages, and similar external/internal links are attached
  to the SSO login process so that when a student clicks through, the platform
  can authenticate them and log who accessed which link. Each such link is
  identified by a `link_id`. Stakeholders who own a specific URL/form can
  filter this table by their `link_id` to see exactly which users accessed
  their link and when.

  Grain:
  One row per access event = (user_id × link_id × creation_datetime). A single
  user may access the same link_id multiple times across days — each access
  is logged as a separate row.

  Primary use cases:
  - Identifying who accessed a specific stakeholder-owned URL (filter by link_id)
  - Measuring reach and uniqueness of a form/page (unique users per link_id)
  - Daily/weekly/monthly access trends per link
  - Joining access populations to engagement, payment, retention, and
    placement context via user_id

  IMPORTANT SCOPE NOTE:
  - This table contains ALL users who clicked through SSO-wired links — NOT
    just Academy users. Intensive, DSA, and every other enrollment-plan
    population are included. Most other tables in this project are
    Academy-scoped, so raw counts from this table are NOT directly comparable
    to Academy metrics.
  - Before reporting any user-facing number from this table, FILTER to the
    relevant user base for your requirement. Typical approaches -
      • Restrict to Academy by inner-joining to z_ccbp_academy_users_master_data
        (use REPLACE(user_id, '-', '') for the join — see hyphen note below).
      • Restrict to a specific enroll-plan / product cohort via the enroll-plan
        field on the relevant user / payment master table.
      • Restrict to users who currently have learning-portal access via lp_status.
    Always confirm with the stakeholder which population they want before
    presenting numbers.

  Notes:
  - This table contains LIVE data — rows are appended in near real time as
    users click through SSO-wired links. Treat counts and time-series for the
    current day/hour as still-moving; for stable trend reporting prefer
    completed days/weeks/months, and call out the live nature of the source
    when sharing same-day numbers with stakeholders.
  - user_id is stored as a UUID WITH hyphens. Apply REPLACE(user_id, '-', '')
    when joining to tables that store user_id without hyphens (e.g.,
    z_ccbp_academy_users_master_data, y_academy_user_event_engagement_details,
    z_ccbp_academy_users_aipl_daily_leaderboard_details).
  - link_id is the most important dimension — every stakeholder analysis
    should be filtered by their specific link_id(s).
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`use\
  r_wise_link_id_access_log`"
measures:
  - id: count_of_records
    func: count
    description: Total number of SSO link access events
  - id: total_accesses
    func: count
    description: Total number of access events (alias of count_of_records; each row = one access)
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users who accessed any link in the filtered scope. Filter by link_id to get unique reach for a specific stakeholder URL.
  - id: unique_links
    func: count_distinct
    of: link_id
    description: Count of unique link_ids accessed in the filtered scope
dimensions:
  - id: user_link_access_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${link_id}, '-', CAST(${creation_datetime} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, link_id, and creation_datetime for each access event. Required because a user can access the same link_id multiple times.
  - id: user_id
    type: string
    description: Unique identifier of the user who accessed the SSO link (UUID with hyphens).
  - id: link_id
    type: string
    description: Unique identifier of the SSO-wired link (form, external page, survey, registration URL, etc.). This is the canonical dimension to filter by for stakeholder-owned URL analysis — each stakeholder owns one or more link_ids corresponding to their forms or pages.
  - id: creation_datetime
    type: timestamp_naive
    description: Timestamp when the user accessed the link via SSO. Use for time-series, daily/weekly/monthly access trends, and session reconstruction.
  - id: creation_date
    type: date
    expr_sql: DATE(${creation_datetime})
    description: Date portion of creation_datetime. Useful for daily/weekly/monthly trend aggregations.
  - id: creation_month
    type: date
    expr_sql: DATE_TRUNC(DATE(${creation_datetime}), MONTH)
    description: Month of the access event, truncated to the first day of the month. Useful for monthly trend analysis.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${creation_datetime}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(DATE(${creation_datetime}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND DATE_TRUNC(DATE(${creation_datetime}), MONTH) = ${academy_nps_form_responses.form_submission_month}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}
  - id: academy_nbfc_renewals_conversion_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_nbfc_renewals_conversion_details.user_id} AND DATE_TRUNC(DATE(${creation_datetime}), MONTH) = ${academy_nbfc_renewals_conversion_details.month}
  - id: y_academy_user_event_engagement_details
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${y_academy_user_event_engagement_details.user_id}
  - id: z_academy_users_course_wise_completion_details
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_course_wise_completion_details.user_id}
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_live_classes_attendance_and_time_spent_details.user_id}
  - id: z_academy_users_topin_tech_assessments
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_topin_tech_assessments.user_id}
  - id: y_academy_users_placements_details
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_users_placements_details.user_id}
  - id: z_academy_placement_eligibility_user_wise_stage_wise_best_attempts
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_placement_eligibility_user_wise_stage_wise_best_attempts.user_id}
  - id: academy_student_success_salesforce_task_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_student_success_salesforce_task_details.user_id}
  - id: academy_dpd_salesforce_task_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_dpd_salesforce_task_details.user_id}
  - id: ai_chat_bot_users_session_details
    type: one_to_many
    join_sql: ${user_id} = ${ai_chat_bot_users_session_details.user_id}
  - id: academy_users_day_and_page_wise_time_spent_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_users_day_and_page_wise_time_spent_details.user_id} AND DATE(${creation_datetime}) = ${academy_users_day_and_page_wise_time_spent_details.time_spent_date}
  - id: academy_users_relative_day_progress_snapshots
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${academy_users_relative_day_progress_snapshots.user_id}

id: users_discussion_comments_summary_details
type: model
description: >-
  One row per student-raised discussion on the learning platform, enriched with summary metrics about the comment thread on that discussion and the full conversation serialized as a single readable string.

  Each discussion captures a doubt or query a student raised against a specific piece of learning content — typically a unit (video, learning set, exam, practice, project, quiz) or a question (coding, MCQ, fill-in-the-blank, etc.). Other students, mentors, associate mentors, support mentors, instructors, and internal roles can reply to the discussion via comments. This table flattens that two-level structure (discussion + its comments) into a single row per discussion, with comment activity rolled up into aggregate columns and the full thread preserved as a formatted string for qualitative review or LLM analysis.

  Scope:
  - **User coverage: ALL learning-platform user types are included here — Academy, Intensive, DSA, and any other enrollment programs. This table is NOT restricted to Academy users.** Most other tables in this project are Academy-only, so when joining this table to Academy-scoped tables (via user_id), expect a subset of discussions to drop out because the raiser isn't in the Academy universe. If a stakeholder asks for "Academy discussions only", filter the discussion_user_id against an Academy user list (e.g. via z_ccbp_academy_users_master_data or an enrollment-plan filter) before aggregating.
  - Discussions created on or after 2025-01-01.
  - Student-raised discussions only (excludes any discussion created by mentors, instructors, TAs, or other internal roles).
  - Active discussions only (soft-deleted discussions are excluded).
  - Comments created on or after 2025-01-01 on those discussions. Soft-deleted comments are excluded. All roles and all approval statuses are aggregated.

  Primary use cases:
  - Track doubt volume by day, unit, course, question, and question type.
  - Identify hotspot content — units or questions generating the most discussions.
  - Measure first-response SLAs: time to first mentor reply, and time to first APPROVED mentor reply (the reply learners actually see).
  - Measure resolution: clarification rate and clarification time (note: self-reported by the student via `is_clarified`).
  - Identify follow-up behaviour: discussions where the student kept commenting after a mentor replied.
  - Run qualitative or LLM-based analysis on `discussion_conversation` for themes, sentiment, recurring doubts, escalation triggers, etc.
  - Distinguish mentor- vs student-driven thread depth.

  Grain & uniqueness:
  - Intended grain: one row per discussion.
  - Caveat: `discussion_id` is not strictly unique in this table. When the same question appears in multiple question sets on the platform, a single discussion can surface against more than one (unit_id, entity_id) and will appear as multiple rows here. Dedup on `discussion_id` if a strict one-row-per-discussion count is needed.

  Important considerations:
  - All datetimes are IST.
  - **Response/clarification time metrics use CALENDAR TIME, not working hours.** All `avg_minutes_to_*` measures (first mentor reply, first approved mentor reply, clarification) are computed as raw wall-clock minute differences between timestamps. They do NOT exclude nights, weekends, holidays, or non-working hours, and they do NOT apply any mentor shift / SLA business calendar. A discussion raised at 11 PM and answered at 9 AM the next morning will show ~600 minutes of "response time", even though only a fraction of that is working time. Whenever you query this table for response-time or SLA-style analysis, you MUST surface this caveat to the stakeholder so they interpret the numbers as calendar latency, not effective working-hour latency.
  - `discussion_user_id` is a UUID with hyphens. Normalize via `REPLACE(discussion_user_id, '-', '')` when joining to tables that store user_id without hyphens.
  - `is_clarified` is set by the student themselves; it is not a mentor-confirmed resolution signal. NULL is common and means the student never marked the discussion clarified.
  - `discussion_tag` mixes mentor-applied internal tags with systemic markers (e.g. "Mentor replied" appears to be auto-populated rather than manually tagged).
  - Both discussion-level and comment-level soft-deletions are filtered out upstream — every comment counted here and every comment in `discussion_conversation` is live.
  - `discussion_conversation` includes role, timestamp, content_type, approval status, and content for each comment. It does NOT include `comment_user_id` — re-join to the source comments table if the specific commenter identity is needed downstream.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`use\
  rs_discussion_comments_summary_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of discussion rows (note - may double-count discussions appearing under multiple unit/entity contexts)
  - id: unique_discussions
    func: count_distinct
    of: discussion_id
    description: Count of unique discussions (deduplicated on discussion_id)
  - id: unique_students_raising_discussions
    func: count_distinct
    of: discussion_user_id
    description: Count of unique students who raised at least one discussion
  - id: clarified_discussions
    func: count_distinct
    of: discussion_id
    filters:
      - is_clarified_flag
    description: Count of unique discussions marked clarified by the student (self-reported)
  - id: discussions_with_mentor_reply
    func: count_distinct
    of: discussion_id
    filters:
      - has_non_student_comment
    description: Count of unique discussions that received at least one internal-role (mentor/TA) comment
  - id: discussions_with_approved_mentor_reply
    func: count_distinct
    of: discussion_id
    filters:
      - has_approved_non_student_comment
    description: Count of unique discussions that received at least one APPROVED internal-role comment (visible to learner)
  - id: total_comments_sum
    func: sum
    of: total_comments
    description: Sum of total comments across discussions
  - id: total_approved_comments_sum
    func: sum
    of: total_approved_comments
    description: Sum of approved comments across discussions
  - id: avg_comments_per_discussion
    func: avg
    of: total_comments
    description: Average number of comments per discussion
  - id: avg_minutes_to_first_mentor_reply
    func_sql: AVG(TIMESTAMP_DIFF(${non_student_first_comment_datetime}, ${discussion_creation_datetime}, MINUTE))
    description: >-
      Average CALENDAR minutes from discussion creation to the first internal-role comment (regardless of approval status).
      IMPORTANT - this is raw wall-clock time. It does NOT exclude nights, weekends, holidays, or non-working hours, and does NOT apply any mentor shift / SLA business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-hour latency.
  - id: avg_minutes_to_first_approved_mentor_reply
    func_sql: AVG(TIMESTAMP_DIFF(${non_student_first_approved_comment_datetime}, ${discussion_creation_datetime}, MINUTE))
    description: >-
      Average CALENDAR minutes from discussion creation to the first APPROVED internal-role comment (the truer first-response SLA signal, since this is the reply the learner actually saw).
      IMPORTANT - this is raw wall-clock time. It does NOT exclude nights, weekends, holidays, or non-working hours, and does NOT apply any mentor shift / SLA business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-hour latency.
  - id: avg_minutes_to_clarification
    func_sql: AVG(TIMESTAMP_DIFF(${discussion_clarified_datetime}, ${discussion_creation_datetime}, MINUTE))
    description: >-
      Average CALENDAR minutes from discussion creation to student-reported clarification.
      IMPORTANT - this is raw wall-clock time. It does NOT exclude nights, weekends, holidays, or non-working hours, and does NOT apply any business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-hour latency. Note also that clarification is self-reported by the student.
  - id: avg_user_feedback_rating
    func: avg
    of: user_feedback_rating
    description: >-
      Average user feedback rating (1–5 scale) across discussions that have an attached feedback rating.
      Sourced from `kossip-helpers.retention_bases.users_feedback_details_for_discussions`, averaged per (user_id, discussion_id) before joining.
      Discussions without any feedback rating are excluded from this average.
  - id: discussions_with_feedback_rating
    func: count_distinct
    of: discussion_id
    filters:
      - has_user_feedback_rating
    description: Count of unique discussions that have an associated user feedback rating
dimensions:
  - id: discussion_row_key
    type: string
    expr_sql: CONCAT(${discussion_id}, '-', COALESCE(${unit_id}, ''), '-', COALESCE(${entity_id}, ''))
    unique: true
    visibility: "internal"
    description: Composite primary key for each row. Built from discussion_id + unit_id + entity_id because a single discussion_id can surface against multiple (unit_id, entity_id) pairs when the same question appears in multiple question sets.
  - id: discussion_id
    type: string
    description: Unique ID of the discussion in the source system. Not strictly unique in this table — see grain caveat in the table description.
  - id: discussion_creation_datetime
    type: timestamp_naive
    description: Datetime when the student created the discussion. IST.
  - id: discussion_creation_date
    type: date
    expr_sql: DATE(${discussion_creation_datetime})
    description: Date portion of discussion_creation_datetime. Useful for daily/weekly/monthly trend aggregations.
  - id: discussion_title
    type: string
    description: Free-text title the student gave the discussion. The primary input for clustering recurring doubt themes.
  - id: discussion_user_id
    type: string
    description: UUID (with hyphens) of the student who raised the discussion. Always a student — internal roles are excluded upstream.
  - id: is_clarified
    type: number
    description: Whether the student marked the discussion clarified. 1 = clarified, 0 = not clarified, NULL = never set. Self-reported; treat as a weak resolution signal.
  - id: is_action_required
    type: number
    description: 1 = a reply is still pending on this discussion, 0 = no action required.
  - id: is_closed
    type: number
    description: 1 = discussion is closed and no further comments are accepted, 0 = open.
  - id: discussion_tag
    type: string
    description: Tag(s) on the discussion, comma-concatenated when multiple. Includes mentor-assigned internal tags and systemic markers (e.g. "Mentor replied").
  - id: entity_id
    type: string
    description: ID of the platform entity the discussion was raised against. Equals `unit_id` for unit-level discussions; equals `question_id` for coding-question discussions; differs from `question_id` for MCQ discussions (entity_id is the wrapper, question_id is the MCQ itself).
  - id: entity_type
    type: string
    description: >-
      Type of the entity. Exact enum values -
        • UNIT
        • QUESTION
        • LEARNING_RESOURCE
        • INSTRUCTION_PAGE
  - id: discussion_clarified_datetime
    type: timestamp_naive
    description: Datetime when the student marked the discussion clarified. NULL when `is_clarified` is 0 or NULL. IST.
  - id: unit_id
    type: string
    description: ID of the unit on the learning platform where the discussion was raised. May be NULL for non-unit entity types.
  - id: unit_type
    type: string
    description: >-
      Type of the unit. Enum is extensible. Exact enum values -
        • LEARNING_SET
        • QUESTION_SET
        • EXAM
        • PRACTICE
        • QUIZ
        • PROJECT
        • NULL
  - id: unit_title
    type: string
    description: Human-readable title of the unit.
  - id: question_id
    type: string
    description: Unique ID of the question for question-type discussions. NULL for unit-type discussions.
  - id: question_type
    type: string
    description: >-
      Type of the question. Exact enum values -
        • CODING
        • HTML_CODING
        • IDE_BASED_CODING
        • SQL_CODING
        • FIB_CODING
        • FIB_HTML_CODING
        • FILL_IN_THE_BLANKS
        • MULTIPLE_CHOICE
        • MORE_THAN_ONE_MULTIPLE_CHOICE
        • CODE_ANALYSIS_MULTIPLE_CHOICE
        • CODE_ANALYSIS_MORE_THAN_ONE_MULTIPLE_CHOICE
        • CODE_ANALYSIS_TEXTUAL
        • REARRANGE
        • TEXTUAL
        • AUDIO
        • NULL
  - id: question_short_text
    type: string
    description: Short text summary of the question.
  - id: total_comments
    type: number
    description: Total number of live (non-deleted) comments on this discussion, across all roles and all approval statuses. 0 when the discussion has no comments.
  - id: total_student_comments
    type: number
    description: Number of comments made by other students (peer replies and the original raiser's own follow-up comments).
  - id: total_non_student_comments
    type: number
    description: Number of comments made by internal roles — mentors, associate mentors, support mentors, instructors, senior associate mentors, etc.
  - id: total_approved_comments
    type: number
    description: Number of comments with approval_status = 'APPROVED'. These are the comments visible to learners in-product. Includes both student and non-student comments.
  - id: total_rejected_comments
    type: number
    description: Number of comments with approval_status = 'REJECTED'. Comments in 'TO_BE_REVIEWED' state are counted in neither this nor `total_approved_comments`.
  - id: student_first_comment_datetime
    type: timestamp_naive
    description: Earliest datetime at which any student commented on this discussion. NULL if no student comments. IST.
  - id: non_student_first_comment_datetime
    type: timestamp_naive
    description: Earliest datetime at which any internal role (mentor, TA, etc.) commented on this discussion, regardless of approval status. The de-facto "first mentor reply" timestamp for raw response-time analysis. NULL if no internal-role comments. IST.
  - id: non_student_first_approved_comment_datetime
    type: timestamp_naive
    description: Earliest datetime at which any internal role posted a comment that ended up APPROVED on this discussion. Represents the first reply the learner actually saw — the truer signal for first-response SLA reporting. NULL if no approved internal-role comment exists. IST.
  - id: student_last_comment_datetime
    type: timestamp_naive
    description: Latest datetime at which any student commented on this discussion. Useful for detecting late follow-ups. IST.
  - id: non_student_last_comment_datetime
    type: timestamp_naive
    description: Latest datetime at which any internal role commented on this discussion. IST.
  - id: discussion_conversation
    type: string
    description: >-
      The full comment thread serialized as a single string, ordered by comment creation time ascending. Each comment is rendered with date, role (STUDENT, MENTOR, ASSOCIATE_MENTOR, SUPPORT_MENTOR, INSTRUCTOR, SENIOR_ASSOCIATE_MENTOR, ...), approval status (APPROVED, REJECTED, TO_BE_REVIEWED), content_type, and content. Comments separated by a blank line. NULL when the discussion has no comments. Intended for qualitative review, theme clustering, and LLM analysis. Does NOT include `comment_user_id` — re-join to the source comments table if specific commenter identity is needed.
  - id: is_clarified_flag
    type: boolean
    expr_sql: ${is_clarified} = 1
    description: TRUE if the student marked the discussion clarified.
    visibility: "internal"
  - id: has_non_student_comment
    type: boolean
    expr_sql: ${non_student_first_comment_datetime} IS NOT NULL
    description: TRUE if at least one internal-role comment exists on the discussion (any approval status).
    visibility: "internal"
  - id: has_approved_non_student_comment
    type: boolean
    expr_sql: ${non_student_first_approved_comment_datetime} IS NOT NULL
    description: TRUE if at least one APPROVED internal-role comment exists on the discussion.
    visibility: "internal"
  - id: user_feedback_rating
    type: number
    expr_sql: rating
    description: >-
      Average user-submitted feedback rating (1–5 scale) for this discussion, joined in upstream from
      `kossip-helpers.retention_bases.users_feedback_details_for_discussions` on (user_id, discussion_id)
      and averaged per (user_id, discussion_id) before the join.
      The source form only collects a numeric rating from 1 to 5 — there is no open-text/free-form
      feedback component, so this rating fully represents the user's feedback signal.
      NULL when the student did not submit a feedback rating for this discussion.
  - id: has_user_feedback_rating
    type: boolean
    expr_sql: ${user_feedback_rating} IS NOT NULL
    description: TRUE if a user feedback rating exists for this discussion.
    visibility: "internal"
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${discussion_user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${discussion_user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${discussion_user_id} = ${academy_user_profile_education_details.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${discussion_user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${discussion_creation_datetime}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_npc_master_table
    type: many_to_one
    join_sql: ${discussion_user_id} = ${z_academy_users_npc_master_table.user_id} AND DATE_TRUNC(DATE(${discussion_creation_datetime}), MONTH) = ${z_academy_users_npc_master_table.calendar_month}
  - id: content_question_set_units_questions_details
    type: many_to_one
    join_sql: ${unit_id} = ${content_question_set_units_questions_details.question_set_id} AND ${question_id} = ${content_question_set_units_questions_details.question_id}
  - id: all_users_question_wise_responses_summary_details_for_question_set_units
    type: many_to_one
    join_sql: REPLACE(${discussion_user_id}, "-", "") = ${all_users_question_wise_responses_summary_details_for_question_set_units.user_id} AND ${unit_id} = ${all_users_question_wise_responses_summary_details_for_question_set_units.question_set_id} AND ${question_id} = ${all_users_question_wise_responses_summary_details_for_question_set_units.question_id}
  - id: all_users_question_attempt_details_for_question_set_units
    type: one_to_many
    join_sql: REPLACE(${discussion_user_id}, "-", "") = ${all_users_question_attempt_details_for_question_set_units.user_id} AND ${unit_id} = ${all_users_question_attempt_details_for_question_set_units.question_set_id} AND ${question_id} = ${all_users_question_attempt_details_for_question_set_units.question_id}

id: y_academy_user_daily_engagement_time_spent
type: model
description: Daily platform engagement time spent per user — use for active platform users and time-on-platform trends.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`y_a\
  cademy_user_daily_engagement_time_spent`"
measures:
  - id: count_of_records
    func: count
  - id: active_platform_users
    func: count_distinct
    of: user_id
    filters:
      - has_platform_time
    description: Users with at least 1 minute platform time on the day
  - id: total_platform_minutes
    func: sum
    of: time_spent_on_platform_in_minutes
    description: Total minutes spent on learning platform
dimensions:
  - id: user_date_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${calendar_date} AS STRING))
    unique: true
    visibility: "internal"
    description: Unique identifier combining user_id and calendar_date for each user's daily engagement record
  - id: time_spent_on_webinars_in_minutes
    type: number
    description: total time spent on webinars/poscosts/workshops in minutes
  - id: time_spent_on_platform_in_minutes
    type: number
    description: total time spent on learning platform in minutes
  - id: has_platform_time
    type: boolean
    expr_sql: ${time_spent_on_platform_in_minutes} >= 1
    description: TRUE when user spent at least 1 minute on platform that day
    visibility: "internal"
  - id: time_spent_on_live_classes_in_minutes
    type: number
    description: total time spent on live classes in minutes
  - id: user_id
    type: string
    description: unique user id
  - id: calendar_date
    type: date
    description: calendar date, for every user we generated dates starting from
      learning platform access given date to till yesterday
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_live_classes_attendance_and_time_spent_details.user_id} AND ${calendar_date} = ${z_academy_users_live_classes_attendance_and_time_spent_details.slot_date}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}

id: y_academy_user_event_engagement_details
type: model
description: This table captures user-level engagement, participation, and retention metrics across different event types (webinars, workshops, challenges, etc.).
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`y_a\
  cademy_user_event_engagement_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_event_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${event_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and event_id for each user's event engagement record
  - id: participation_certificate_issued_date
    type: date
    description: Date on which the participation certificate was issued to the user. NULL if no participation certificate was issued.
  - id: category_engagement_retention_bucket
    type: string
    description: >-
      Retention classification derived from engagement activity within the same event_category. For < 3 events, mapped from event_engagement_status: CERTIFIED --> ACTIVE, ATTENDED --> AT_RISK, NO_SHOW --> REGISTERED_INACTIVE, NOT_REGISTERED --> DORMANT. From 3rd event onward, mapped from category_engagement_activity_bucket. Exact enum values -
        • ACTIVE
        • AT_RISK
        • REGISTERED_INACTIVE
        • DORMANT
  - id: challenge_total_days
    type: number
    description: Total number of days the CHALLENGE or DSA_CHALLENGE event runs for the user. Populated only for CHALLENGE and DSA_CHALLENGE; NULL otherwise.
  - id: lp_time_spent_30days_before_hrs
    type: number
    description: Time spent (hours) on platform in the 30 days before the event start datetime.
  - id: retention_bucket_on_event_end_date
    type: string
    description: Retention bucket on the event end date.
  - id: is_active_user
    type: number
    description: Boolean flag indicating whether the user is active for the event (1 = active, 0 = inactive). All records in this table should have a value of 1.
  - id: bachelors_year_category
    type: string
    description: >-
      Categorical classification of the user's bachelor's degree stage. Exact enum values -
        • 1st_Year
        • 2nd_Year
        • 3rd_Year
        • 4th_Year
        • 5th_Year
        • Before_Bachelors
        • Not_Filled_or_SSC
        • Incorrectly_Filled_or_After_Bachelors
  - id: is_event_certified_user
    type: number
    description: Boolean flag indicating whether the user received any certificate (participation or completion) for the event (1 = yes, 0 = no).
  - id: event_end_datetime
    type: timestamp_naive
    description: Timestamp when the event is scheduled to end.
  - id: is_event_attended_user
    type: number
    description: Boolean flag indicating whether the user attended the event (1 = attended, 0 = not attended).
  - id: prev_event_start_datetime
    type: timestamp_naive
    description: Start datetime of the user's most recent preceding event within the same event_category. NULL if the current event is the user's first event in that category.
  - id: webinar_max_watched_duration_in_min
    type: number
    description: Maximum watch progress (in minutes) reached by the user in the webinar video; represents the furthest point the user watched up to. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: event_completion_percentage
    type: number
    description: Overall event attendance percentage. For CHALLENGE/DSA_CHALLENGE, reflects challenge_attendance_percentage; for PODCAST/MEGA_WORKSHOP, reflects webinar_attandance_percent. Not a blended metric.
  - id: user_id
    type: string
    description: Unique identifier of the user (UUID without hyphens).
  - id: challenge_number_of_registered_challenge_days
    type: number
    description: Number of challenge/DSA_CHALLENGE days remaining after the user's registration date. Populated only for CHALLENGE and DSA_CHALLENGE; NULL otherwise.
  - id: webinar_last_watched_datetime
    type: timestamp_naive
    description: Timestamp when the user last watched the webinar. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: event_start_datetime
    type: timestamp_naive
    description: Timestamp when the event is scheduled to start.
  - id: event_registration_start_datetime
    type: timestamp_naive
    description: Timestamp when registration opens.
  - id: webinar_multimedia_id
    type: string
    description: Unique identifier of the multimedia asset loaded for the webinar (UUID without hyphens). Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: overall_engagement_activity_bucket
    type: string
    description: >-
      Engagement activity classification based on last 3 events across all categories. Exact enum values -
        • CONSISTENT_CERTIFIED
        • FREQUENT_CERTIFIED
        • SINGLE_CERTIFIED
        • CONSISTENT_PARTICIPATOR
        • FREQUENT_PARTICIPATOR
        • CONSISTENT_NO_SHOW
        • FREQUENT_NO_SHOW
        • NOREG
        • CERTIFIED
        • ATTENDED
        • NO_SHOW
  - id: lp_time_spent_30days_after_hrs
    type: number
    description: Time spent (hours) on platform in the 30 days after the event end datetime.
  - id: webinar_video_duration_in_min
    type: number
    description: Total duration of the webinar video, in minutes. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: is_event_completion_certified_user
    type: number
    description: Boolean flag indicating whether the user received a completion certificate for the event (1 = yes, 0 = no).
  - id: lp_time_spent_7days_before_hrs
    type: number
    description: Time spent (hours) on platform in the 7 days before the event start datetime.
  - id: final_event_status
    type: string
    description: >-
      Final status representing the furthest engagement milestone the user reached. Non-NULL. Exact enum values -
        • NOT_REGISTERED_BUT_ATTENDED
        • COMPLETION_CERTIFIED_USERS
        • PARTICIPATION_CERTIFIED_USERS
        • ATTENDED
        • NOT_REGISTERED
        • PARTIAL_ATTENDED
        • REGISTERED_NOT_ATTENDED
  - id: product
    type: string
    description: Enrollment plan/product subscribed by the user.
  - id: event_title
    type: string
    description: Title of the event.
  - id: learning_portal_onboarding_access_given_datetime
    type: timestamp_naive
    description: Timestamp when onboarding-based access was granted for the learning portal.
  - id: completion_certificate_issued_date
    type: date
    description: Date on which the completion certificate was issued to the user. NULL if no completion certificate was issued.
  - id: access_starts_on_datetime
    type: timestamp_naive
    description: Timestamp when the user started accessing the learning portal.
  - id: completion_certificate_url
    type: string
    description: URL of the completion certificate issued to the user. NULL if no completion certificate was issued.
  - id: retention_bucket_after_the_event
    type: string
    description: Retention bucket 7 days after the event end date.
  - id: challenge_number_of_days_attended
    type: number
    description: Number of challenge/DSA_CHALLENGE days the user actually attended. Populated only for CHALLENGE and DSA_CHALLENGE; NULL otherwise.
  - id: last_30_days_timespent_in_hrs
    type: number
    description: Time spent (hours) on platform in the last 30 days (relative to query time).
  - id: event_url
    type: string
    description: Webinar URL. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: event_registration_datetime
    type: timestamp_naive
    description: Timestamp when the user registered for the event. NULL if the user has not registered.
  - id: part_1_completion_certificate_url
    type: string
    description: URL of the Part-1 completion certificate issued to the user. Applicable only for AWS WORKSHOP events; NULL otherwise.
  - id: user_growth_cycle_during_event
    type: string
    description: Growth cycle (GC) the user was in at the time of the event, resolved by checking if the DATE of event_start_datetime falls between the GC's start and end date. Stored as the last 4 characters of the GC name.
  - id: overall_engagement_retention_bucket
    type: string
    description: >-
      Retention classification derived from engagement activity across all event categories. Exact enum values -
        • ACTIVE
        • AT_RISK
        • REGISTERED_INACTIVE
        • DORMANT
  - id: event_registration_status
    type: string
    description: Registration status for the event. Both event_registration_status and event_registration_datetime will be null if the user has not registered.
  - id: growth_cycle_name_enum
    type: string
    description: Current growth cycle (GC) of the user irrespective of the event at query time.
  - id: event_registration_end_datetime
    type: timestamp_naive
    description: Timestamp when registration closes.
  - id: bachelors_end_year
    type: number
    description: Year in which the user completed their bachelor's degree.
  - id: event_id
    type: string
    description: Unique identifier of the event (UUID without hyphens).
  - id: prev_event_engagement_status
    type: string
    description: Engagement status of the user for their most recent preceding event within the same event_category. NULL if the current event is the user's first event in that category.
  - id: challenge_attendance_percentage
    type: number
    description: "Attendance percentage for the challenge/DSA_CHALLENGE. Formula: (challenge_number_of_days_attended / challenge_number_of_registered_challenge_days) * 100. Populated only for CHALLENGE and DSA_CHALLENGE; NULL otherwise."
  - id: retention_bucket_before_the_event
    type: string
    description: Retention bucket 7 days before the event start date.
  - id: participation_certificate_url
    type: string
    description: URL of the participation certificate issued to the user. NULL if no participation certificate was issued.
  - id: final_event_status_order
    type: string
    description: Numeric ordering of final_event_status values, used for sorting and visualization purposes.
  - id: category_engagement_activity_bucket
    type: string
    description: >-
      Engagement activity classification based on last 3 events within the same event_category. Exact enum values -
        • CONSISTENT_CERTIFIED
        • FREQUENT_CERTIFIED
        • SINGLE_CERTIFIED
        • CONSISTENT_PARTICIPATOR
        • FREQUENT_PARTICIPATOR
        • CONSISTENT_NO_SHOW
        • FREQUENT_NO_SHOW
        • NOREG
        • CERTIFIED
        • ATTENDED
        • NO_SHOW
  - id: webinar_first_watched_datetime
    type: timestamp_naive
    description: Timestamp when the user first started watching the webinar. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: challenge_user_category
    type: string
    description: >-
      Engagement-based category of the user for the challenge. Populated only for CHALLENGE and DSA_CHALLENGE; NULL otherwise. Exact enum values -
        • POWER_USER
        • CASUAL_USER
        • DIS_INTERESTED_USER
        • NULL
  - id: tech_or_non_tech
    type: string
    description: Classifies the user as Tech or Non Tech based on their bachelor's course and department.
  - id: webinar_total_time_spent_in_min
    type: number
    description: Total time (in minutes) the user spent watching the webinar. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: event_category
    type: string
    description: >-
      Category classification of the event. Exact enum values -
        • PODCAST
        • MEGA_WORKSHOP
        • CHALLENGE
        • DSA_CHALLENGE
  - id: part_1_completion_certificate_issued_date
    type: date
    description: Date on which the Part-1 completion certificate was issued to the user. Applicable only for AWS WORKSHOP events; NULL otherwise.
  - id: is_event_participation_certified_user
    type: number
    description: Boolean flag indicating whether the user received a participation certificate for the event (1 = yes, 0 = no).
  - id: prev_event_title
    type: string
    description: Title of the user's most recent preceding event within the same event_category. NULL if the current event is the user's first event in that category.
  - id: is_event_registered_user
    type: number
    description: Boolean flag indicating whether the user registered for the event (1 = registered, 0 = not registered).
  - id: retention_bucket_on_event_registration_date
    type: string
    description: Retention bucket on the event registration date (or latest if not registered).
  - id: lp_time_spent_7days_after_hrs
    type: number
    description: Time spent (hours) on platform in the 7 days after the event end datetime.
  - id: last_7_days_timespent_in_hrs
    type: number
    description: Time spent (hours) on platform in the last 7 days (relative to query time).
  - id: webinar_attandance_percent
    type: number
    description: "Attendance percentage of the user for the webinar, calculated as (webinar_total_time_spent_in_min / webinar_video_duration_in_min) * 100. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise."
  - id: webinar_id
    type: string
    description: Unique webinar identifier. Applicable only for PODCAST and MEGA_WORKSHOP.
  - id: challenge_max_streak
    type: number
    description: Maximum number of consecutive days the user attended the challenge/DSA_CHALLENGE. Populated only for CHALLENGE and DSA_CHALLENGE; NULL otherwise.
  - id: latest_retention_bucket
    type: string
    description: Current Retention Bucket of the user, irrespective of the event.
  - id: webinar_watched_language
    type: string
    description: Language in which the user watched the webinar. Populated only for PODCAST and MEGA_WORKSHOP; NULL otherwise.
  - id: event_engagement_status
    type: string
    description: >-
      High-level engagement status of the user for the event. Non-NULL. Exact enum values -
        • CERTIFIED
        • ATTENDED
        • NOT_REGISTERED
        • NO_SHOW
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: ${user_id} = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${y_academy_user_daily_engagement_time_spent.user_id}, "-", "")
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_basic_details.user_id}, "-", "")
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_education_details.user_id}, "-", "")
  - id: z_academy_users_npc_master_table
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${z_academy_users_npc_master_table.user_id}, "-", "")
  - id: z_academy_users_course_wise_completion_details
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${z_academy_users_course_wise_completion_details.user_id}, "-", "")
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${z_academy_users_live_classes_attendance_and_time_spent_details.user_id}, "-", "")
  - id: academy_nps_form_responses
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${academy_nps_form_responses.user_id}, "-", "")
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${nps_form_responses_nov_and_dec_2025.user_id}, "-", "")
  - id: academy_student_success_salesforce_task_details
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${academy_student_success_salesforce_task_details.user_id}, "-", "")
  - id: z_academy_users_topin_tech_assessments
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${z_academy_users_topin_tech_assessments.user_id}, "-", "")
  - id: academy_nbfc_renewals_conversion_details
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${academy_nbfc_renewals_conversion_details.user_id}, "-", "")

id: y_academy_users_placements_details
type: model
description: >2-
        Contains academy placement records for NxtWave users, capturing complete
        details about job offers, internships, and hiring outcomes. Includes user
        identifiers, enrollment product/program, placement references, job details,
        company information, role and compensation, geographic location,
        joining/completion dates, and placement channels. Also tracks
        internship-specific data such as stipend, duration, full-time conversion
        status, and internship progress. Primary source for placement performance,
        hiring trends, compensation benchmarks, and overall career outcomes.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`y_a\
  cademy_users_placements_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of placement records
  - id: unique_placed_users
    func: count_distinct
    of: user_id
    description: Count of unique users with placement records
  - id: avg_ctc_in_lpa
    func: avg
    of: ctc_in_lpa
    description: Average CTC (Cost to Company) in Lakhs Per Annum across placements
  - id: max_ctc_in_lpa
    func: max
    of: ctc_in_lpa
    description: Maximum CTC offered across placements
  - id: min_ctc_in_lpa
    func: min
    of: ctc_in_lpa
    description: Minimum CTC offered across placements
  - id: median_ctc_in_lpa
    func: median
    of: ctc_in_lpa
    description: Median CTC offered across placements
dimensions:
  - id: reference_id
    type: string
    unique: true
    description: Primary key of the dataset. Each reference_id uniquely identifies a single placement record. A single user may have multiple reference_ids, each representing a distinct placement event.
  - id: user_id
    type: string
    description: Unique identifier assigned to each user. Acts as the foreign key linking to user-level data.
  - id: user_product
    type: string
    description: The enrollment plan/program associated with the user at the time of placement (e.g., CCBP_ACADEMY_SMART, CCBP_ACADEMY_GENIUS, CCBP_ACADEMY_EDGE, etc.).
  - id: job_id
    type: string
    description: Unique identifier for the job opportunity linked to the placement. NULL for MEGA_OFFLINE_DRIVE placements, EXTERNAL placements, and some historical records before 2024-03-01.
  - id: date_of_placement
    type: date
    description: Date on which the placement is deemed successful. Derived primarily from offer_letter_confirmation_date with fallback to date_of_entry.
  - id: placed_through
    type: string
    description: >-
      Indicates the source or channel through which the placement was made. Exact enum values -
        • NXTWAVE_PARTNER  (sourced by NxtWave)
        • EXTERNAL         (secured independently by user)
  - id: company_name
    type: string
    description: Name of the company where the user is placed. NULL when placed_through is EXTERNAL and user has not provided company details.
  - id: company_type
    type: string
    description: Category/type of the hiring company (e.g., MNC, Startup, SME). NULL when placed_through is EXTERNAL and user has not provided company details.
  - id: job_role
    type: string
    description: Role or designation offered to the user (e.g., Software Development, Data Science, Business Analyst). NULL when placed_through is EXTERNAL and user has not provided details.
  - id: offer_letter_status
    type: string
    description: >-
      Current status of the offer letter. Exact enum values -
        • OFFER_LETTER_ACCEPTED
        • OFFER_LETTER_REJECTED
        • OFFER_LETTER_NOT_RELEASED
        • OFFER_LETTER_YET_TO_BE_RELEASED
  - id: placement_type
    type: string
    description: >-
      Nature of the placement engagement. Exact enum values -
        • INTERN_CUM_FULL_TIME  (internship with full-time conversion opportunity)
        • FULL_TIME             (direct full-time employment)
        • INTERN                (internship only)
  - id: job_location
    type: string
    description: Geographic location (city/state) where the job is based. NULL for EXTERNAL placements without details and some historical NIAT records.
  - id: job_field
    type: string
    description: >-
      Domain classification of the job. Exact enum values -
        • IT      (Information Technology roles)
        • NON_IT  (Non-technology roles)
  - id: date_of_joining
    type: string
    description: Date the user joined or is expected to join the company. Optional field populated only when obtainable by the placement team.
  - id: date_of_completion
    type: string
    description: Applicable for internships only. Date the internship was or is expected to be completed. Optional field populated only when obtainable.
  - id: ctc_in_lpa
    type: number
    description: Cost to Company for full-time roles, expressed in Lakhs Per Annum (LPA). NULL for internship-only placements (placement_type = INTERN).
  - id: internship_stipend
    type: string
    description: Stipend amount provided during the internship period. NULL for FULL_TIME placements with no internship component.
  - id: internship_duration
    type: string
    description: Total duration of the internship in months. NULL for FULL_TIME placements and some historical records.
  - id: converted_to_full_time
    type: string
    description: >-
      Indicates whether the internship has been or is expected to be converted to a full-time role. Optional field populated only when obtainable. Exact enum values -
        • Yes
        • No
  - id: internship_status
    type: string
    description: >-
      Tracks the current progress or outcome of the internship. Optional field. Exact enum values -
        • COMPLETED
        • IN_PROGRESS
        • YET_TO_START
        • DISCONTINUED
        • NOT_JOINED
        • TERMINATED_IN_BETWEEN
  - id: is_nxtwave_placement
    type: boolean
    expr_sql: ${placed_through} = 'NXTWAVE_PARTNER'
    description: TRUE if the placement was sourced through NxtWave, FALSE if secured externally by the user.
    visibility: "internal"
  - id: is_full_time
    type: boolean
    expr_sql: ${placement_type} IN ('FULL_TIME', 'INTERN_CUM_FULL_TIME')
    description: TRUE if the placement includes a full-time component (FULL_TIME or INTERN_CUM_FULL_TIME).
    visibility: "internal"
  - id: placement_month
    type: date
    expr_sql: DATE_TRUNC(${date_of_placement}, MONTH)
    description: Month of placement, truncated to the first day of the month. Useful for monthly trend analysis.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
