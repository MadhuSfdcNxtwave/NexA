  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: live_classes_user_feedback_responses
    type: many_to_one
    join_sql: ${user_id} = ${live_classes_user_feedback_responses.user_id} AND ${slot_id} = ${live_classes_user_feedback_responses.slot_id}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}
  - id: academy_nps_form_responses
    type: many_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND DATE_TRUNC(${slot_date}, MONTH) = ${academy_nps_form_responses.form_submission_month}
  - id: z_academy_users_npc_master_table
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id}
  - id: z_academy_users_course_wise_completion_details
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_course_wise_completion_details.user_id} AND REPLACE(${course_id}, "-", "") = ${z_academy_users_course_wise_completion_details.course_id}
  - id: academy_student_success_salesforce_task_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_student_success_salesforce_task_details.user_id}
  - id: z_academy_users_live_classes_recordings_watched_details
