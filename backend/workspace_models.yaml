id: ai_chat_bot_users_ticket_details
type: model
description: >-
  This table contains one record per support ticket raised from a NxtWave AI
  chatbot session. It tracks the full lifecycle of each escalated ticket from
  creation through resolution, including its current status in Salesforce and
  routing details. Use this table to analyze ticket volumes, resolution times,
  escalation patterns, SLA adherence, and queue-level performance for
  chatbot-originated support cases. This table contains live data — query only
  when current ticket-level analysis is required.

  Important considerations:
  - **Resolution-time metrics use CALENDAR TIME, not working hours.** All
    `avg_*_to_ticket_resolution` measures are computed as raw wall-clock
    differences between `tikcet_created_datetime` and `resolved_datetime`. They
    do NOT exclude nights, weekends, holidays, or non-working hours, and they
    do NOT apply any support-team shift / SLA business calendar. A ticket
    opened at 11 PM Friday and resolved at 9 AM Monday will show ~60 hours of
    "resolution time", even though almost none of that is working time.
    Whenever you query this table for resolution-time or SLA-style analysis,
    you MUST surface this caveat to the stakeholder so they interpret the
    numbers as calendar latency, not effective working-hour latency.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`ai_\
  chat_bot_users_ticket_details`"
measures:
  - id: count_of_records
    func: count
  - id: resolved_tickets
    func: count_distinct
    of: ticket_id
    filters:
      - is_resolved
    description: Count of unique tickets that have a non-null resolved_datetime
  - id: avg_minutes_to_ticket_resolution
    func_sql: AVG(TIMESTAMP_DIFF(${resolved_datetime}, ${tikcet_created_datetime}, MINUTE))
    description: >-
      Average CALENDAR minutes from ticket creation to resolution (only tickets with a non-null resolved_datetime contribute).
      IMPORTANT - this is raw wall-clock time. It does NOT exclude nights, weekends, holidays, or non-working hours, and does NOT apply any support-team shift / SLA business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — it represents calendar latency, not effective working-hour latency.
  - id: avg_hours_to_ticket_resolution
    func_sql: AVG(TIMESTAMP_DIFF(${resolved_datetime}, ${tikcet_created_datetime}, HOUR))
    description: >-
      Average CALENDAR hours from ticket creation to resolution.
      IMPORTANT - this is raw wall-clock time. Does NOT exclude nights/weekends/holidays/non-working hours, and does NOT apply any support-team shift / SLA business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — calendar latency, not effective working-hour latency.
  - id: median_hours_to_ticket_resolution
    func_sql: APPROX_QUANTILES(TIMESTAMP_DIFF(${resolved_datetime}, ${tikcet_created_datetime}, HOUR), 100)[OFFSET(50)]
    description: >-
      Median CALENDAR hours from ticket creation to resolution. More robust than the average against long-tail outliers (e.g., tickets resolved days later).
      IMPORTANT - this is raw wall-clock time. Does NOT exclude nights/weekends/holidays/non-working hours, and does NOT apply any support-team shift / SLA business calendar.
      Always flag this caveat to the stakeholder when reporting this metric — calendar latency, not effective working-hour latency.
dimensions:
  - id: user_ticket_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${ticket_id})
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and ticket_id for each user's support ticket
  - id: tikcet_created_datetime
    type: timestamp_naive
    description: Exact date and time when the ticket was created. Use this for
      ticket volume trends and SLA calculation.
  - id: user_id
    type: string
    description: Unique Identifier of the student/user. UUID with hyphens
  - id: session_id
    type: string
    description: Identifier of the chat session that triggered this ticket. Join to
      ai_chat_bot_users_session_details on session_id to retrieve the full
      conversation that led to this escalation.
  - id: resolved_datetime
    type: timestamp_naive
    description: Date and time when the ticket was marked resolved. Null if the
      ticket is still open, pending, or in progress. Use this with
      ticket_created_datetime to calculate resolution time.
  - id: status
    type: string
    description: >-
      Current real-time status of the ticket as synced from Salesforce. Exact enum values -
        • Open                 (ticket created, not yet actioned)
        • Pending              (awaiting internal action)
        • Waiting on customer  (response needed from student)
        • In Progress          (actively being worked on)
        • Resolved             (issue addressed)
        • Closed               (ticket fully closed)
        • Merged               (duplicate merged into another ticket)
  - id: priority
    type: string
    description: >-
      Urgency level assigned to the ticket. Exact enum values -
        • LOW
        • MEDIUM
        • HIGH
  - id: queue_name
    type: string
    description: Support queue the ticket was routed to. Indicates which internal
      team owns and is responsible for resolving the ticket.
  - id: ticket_id
    type: string
    description: Unique internal identifier of the ticket record.
  - id: subject
    type: string
    description: Short description of the student issue submitted at the time of
      ticket creation.
  - id: salesforce_ticket_reference_id
    type: string
    description: Salesforce Case ID for this ticket. Null if the Salesforce case
      creation failed. Use this to join to the Salesforce Case object for
      cross-system analysis.
  - id: is_resolved
    type: boolean
    expr_sql: ${resolved_datetime} IS NOT NULL
    description: TRUE if the ticket has a non-null resolved_datetime (i.e., has been resolved).
    visibility: "internal"
  - id: ticket_created_date
    type: date
    expr_sql: DATE(${tikcet_created_datetime})
    description: Date portion of tikcet_created_datetime. Useful for daily/weekly/monthly trend aggregations.
relations:
  - id: ai_chat_bot_users_session_details
    type: many_to_one
    join_sql: ${session_id} = ${ai_chat_bot_users_session_details.session_id}
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
