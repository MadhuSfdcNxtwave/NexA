    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${slot_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}

id: z_academy_users_live_classes_recordings_watched_details
type: model
description: User-level engagement data for live class recordings watched by
  academy users,including slot mapping and recording (resource) details. Tracks
  viewing behavior such as first watched time and total time spent.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_a\
  cademy_users_live_classes_recordings_watched_details`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_slot_watched_key
    type: string
    expr_sql: CONCAT(${slot_id}, '-', ${user_id}, '-', CAST(${watched_date} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining slot_id, user_id, and watched_date for each user's recording watch record
  - id: first_watched_time
    type: timestamp_naive
    description: Timestamp when the user first started watching the recording
  - id: course_cohort_name
    type: string
    description: Name of the cohort under which the live class session was conducted
  - id: watched_date
    type: date
    description: Date on which the user watched the recording
  - id: resource_id
    type: string
    description: Unique identifier of the recording resource mapped to a live class
      slot. UUID with hyphens.
  - id: slot_start_time
    type: other
    description: Scheduled start time of the original live class slot
  - id: slot_date
    type: date
    description: Date on which the original live class session was conducted
  - id: course_title
    type: string
    description: Title of the course to which the recording belongs
  - id: resource_title
    type: string
    description: Title of the recording (derived from or same as the live class
      session title)
  - id: user_id
    type: string
    description: Unique identifier of the user who watched the recording.UUID with hyphens.
  - id: time_spent_in_minutes
    type: number
    description: >-
      Inferred engagement metric representing the approximate time (in minutes) a
      user spent watching the recording. Calculated as the time difference between
      the recording watch start and the video close interactions — it is NOT exact
      media playback analytics.

      Caveats (interaction-based metric):
      - Paused sessions and inactive tabs may inflate the duration.
      - Abrupt exits or missing close events may undercount the duration.

      Recommended usage: engagement trend analysis and comparative reporting; avoid
      using as a precise playback/watch-time measure.
  - id: course_id
    type: string
    description: Unique identifier of the course associated with the recording. UUID
      with hyphens.
  - id: slot_id
    type: string
    description: Unique identifier of the original live class slot associated with
      the recording. UUID without hyphens.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${watched_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_live_classes_attendance_and_time_spent_details.user_id} AND ${slot_id} = ${z_academy_users_live_classes_attendance_and_time_spent_details.slot_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_basic_details.user_id}
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = ${academy_user_profile_education_details.user_id}
  - id: z_academy_users_npc_master_table
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_npc_master_table.user_id}
  - id: z_academy_users_course_wise_completion_details
    type: many_to_one
    join_sql: ${user_id} = ${z_academy_users_course_wise_completion_details.user_id} AND REPLACE(${course_id}, "-", "") = ${z_academy_users_course_wise_completion_details.course_id}
  - id: academy_nps_form_responses
    type: one_to_many
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id}
  - id: nps_form_responses_nov_and_dec_2025
    type: many_to_one
    join_sql: ${user_id} = ${nps_form_responses_nov_and_dec_2025.user_id}
  - id: live_classes_user_feedback_responses
    type: one_to_many
    join_sql: ${user_id} = ${live_classes_user_feedback_responses.user_id} AND ${slot_id} = ${live_classes_user_feedback_responses.slot_id}
  - id: academy_student_success_salesforce_task_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_student_success_salesforce_task_details.user_id}
  - id: academy_nbfc_renewals_conversion_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_nbfc_renewals_conversion_details.user_id}
  - id: z_academy_users_topin_tech_assessments
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_topin_tech_assessments.user_id}
  - id: y_academy_user_event_engagement_details
    type: one_to_many
    join_sql: REPLACE(${user_id}, "-", "") = ${y_academy_user_event_engagement_details.user_id}
  - id: z_academy_users_topin_tech_assessments_section_wise_scores
    type: one_to_many
    join_sql: ${user_id} = ${z_academy_users_topin_tech_assessments_section_wise_scores.user_id}
  - id: academy_users_day_and_page_wise_time_spent_details
    type: one_to_many
    join_sql: ${user_id} = ${academy_users_day_and_page_wise_time_spent_details.user_id}

id: z_academy_users_npc_master_table
type: model
description: >-
  This table represents a monthly user-level payment retention spine for
  learners on the learning platform.

  Each row corresponds to a user × calendar month, capturing the user’s payment
  plan, derived payment status for that month, and a retention bucket based on
  month-over-month payment behavior.

  It is primarily used for:

  Tracking payment retention, churn, resurrection, and risk

  Building monthly retention funnels

  Analyzing payment behavior across user types and payment plans

  Powering cohort-based reporting starting from LP access month
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_a\
  cademy_users_npc_master_table`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_calendar_month_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${calendar_month} AS STRING))
    unique: true
    visibility: "internal"
    description: Unique identifier combining user_id and calendar_month for each user's monthly payment record
  - id: npc_split_tag
    type: string
    description: >-
      Payment journey tagging for the users present in our north star metric NPC
      (net payment churn). NPC = COUNT(NOT_RETAINED_USER) - COUNT(RESURRECTED_USER).
      Exact enum values -
        • REGULAR
        • RENEWAL
  - id: payment_plan
    type: string
    description: >-
      Payment plan applicable for the user in the given month. Exact enum values -
        • NBFC
        • NEXT_SPLIT_BREAK
        • FLEX
        • PERIODIC_INSTALLMENTS
        • NA_COMPLETED
        • NA_CANCELLED
        • NA_PENDING
        • YET_TO_START
  - id: lp_month
    type: date
    description: Learning Platform access month for the user, truncated to the first
      day of the month.
  - id: calendar_month
    type: date
    description: Monthly calendar spine generated for each user starting from the
      first due month up to the last due month, or current month if the last due
      month has already passed.
  - id: user_id
    type: string
    description: Unique identifier of the user (UUID with hyphens).
  - id: payment_bucket
    type: string
    description: >-
      Month-over-month payment retention classification, derived using previous
      month payment status and current month payment status. Exact enum values -
        • NEW_USER          (prev = NULL,        curr = PAID/NOT_PRESENTED)
        • RETAINED_USER     (prev = PAID/NOT_PRESENTED, curr = PAID/NOT_PRESENTED)
        • RESURRECTED_USER  (prev = UNPAID,      curr = PAID/NOT_PRESENTED)
        • NOT_RETAINED_USER (prev = NULL/PAID/NOT_PRESENTED, curr = UNPAID)
        • AT_RISK_USER      (prev = UNPAID,      curr = UNPAID)
        • LOST_USER         (prev bucket = AT_RISK_USER, curr = UNPAID)
  - id: payment_status
    type: string
    description: >-
      Derived payment status for the given calendar month. When a user has multiple
      EMI plans, this is a consolidated status. Exact enum values -
        • PAID
        • UNPAID
        • NOT_PRESENTED
        • YET_TO_PAY
        • YET_TO_START
  - id: user_type
    type: string
    description: >-
      Type of payment journey for the user. Exact enum values -
        • ONLY_PERIODIC_INSTALLMENTS
        • ONLY_FLEX
        • ONLY_NBFC
        • TRANSITION                  (user moved between payment types)
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${calendar_month} = DATE_TRUNC(${y_academy_user_daily_engagement_time_spent.calendar_date},MONTH)
  - id: academy_nps_form_responses
    type: one_to_one
    join_sql: ${user_id} = ${academy_nps_form_responses.user_id} AND ${calendar_month} = DATE_TRUNC(${academy_nps_form_responses.form_submission_month}, MONTH)

id: z_academy_users_topin_tech_assessments
type: model
description: >-
  This table captures user-level performance data for assessments configured
  within the Topin portal.

  Each record represents a single user’s attempt (or non-attempt) for a specific
  organisational assessment, including assessment metadata, scoring details, and
  attempt status.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_a\
  cademy_users_topin_tech_assessments`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_assessment_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${organisation_assessment_id})
    unique: true
    visibility: "internal"
    description: Unique identifier combining user_id and organisation_assessment_id for each user's assessment record
  - id: user_id
    type: string
    description: Unique identifier of the user (UUID format with hyphens).
  - id: organisation_assessment_id
    type: string
    description: Unique identifier of the assessment configured in the Topin portal.
      This is the primary and most reliable identifier for an assessment.
  - id: assessment_title
    type: string
    description: Display name of the assessment. Note- assessment titles may not be unique across organisations; use organisation_assessment_id for accurate identification.
  - id: assessment_start_datetime
    type: timestamp_naive
    description: Start date and time when the assessment becomes available to users, as configured in the portal.
  - id: assessment_end_datetime
    type: timestamp_naive
    description: End date and time after which the assessment is no longer accessible to users.
  - id: assessment_score
    type: number
    description: Maximum possible score for the assessment. If the assessment contains multiple sections, this value represents the sum of all section scores.
  - id: attempted_tag
    type: boolean
    description: Indicates whether the user attempted the assessment. TRUE if the user attempted at least one section; FALSE if no sections were attempted.
  - id: user_score
    type: number
    description: Total score obtained by the user across all attempted sections. This is the sum of section-level scores achieved by the user.
  - id: user_score_percentage
    type: number
    description: Percentage score achieved by the user, calculated as (user_score / assessment_score) × 100.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND DATE(${assessment_start_datetime}) = ${y_academy_user_daily_engagement_time_spent.calendar_date}

id: z_academy_users_topin_tech_assessments_section_wise_scores
type: model
description: >-
  This table captures user-level assessment performance at the section level
  from the Topin portal.

  Each record represents a single user’s attempt for a specific section within
  an assessment. Since an assessment can contain multiple sections, a user may
  have multiple rows for the same organisation_assessment_id (one per section).
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_a\
  cademy_users_topin_tech_assessments_section_wise_scores`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_assessment_section_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${organisation_assessment_id}, '-', ${section})
    unique: true
    visibility: "internal"
    description: Unique identifier combining user_id, organisation_assessment_id, and section for each user's section-level assessment record
  - id: organisation_assessment_id
    type: string
    description: Unique identifier of the assessment configured in the Topin portal.
      This is the primary and most reliable identifier for an assessment.
  - id: section_start_datetime
    type: timestamp_naive
    description: Date and time when the user started the respective section.
  - id: section_total_score
    type: number
    description: Maximum possible score for the section.
  - id: user_id
    type: string
    description: Unique identifier of the user (UUID format with hyphens).
  - id: assessment_date
    type: date
    description: Date when the assessment becomes available to users, as configured
      in the portal.
  - id: user_section_score
    type: number
    description: Score obtained by the user in the respective section.
  - id: assessment_title
    type: string
    description: Display name of the assessment. Note- assessment titles may not be
      unique across organisations; use organisation_assessment_id for accurate
      identification.
  - id: section
    type: string
    description: Name of the section within the assessment. An assessment may
      contain multiple sections; each section generates a separate record per
      user.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: REPLACE(${user_id}, "-", "") = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: one_to_many
    join_sql: ${user_id} = ${y_academy_user_daily_engagement_time_spent.user_id} AND ${assessment_date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}

id: z_ccbp_academy_users_aipl_daily_leaderboard_details
type: model
description: >2-
        User-day level performance and engagement dataset for the AI Premier League (AIPL).
        Each row corresponds to a user on a specific date and captures their activity,
        live session engagement, quiz behavior, consistency (streak), and leaderboard performance.
   
        A continuous date spine is generated per user starting from their first active day,
        ensuring accurate streak calculation by accounting for both active and inactive days.
   
        Quiz engagement is deduplicated per unit_id (first attempt only). Quiz scoring is
        incremental — only score improvements across attempts contribute to performance.
   
        Users are ranked daily by cumulative_runs, with cumulative_bonus_runs as the tie-breaker.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`z_c\
  cbp_academy_users_aipl_daily_leaderboard_details`"
measures:
  - id: count_of_records
    func: count
    description: Total number of user-day leaderboard records
  - id: unique_users
    func: count_distinct
    of: user_id
    description: Count of unique users on the leaderboard
  - id: active_user_days
    func: sum
    of: is_active_day
    description: Total active user-days (≥15 minutes spent on platform)
  - id: total_live_attended
    func: sum
    of: live_attended
    description: Total live session attendances
  - id: total_live_90
    func: sum
    of: live_90
    description: Total live sessions where the user attended ≥90% of the session
  - id: total_quiz_score
    func: sum
    of: quiz_score
    description: Total incremental quiz score earned across all users and days
  - id: total_daily_runs
    func: sum
    of: daily_runs
    description: Total runs earned across all users and days
  - id: total_quiz_runs
    func: sum
    of: quiz_runs
    description: Total quiz runs earned across all users and days
  - id: total_session_base_runs
    func: sum
    of: session_base_runs
    description: Total base runs awarded for live session attendance
  - id: total_session_bonus_runs
    func: sum
    of: session_bonus_runs
    description: Total bonus runs awarded for ≥90% live session attendance
  - id: total_streak_bonus
    func: sum
    of: streak_bonus
    description: Total streak milestone bonus runs awarded
  - id: total_bonus_runs
    func: sum
    of: bonus_runs
    description: Total bonus runs (streak + session bonus) awarded
  - id: avg_streak
    func: avg
    of: streak
    description: Average consecutive active-day streak across users
  - id: max_streak
    func: max
    of: streak
    description: Maximum consecutive active-day streak observed
dimensions:
  - id: user_date_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', CAST(${date} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id and date for each user-day leaderboard record
  - id: date
    type: date
    description: Activity date for the user.
  - id: user_id
    type: string
    description: Unique identifier for the user (UUID without hyphens).
  - id: user_name
    type: string
    description: User's display name mapped from profile data.
  - id: is_active_day
    type: number
    description: Indicates whether the user spent ≥15 minutes on the platform on this date. 1 = active, 0 = inactive.
  - id: live_attended
    type: number
    description: Indicates whether the user attended a live session on this date. 1 = attended, 0 = did not attend.
  - id: live_90
    type: number
    description: Indicates whether the user attended ≥90% of a live session on this date. 1 = met threshold, 0 = did not.
  - id: quiz_daily_unique_count
    type: number
    description: Number of new unique quizzes (by unit_id) attempted by the user on this date. Only first-attempt quizzes are counted; re-attempts are excluded.
  - id: quiz_cumulative_count
    type: number
    description: Total unique quizzes attempted by the user from their start date up to and including this date. Deduplicated by unit_id across all time.
  - id: quiz_score
    type: number
    description: Incremental quiz score earned by the user on this date. Only improvements over prior attempts for the same quiz contribute to this score.
  - id: quiz_runs
    type: number
    description: Gamified score derived from quiz_score. Calculated as quiz_score × 2.
  - id: session_base_runs
    type: number
    description: Runs awarded for attending a live session on this date. +10 per session attended.
  - id: session_bonus_runs
    type: number
    description: Additional runs awarded for attending ≥90% of a live session. +20 per qualifying session.
  - id: streak_bonus
    type: number
    description: Bonus runs awarded when the user's streak hits a milestone. Milestones - 3, 7, 14, and 30 consecutive active days.
  - id: bonus_runs
    type: number
    description: Total bonus runs earned on this date. Calculated as streak_bonus + session_bonus_runs.
  - id: daily_runs
    type: number
    description: Total runs earned by the user on this date. Includes consistency runs, session runs, quiz runs, and all bonuses.
  - id: cumulative_runs
    type: number
    description: Running total of daily_runs per user, ordered by date. Used as the primary leaderboard ranking metric.
  - id: cumulative_bonus_runs
    type: number
    description: Running total of bonus_runs per user, ordered by date. Used as the tie-breaker (strike_rate) in leaderboard ranking.
  - id: streak
    type: number
    description: Number of consecutive active days up to and including this date. Resets to 0 on any day where is_active_day = 0.
  - id: strike_rate
    type: number
    description: Alias for cumulative_bonus_runs. Used as the tie-breaker column in daily leaderboard ranking when two users share the same cumulative_runs.
  - id: rank
    type: number
    description: User's leaderboard rank on this date. Ordered by cumulative_runs descending; ties broken by strike_rate (cumulative_bonus_runs) descending.
  - id: prev_rank
    type: number
    description: User's leaderboard rank on the previous date. Used to compute daily rank movement.
  - id: delta
    type: number
    description: Rank movement compared to the previous day. +1 = rank improved, 0 = rank unchanged, -1 = rank dropped.
relations:
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: ${user_id} = ${z_ccbp_academy_users_master_data.user_id}
  - id: y_academy_user_daily_engagement_time_spent
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${y_academy_user_daily_engagement_time_spent.user_id}, "-", "") AND ${date} = ${y_academy_user_daily_engagement_time_spent.calendar_date}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_basic_details.user_id}, "-", "")
  - id: academy_user_profile_education_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_education_details.user_id}, "-", "")
  - id: z_academy_users_npc_master_table
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${z_academy_users_npc_master_table.user_id}, "-", "")
  - id: z_academy_users_course_wise_completion_details
    type: one_to_many
    join_sql: ${user_id} = REPLACE(${z_academy_users_course_wise_completion_details.user_id}, "-", "")
  - id: z_academy_users_live_classes_attendance_and_time_spent_details
    type: one_to_many
