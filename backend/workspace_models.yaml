id: all_users_question_attempt_details_for_question_set_units
type: model
description: User × question summary — aggregated view with one row per user per question, capturing first/best/latest attempts, time spent, and help-seeking signals (e.g., tutorials, discussions, AI bot usage, answer seen). Used for learning outcome and struggle analysis.
base_sql_table: "`kossip-helpers`.`academy_success_ai_analytics_worksapce`.`all\
  _users_question_attempt_details_for_question_set_units`"
measures:
  - id: count_of_records
    func: count
dimensions:
  - id: user_question_attempt_key
    type: string
    expr_sql: CONCAT(${user_id}, '-', ${question_set_id}, '-', ${question_id}, '-', CAST(${question_attempt_no} AS STRING))
    unique: true
    visibility: "internal"
    description: Composite primary key combining user_id, question_set_id, question_id, and question_attempt_no for each unique attempt
  - id: user_id
    type: string
    description: The unique identifier for the user attempting the question. UUID without hyphens.
  - id: question_id
    type: string
    description: The unique identifier for the question.
  - id: question_set_id
    type: string
    description: The unique identifier for the question_set unit this question belongs to.
  - id: question_set_title
    type: string
    description: The title of the question_set unit this question belongs to.
  - id: short_text
    type: string
    description: A brief summary or shortened version of the question text.
  - id: question_type
    type: string
    description: >-
      Defines how the user interacts with the question. Exact enum values -
        • SQL_CODING
        • HTML_CODING
        • INTERACTIVE_BUILDER_TEXTUAL
        • CODING
        • IDE_BASED_CODING
  - id: question_start_datetime
    type: timestamp_naive
    description: The timestamp for when the user began this attempt on the question.
  - id: user_response_id
    type: number
    description: The unique identifier for the specific answer the user submitted for this attempt.
  - id: question_attempt_no
    type: number
    description: The attempt number for this user on this specific question (e.g., 1 for the first try, 2 for the second).
  - id: submission_datetime
    type: timestamp_naive
    description: The timestamp for when the user submitted their answer for this attempt.
  - id: evaluation_result
    type: string
    description: >-
      The outcome of the question attempt. NULL if not yet evaluated. Exact enum values -
        • CORRECT
        • PARTIALLY_CORRECT
        • INCORRECT
  - id: time_spent
    type: number
    description: The duration of the question attempt, measured in seconds.
  - id: user_score
    type: number
    description: The score the user received for this specific question attempt.
  - id: actual_score
    type: number
    description: The maximum possible score for this question.
  - id: is_answer_seen
    type: number
    description: A flag indicating if the user viewed the correct answer before attempting. 1 means yes, 0 means no. Can be NULL.
  - id: answer_seen_datetime
    type: timestamp_naive
    description: The timestamp for when the user viewed the correct answer. This is NULL if the answer has not been seen.
relations:
  - id: content_question_set_units_questions_details
    type: many_to_one
    join_sql: ${question_set_id} = ${content_question_set_units_questions_details.question_set_id} AND ${question_id} = ${content_question_set_units_questions_details.question_id}
  - id: all_users_question_wise_responses_summary_details_for_question_set_units
    type: many_to_one
    join_sql: ${user_id} = ${all_users_question_wise_responses_summary_details_for_question_set_units.user_id} AND ${question_set_id} = ${all_users_question_wise_responses_summary_details_for_question_set_units.question_set_id} AND ${question_id} = ${all_users_question_wise_responses_summary_details_for_question_set_units.question_id}
  - id: z_ccbp_academy_users_master_data
    type: many_to_one
    join_sql: ${user_id} = ${z_ccbp_academy_users_master_data.user_id}
  - id: academy_user_profile_basic_details
    type: many_to_one
    join_sql: ${user_id} = REPLACE(${academy_user_profile_basic_details.user_id}, "-", "")
  - id: academy_user_profile_education_details
