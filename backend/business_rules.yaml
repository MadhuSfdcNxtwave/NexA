# Single source of truth for business metrics and date keywords.
# glossary.yaml + table_routing.py remain for routing; this file feeds SQL prompts.

# Applies to EVERY table join on user identifiers.
global_join_rule: >-
  When joining any tables on user_id (also discussion_user_id, meet_host_user_id, uid__c),
  ALWAYS use REPLACE on BOTH sides:
  REPLACE(a.user_id, '-', '') = REPLACE(b.user_id, '-', '').
  Never use bare a.user_id = b.user_id — UUID hyphen formats differ across tables.

metrics:
  active_learning_portal_users:
    table_short: z_ccbp_academy_users_master_data
    filters: []
    description: >-
      Every row in master data is an active learning-portal user.
      Do NOT add pause_status or onboarding-access filters unless the question
      explicitly asks about paused users or portal access grant.
      NOT lp_status=ACTIVE on the engagement table.

  lp_status_active_users:
    table_short: academy_users_day_and_page_wise_time_spent_details
    filters:
      - "lp_status = 'ACTIVE'"
    description: Use only when question explicitly mentions lp_status.

  placed_user:
    table_short: y_academy_users_placements_details
    filters: []
    description: Presence in placements table indicates a placement record.

  live_class_attendance:
    table_short: z_academy_users_live_classes_attendance_and_time_spent_details
    filters:
      - "attendance_status = 'JOINED'"
    description: Users who joined a live class session.

  nps_feedback:
    table_short: nps_all_form_responses
    filters: []
    description: NPS form free-text — use UNION across both NPS tables for topic search.

date_keywords:
  yesterday: "DATE_SUB(CURRENT_DATE(), INTERVAL 1 DAY)"
  yestarday: "DATE_SUB(CURRENT_DATE(), INTERVAL 1 DAY)"
  today: "CURRENT_DATE()"
  now: "CURRENT_DATE()"
  currently: "CURRENT_DATE()"
  this_month: "DATE_TRUNC(CURRENT_DATE(), MONTH)"
  this_week: "DATE_TRUNC(CURRENT_DATE(), WEEK)"
  recent: "DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY)"
  last_7_days: "DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY)"
  last_30_days: "DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)"
  last_90_days: "DATE_SUB(CURRENT_DATE(), INTERVAL 90 DAY)"
